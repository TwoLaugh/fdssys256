services:
  postgres:
    image: postgres:16
    container_name: mealprep-db
    environment:
      POSTGRES_DB: mealprep_dev
      POSTGRES_USER: mealprep_dev
      POSTGRES_PASSWORD: mealprep_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
