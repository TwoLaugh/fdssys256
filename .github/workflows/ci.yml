name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify (compile + unit tests + integration tests + JaCoCo)
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Spotless check (google-java-format)
        run: ./mvnw --batch-mode --no-transfer-progress spotless:check

      - name: OpenAPI lint (swagger-cli structural validation)
        run: npx -y @apidevtools/swagger-cli@4.0.4 validate src/main/resources/openapi/openapi.yaml

      - name: OpenAPI lint (redocly recommended ruleset)
        # Strengthened gate added by tickets/infra/01c. Severity-warning items are advisory;
        # severity-error items fail the build. See design/audits/2026-05-21-openapi-reconciliation.md
        # for the audit context and the list of known warnings flagged as follow-ups.
        run: npx -y @redocly/cli@latest lint src/main/resources/openapi/openapi.yaml --extends recommended

      - name: Coverage summary (JaCoCo)
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "Coverage report at target/site/jacoco/index.html"
          else
            echo "No JaCoCo report — skipping coverage summary."
          fi

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore

  mutation:
    name: Mutation testing (Pitest)
    runs-on: ubuntu-latest
    # Historical durations: 37-44 min on the pre-grocery suite. The grocery module's mutation
    # hardening campaign (#181) added 248 unit tests, pushing the sweep past the 45-min cap on
    # the first post-campaign main push. Bumped to 75 to give meaningful headroom; revisit with
    # Pitest historyInputFile / incremental mode if it climbs again.
    timeout-minutes: 75
    # Run on main pushes (post-merge regressions) and on PRs labelled `mutation` (when an
    # individual ticket wants pre-merge mutation gating). Default PR runs skip Pitest to
    # keep the build-test-lint cycle under 4 minutes — saves 5-7 min per PR. Trade-off:
    # mutation regressions land on main, surface on the next push, fix forward.
    if: |
      github.event_name == 'push'
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'mutation'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Pitest
        run: ./mvnw --batch-mode --no-transfer-progress test-compile pitest:mutationCoverage

      - name: Upload Pitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-reports
          path: target/pit-reports/
          if-no-files-found: ignore
