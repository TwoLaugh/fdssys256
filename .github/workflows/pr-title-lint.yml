name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-commit:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional-Commit types — match those listed in lld/implementation-playbook.md.
          types: |
            feat
            fix
            test
            docs
            refactor
            chore
            perf
            build
            ci
            style
            revert
          requireScope: false
          subjectPattern: ^[a-z0-9].+$
          subjectPatternError: |
            The subject (after the type/scope) must start with a lowercase letter or digit.
            Example: `feat(preference): add hard-constraints CRUD endpoints`.
