# Cucumber-JVM configuration (read by cucumber-junit-platform-engine).
#
# Glue package: where the step definitions + hooks live.
cucumber.glue=com.example.mealprep.e2e.steps

# Pretty console output + a machine-readable report for CI artefact upload.
cucumber.plugin=pretty, html:target/cucumber-report.html, json:target/cucumber-report.json

# Fail fast if a Gherkin step has no matching step definition (catches drift
# between the .feature files and the glue code).
cucumber.execution.strict=true

# Default tag filter. CI overrides via -Dcucumber.filter.tags="@smoke" etc.
# The @soak-only tag is reserved for scenarios that intentionally accumulate
# state; this scaffold ships only @smoke scenarios.
cucumber.filter.tags=@smoke
