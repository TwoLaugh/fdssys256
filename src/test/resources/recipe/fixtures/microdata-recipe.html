<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Microdata Recipe</title>

<body>
  <article itemscope itemtype="https://schema.org/Recipe">
    <h1 itemprop="name">Tomato Soup</h1>
    <p itemprop="description">Classic stovetop tomato soup.</p>
    <span itemprop="recipeCuisine">Italian</span>
    <ul>
      <li itemprop="recipeIngredient">800g canned tomatoes</li>
      <li itemprop="recipeIngredient">1 onion, diced</li>
      <li itemprop="recipeIngredient">2 cloves garlic</li>
    </ul>
    <ol>
      <li itemprop="recipeInstructions">Sweat the onion and garlic.</li>
      <li itemprop="recipeInstructions">Add tomatoes and simmer 25 minutes.</li>
      <li itemprop="recipeInstructions">Blend until smooth.</li>
    </ol>
  </article>
</body>
