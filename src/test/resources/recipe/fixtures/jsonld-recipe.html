<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sample JSON-LD Recipe</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Roast Chicken",
    "description": "A simple weeknight roast chicken.",
    "recipeIngredient": [
      "1 whole chicken",
      "2 tbsp olive oil",
      "1 tsp salt",
      "1 tsp pepper"
    ],
    "recipeInstructions": [
      { "@type": "HowToStep", "text": "Preheat oven to 200°C." },
      { "@type": "HowToStep", "text": "Rub chicken with oil, salt, and pepper." },
      { "@type": "HowToStep", "text": "Roast for 1 hour 15 minutes." }
    ],
    "prepTime": "PT15M",
    "cookTime": "PT75M",
    "totalTime": "PT90M",
    "recipeYield": 4,
    "recipeCuisine": "American"
  }
  </script>
</head>
<body>
  <h1>Roast Chicken</h1>
</body>
</html>
