# Pin docker-java's API version to 1.44 (Docker 25/26-era).
#
# Docker Desktop 29.x's API rejects the version docker-java 3.3.6 (transitive from
# Testcontainers 1.19.8) defaults to, returning HTTP 400 to the `info` ping that
# Testcontainers makes at startup. Pinning api.version=1.44 forces a known-supported
# version and the bridge works.
#
# Drop this file once Testcontainers is upgraded to a version whose docker-java
# default already targets a Docker 29-compatible API.
api.version=1.44
