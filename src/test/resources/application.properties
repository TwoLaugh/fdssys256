## ============================================================
## src/test/resources/application.properties
##
## Forces the `test` profile when tests run via Spring Boot's
## auto-configuration without an explicit @ActiveProfiles. Concrete
## test datasource + JPA settings live in application-test.properties
## (which this profile activation pulls in alongside the base file).
## ============================================================

spring.profiles.active=test

# Planner defaults (mirror src/main/resources/application.properties so @ConfigurationProperties
# validation in test contexts sees the same values — test classpath shadows main).
mealprep.planner.week-start-day-of-week=MONDAY
mealprep.planner.beam-width=20
mealprep.planner.top-n=5
mealprep.planner.min-pool-per-slot=3
mealprep.planner.max-pool-per-slot=50
mealprep.planner.max-time-overshoot-ratio=1.5
mealprep.planner.stage-a-timeout=PT30S
