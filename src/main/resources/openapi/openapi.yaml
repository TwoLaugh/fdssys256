openapi: 3.0.3
info:
  title: MealPrep AI
  description: |
    Backend API for the MealPrep AI personal meal-planning system.
    See the architectural docs in `design/` and the LLDs in `lld/`.
    CORS for `http://localhost:5173` is active under the `dev` Spring profile only; production requires same-origin requests.

    ## Origin tracking

    Non-user-originated requests (AI feedback bridges, scheduled jobs, adaptation pipeline) call the
    same endpoints a user would, with origin-identifying headers (`X-Origin`, `X-Origin-Trace`,
    `X-Origin-Depth`, `X-Acting-As`). See `design/origin-tracking-pattern.md` and
    `tickets/core/02b-origin-tracking-foundation.md` for the architectural rationale and policy
    enforcement (confidence floor, rate-limit, recursion guard, per-endpoint opt-in via
    `@OriginAware`). The reusable header parameter components are declared under
    `components.parameters.{Origin,OriginTrace,OriginDepth,ActingAs}Header`.
  version: 0.1.0
  contact:
    name: MealPrep AI
servers:
  - url: http://localhost:8080
    description: Local development
  - url: /
    description: Same-origin (production deployment)
