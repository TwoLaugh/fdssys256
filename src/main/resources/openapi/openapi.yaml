openapi: 3.0.3
info:
  title: MealPrep AI
  description: |
    Backend API for the MealPrep AI personal meal-planning system.
    See the architectural docs in `design/` and the LLDs in `lld/`.
  version: 0.1.0
  contact:
    name: MealPrep AI
servers:
  - url: http://localhost:8080
    description: Local development
  - url: /
    description: Same-origin (production deployment)
paths:
  # ===== auth =====
  /api/v1/auth/register:
    $ref: 'paths/auth.yaml#/register'
  /api/v1/auth/login:
    $ref: 'paths/auth.yaml#/login'
  /api/v1/auth/logout:
    $ref: 'paths/auth.yaml#/logout'
  /api/v1/auth/me:
    $ref: 'paths/auth.yaml#/me'
  /api/v1/auth/password:
    $ref: 'paths/auth.yaml#/password'
  # ===== core / decision-log =====
  /api/v1/admin/decision-log/{decisionId}:
    $ref: 'paths/core.yaml#/decisionById'
  /api/v1/admin/decision-log/trace/{traceId}:
    $ref: 'paths/core.yaml#/decisionsByTrace'
  /api/v1/admin/decision-log/{decisionId}/ancestry:
    $ref: 'paths/core.yaml#/decisionAncestry'
  # ===== admin / ai =====
  /api/v1/admin/ai/cost-summary:
    $ref: 'paths/ai.yaml#/costSummary'
  /api/v1/admin/ai/call-log:
    $ref: 'paths/ai.yaml#/callLog'
  /api/v1/admin/ai/prompt-templates:
    $ref: 'paths/ai.yaml#/promptTemplates'
  /api/v1/admin/ai/prompt-templates/{name}/{version}:
    $ref: 'paths/ai.yaml#/promptTemplateByNameAndVersion'
  # ===== preference =====
  /api/v1/preferences/hard-constraints:
    $ref: 'paths/preference.yaml#/hardConstraints'
  /api/v1/preferences/hard-constraints/audit-log:
    $ref: 'paths/preference.yaml#/hardConstraintsAuditLog'
  # ===== household =====
  /api/v1/households:
    $ref: 'paths/household.yaml#/households'
  /api/v1/households/current:
    $ref: 'paths/household.yaml#/currentHousehold'
  /api/v1/households/{householdId}/settings:
    $ref: 'paths/household.yaml#/householdSettings'
  /api/v1/households/{householdId}/settings/audit-log:
    $ref: 'paths/household.yaml#/householdSettingsAuditLog'
  /api/v1/households/{householdId}/slot-configuration:
    $ref: 'paths/household.yaml#/householdSlotConfiguration'
  /api/v1/households/current/invites:
    $ref: 'paths/household.yaml#/householdInvitesCurrent'
  /api/v1/households/current/invites/{inviteId}:
    $ref: 'paths/household.yaml#/householdInviteRevoke'
  /api/v1/invites/accept:
    $ref: 'paths/household.yaml#/inviteAccept'
  # ===== provisions =====
  /api/v1/provisions/inventory:
    $ref: 'paths/provisions.yaml#/inventory'
  /api/v1/provisions/inventory/{itemId}:
    $ref: 'paths/provisions.yaml#/inventoryItem'
  /api/v1/provisions/inventory/{itemId}/mark-spoiled:
    $ref: 'paths/provisions.yaml#/inventoryItemMarkSpoiled'
  /api/v1/provisions/inventory/{itemId}/mark-exhausted:
    $ref: 'paths/provisions.yaml#/inventoryItemMarkExhausted'
  /api/v1/provisions/inventory/{itemId}/audit-log:
    $ref: 'paths/provisions.yaml#/inventoryItemAuditLog'
  /api/v1/provisions/equipment:
    $ref: 'paths/provisions.yaml#/equipment'
  /api/v1/provisions/equipment/{name}:
    $ref: 'paths/provisions.yaml#/equipmentByName'
  /api/v1/provisions/budget:
    $ref: 'paths/provisions.yaml#/provisionsBudget'
  # ===== nutrition =====
  /api/v1/nutrition/targets:
    $ref: 'paths/nutrition.yaml#/targets'
  /api/v1/nutrition/targets/audit-log:
    $ref: 'paths/nutrition.yaml#/targetsAuditLog'
  /api/v1/nutrition/targets/activity:
    $ref: 'paths/nutrition.yaml#/targetsActivityRange'
  /api/v1/nutrition/targets/activity/{date}:
    $ref: 'paths/nutrition.yaml#/targetsActivityByDate'
  /api/v1/nutrition/intake/{date}:
    $ref: 'paths/nutrition.yaml#/intakeForDay'
  /api/v1/nutrition/intake:
    $ref: 'paths/nutrition.yaml#/intakeRange'
  /api/v1/nutrition/intake/{date}/slots/{mealSlot}/confirm:
    $ref: 'paths/nutrition.yaml#/intakeSlotConfirm'
  /api/v1/nutrition/intake/{date}/slots/{mealSlot}/override:
    $ref: 'paths/nutrition.yaml#/intakeSlotOverride'
  /api/v1/nutrition/intake/{date}/slots/{mealSlot}/edit:
    $ref: 'paths/nutrition.yaml#/intakeSlotEdit'
  /api/v1/nutrition/intake/{date}/slots/{mealSlot}/skip:
    $ref: 'paths/nutrition.yaml#/intakeSlotSkip'
  /api/v1/nutrition/intake/{date}/snacks:
    $ref: 'paths/nutrition.yaml#/intakeSnacks'
  /api/v1/nutrition/intake/{date}/snacks/{snackId}:
    $ref: 'paths/nutrition.yaml#/intakeSnackById'
  /api/v1/nutrition/intake/{date}/audit-log:
    $ref: 'paths/nutrition.yaml#/intakeAuditLog'
  /api/v1/nutrition/journal/{date}:
    $ref: 'paths/nutrition.yaml#/nutritionJournalDay'
  /api/v1/nutrition/journal/{date}/entries/{entryId}:
    $ref: 'paths/nutrition.yaml#/nutritionJournalEntry'
  /api/v1/nutrition/journal:
    $ref: 'paths/nutrition.yaml#/nutritionJournalRecent'
  # ===== recipe =====
  /api/v1/recipes:
    $ref: 'paths/recipe.yaml#/recipes'
  /api/v1/recipes/{recipeId}:
    $ref: 'paths/recipe.yaml#/recipeRoot'
  /api/v1/recipes/imports/url:
    $ref: 'paths/recipe.yaml#/recipeImports'
  /api/v1/recipes/{recipeId}/import-provenance:
    $ref: 'paths/recipe.yaml#/recipeImportProvenance'
  /api/v1/recipes/{recipeId}/branches:
    $ref: 'paths/recipe.yaml#/recipeBranches'
  /api/v1/recipes/{recipeId}/versions/{fromVersionId}/diff/{toVersionId}:
    $ref: 'paths/recipe.yaml#/recipeVersionDiff'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: AUTH_SESSION
      description: |
        Session cookie issued by /api/v1/auth/login or /api/v1/auth/register.
        Auth-01a: anonymous access is rejected outside the whitelisted paths.
        Auth-roles-followup will tighten ROLE_ADMIN gating on admin endpoints.
  schemas:
    # auth
    RegisterRequest: { $ref: 'schemas/auth.yaml#/RegisterRequest' }
    LoginRequest: { $ref: 'schemas/auth.yaml#/LoginRequest' }
    LoginResponse: { $ref: 'schemas/auth.yaml#/LoginResponse' }
    PasswordChangeRequest: { $ref: 'schemas/auth.yaml#/PasswordChangeRequest' }
    UserDto: { $ref: 'schemas/auth.yaml#/UserDto' }
    # core
    DecisionLogDto: { $ref: 'schemas/core.yaml#/DecisionLogDto' }
    AncestryResponse: { $ref: 'schemas/core.yaml#/AncestryResponse' }
    # preference
    DietaryIdentityExceptionDto: { $ref: 'schemas/preference.yaml#/DietaryIdentityExceptionDto' }
    DietaryIdentityDto: { $ref: 'schemas/preference.yaml#/DietaryIdentityDto' }
    HardIntoleranceDto: { $ref: 'schemas/preference.yaml#/HardIntoleranceDto' }
    AgeRestrictionDto: { $ref: 'schemas/preference.yaml#/AgeRestrictionDto' }
    HardConstraintsDto: { $ref: 'schemas/preference.yaml#/HardConstraintsDto' }
    UpdateHardConstraintsRequest: { $ref: 'schemas/preference.yaml#/UpdateHardConstraintsRequest' }
    HardConstraintsAuditEntryDto: { $ref: 'schemas/preference.yaml#/HardConstraintsAuditEntryDto' }
    # household
    HouseholdRole: { $ref: 'schemas/household.yaml#/HouseholdRole' }
    HouseholdDto: { $ref: 'schemas/household.yaml#/HouseholdDto' }
    HouseholdMemberDto: { $ref: 'schemas/household.yaml#/HouseholdMemberDto' }
    CreateHouseholdRequest: { $ref: 'schemas/household.yaml#/CreateHouseholdRequest' }
    SlotKind: { $ref: 'schemas/household.yaml#/SlotKind' }
    SlotDefault: { $ref: 'schemas/household.yaml#/SlotDefault' }
    CustomSlotDefinition: { $ref: 'schemas/household.yaml#/CustomSlotDefinition' }
    HouseholdSchedulingPreferences: { $ref: 'schemas/household.yaml#/HouseholdSchedulingPreferences' }
    HouseholdSettingsDocument: { $ref: 'schemas/household.yaml#/HouseholdSettingsDocument' }
    HouseholdSettingsDto: { $ref: 'schemas/household.yaml#/HouseholdSettingsDto' }
    UpdateHouseholdSettingsRequest: { $ref: 'schemas/household.yaml#/UpdateHouseholdSettingsRequest' }
    HouseholdSettingsAuditEntryDto: { $ref: 'schemas/household.yaml#/HouseholdSettingsAuditEntryDto' }
    HouseholdSettingsAuditEntryDtoPage: { $ref: 'schemas/household.yaml#/HouseholdSettingsAuditEntryDtoPage' }
    SlotConfigEntryDto: { $ref: 'schemas/household.yaml#/SlotConfigEntryDto' }
    SlotConfigurationDto: { $ref: 'schemas/household.yaml#/SlotConfigurationDto' }
    AcceptInviteRequest: { $ref: 'schemas/household.yaml#/AcceptInviteRequest' }
    CreateInviteRequest: { $ref: 'schemas/household.yaml#/CreateInviteRequest' }
    HouseholdInviteDto: { $ref: 'schemas/household.yaml#/HouseholdInviteDto' }
    InviteStatus: { $ref: 'schemas/household.yaml#/InviteStatus' }
    # provisions
    StorageLocation: { $ref: 'schemas/provisions.yaml#/StorageLocation' }
    TrackingMode: { $ref: 'schemas/provisions.yaml#/TrackingMode' }
    StapleStatus: { $ref: 'schemas/provisions.yaml#/StapleStatus' }
    ItemSource: { $ref: 'schemas/provisions.yaml#/ItemSource' }
    ItemLifecycleStatus: { $ref: 'schemas/provisions.yaml#/ItemLifecycleStatus' }
    DefrostMethod: { $ref: 'schemas/provisions.yaml#/DefrostMethod' }
    FreezerExtensionDto: { $ref: 'schemas/provisions.yaml#/FreezerExtensionDto' }
    InventoryItemDto: { $ref: 'schemas/provisions.yaml#/InventoryItemDto' }
    CreateInventoryItemRequest: { $ref: 'schemas/provisions.yaml#/CreateInventoryItemRequest' }
    UpdateInventoryItemRequest: { $ref: 'schemas/provisions.yaml#/UpdateInventoryItemRequest' }
    EquipmentDto: { $ref: 'schemas/provisions.yaml#/EquipmentDto' }
    UpsertEquipmentRequest: { $ref: 'schemas/provisions.yaml#/UpsertEquipmentRequest' }
    AuditActor: { $ref: 'schemas/provisions.yaml#/AuditActor' }
    InventoryAuditEntryDto: { $ref: 'schemas/provisions.yaml#/InventoryAuditEntryDto' }
    InventoryAuditEntryDtoPage: { $ref: 'schemas/provisions.yaml#/InventoryAuditEntryDtoPage' }
    BudgetDto: { $ref: 'schemas/provisions.yaml#/BudgetDto' }
    BudgetOrderRefDto: { $ref: 'schemas/provisions.yaml#/BudgetOrderRefDto' }
    BudgetSpendTrackingDto: { $ref: 'schemas/provisions.yaml#/BudgetSpendTrackingDto' }
    PriceSensitivity: { $ref: 'schemas/provisions.yaml#/PriceSensitivity' }
    UpdateBudgetRequest: { $ref: 'schemas/provisions.yaml#/UpdateBudgetRequest' }
    # nutrition
    Goal: { $ref: 'schemas/nutrition.yaml#/Goal' }
    EnforcementDirection: { $ref: 'schemas/nutrition.yaml#/EnforcementDirection' }
    MealSlot: { $ref: 'schemas/nutrition.yaml#/MealSlot' }
    ActivityLevel: { $ref: 'schemas/nutrition.yaml#/ActivityLevel' }
    ActorKind: { $ref: 'schemas/nutrition.yaml#/ActorKind' }
    CalorieTargetDto: { $ref: 'schemas/nutrition.yaml#/CalorieTargetDto' }
    MacroTargetDto: { $ref: 'schemas/nutrition.yaml#/MacroTargetDto' }
    PerMealDistributionDto: { $ref: 'schemas/nutrition.yaml#/PerMealDistributionDto' }
    MicroTargetDto: { $ref: 'schemas/nutrition.yaml#/MicroTargetDto' }
    EatingWindowDto: { $ref: 'schemas/nutrition.yaml#/EatingWindowDto' }
    ActivityAdjustmentDto: { $ref: 'schemas/nutrition.yaml#/ActivityAdjustmentDto' }
    TargetsDto: { $ref: 'schemas/nutrition.yaml#/TargetsDto' }
    UpdateTargetsRequest: { $ref: 'schemas/nutrition.yaml#/UpdateTargetsRequest' }
    NutritionTargetsAuditEntryDto: { $ref: 'schemas/nutrition.yaml#/NutritionTargetsAuditEntryDto' }
    IntakeSlotStatus: { $ref: 'schemas/nutrition.yaml#/IntakeSlotStatus' }
    IntakeAuditAction: { $ref: 'schemas/nutrition.yaml#/IntakeAuditAction' }
    IntakeSource: { $ref: 'schemas/nutrition.yaml#/IntakeSource' }
    PlannedIntakeDto: { $ref: 'schemas/nutrition.yaml#/PlannedIntakeDto' }
    ActualIntakeDto: { $ref: 'schemas/nutrition.yaml#/ActualIntakeDto' }
    IntakeSlotDto: { $ref: 'schemas/nutrition.yaml#/IntakeSlotDto' }
    IntakeSnackDto: { $ref: 'schemas/nutrition.yaml#/IntakeSnackDto' }
    IntakeDayDto: { $ref: 'schemas/nutrition.yaml#/IntakeDayDto' }
    IntakeEntryDto: { $ref: 'schemas/nutrition.yaml#/IntakeEntryDto' }
    OverrideIntakeRequest: { $ref: 'schemas/nutrition.yaml#/OverrideIntakeRequest' }
    LogSnackRequest: { $ref: 'schemas/nutrition.yaml#/LogSnackRequest' }
    IntakeAuditEntryDto: { $ref: 'schemas/nutrition.yaml#/IntakeAuditEntryDto' }
    IntakeAuditEntryDtoPage: { $ref: 'schemas/nutrition.yaml#/IntakeAuditEntryDtoPage' }
    DailyActivityDto: { $ref: 'schemas/nutrition.yaml#/DailyActivityDto' }
    UpsertDailyActivityRequest: { $ref: 'schemas/nutrition.yaml#/UpsertDailyActivityRequest' }
    PlannedSlotInputDto: { $ref: 'schemas/nutrition.yaml#/PlannedSlotInputDto' }
    FoodMoodEntryDto: { $ref: 'schemas/nutrition.yaml#/FoodMoodEntryDto' }
    FoodMoodEntryDtoPage: { $ref: 'schemas/nutrition.yaml#/FoodMoodEntryDtoPage' }
    JournalAction: { $ref: 'schemas/nutrition.yaml#/JournalAction' }
    UpsertFoodMoodEntryRequest: { $ref: 'schemas/nutrition.yaml#/UpsertFoodMoodEntryRequest' }
    # recipe
    Catalogue: { $ref: 'schemas/recipe.yaml#/Catalogue' }
    DataQuality: { $ref: 'schemas/recipe.yaml#/DataQuality' }
    NutritionStatus: { $ref: 'schemas/recipe.yaml#/NutritionStatus' }
    VersionTrigger: { $ref: 'schemas/recipe.yaml#/VersionTrigger' }
    Complexity: { $ref: 'schemas/recipe.yaml#/Complexity' }
    MealType: { $ref: 'schemas/recipe.yaml#/MealType' }
    IngredientDto: { $ref: 'schemas/recipe.yaml#/IngredientDto' }
    MethodStepDto: { $ref: 'schemas/recipe.yaml#/MethodStepDto' }
    RecipeMetadataDto: { $ref: 'schemas/recipe.yaml#/RecipeMetadataDto' }
    RecipeTagsDto: { $ref: 'schemas/recipe.yaml#/RecipeTagsDto' }
    RecipeVersionDto: { $ref: 'schemas/recipe.yaml#/RecipeVersionDto' }
    RecipeDto: { $ref: 'schemas/recipe.yaml#/RecipeDto' }
    CreateIngredientRequest: { $ref: 'schemas/recipe.yaml#/CreateIngredientRequest' }
    CreateMethodStepRequest: { $ref: 'schemas/recipe.yaml#/CreateMethodStepRequest' }
    CreateRecipeMetadataRequest: { $ref: 'schemas/recipe.yaml#/CreateRecipeMetadataRequest' }
    CreateRecipeTagsRequest: { $ref: 'schemas/recipe.yaml#/CreateRecipeTagsRequest' }
    CreateRecipeRequest: { $ref: 'schemas/recipe.yaml#/CreateRecipeRequest' }
    ImportSource: { $ref: 'schemas/recipe.yaml#/ImportSource' }
    ImportRecipeFromUrlRequest: { $ref: 'schemas/recipe.yaml#/ImportRecipeFromUrlRequest' }
    RecipeImportDto: { $ref: 'schemas/recipe.yaml#/RecipeImportDto' }
    RecipeBranchDto: { $ref: 'schemas/recipe.yaml#/RecipeBranchDto' }
    ChangeAction: { $ref: 'schemas/recipe.yaml#/ChangeAction' }
    IngredientChangeDto: { $ref: 'schemas/recipe.yaml#/IngredientChangeDto' }
    MetadataChangeDto: { $ref: 'schemas/recipe.yaml#/MetadataChangeDto' }
    MethodChangeDto: { $ref: 'schemas/recipe.yaml#/MethodChangeDto' }
    RecipeDiffDto: { $ref: 'schemas/recipe.yaml#/RecipeDiffDto' }
    TagChangeDto: { $ref: 'schemas/recipe.yaml#/TagChangeDto' }
    UpdateRecipeManualEditRequest: { $ref: 'schemas/recipe.yaml#/UpdateRecipeManualEditRequest' }
    # ai
    TaskType: { $ref: 'schemas/ai.yaml#/TaskType' }
    ModelTier: { $ref: 'schemas/ai.yaml#/ModelTier' }
    AiCallLogDto: { $ref: 'schemas/ai.yaml#/AiCallLogDto' }
    PromptTemplateDto: { $ref: 'schemas/ai.yaml#/PromptTemplateDto' }
    CostSummaryUserEntry: { $ref: 'schemas/ai.yaml#/CostSummaryUserEntry' }
    CostSummaryDto: { $ref: 'schemas/ai.yaml#/CostSummaryDto' }
    # common (cross-module)
    ProblemDetail: { $ref: 'schemas/common.yaml#/ProblemDetail' }
  responses:
    # Cross-module re-usable responses kept inline (these are tiny and rarely change).
    BadRequest:
      description: Validation or syntactic error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
    Conflict:
      description: Conflict with current state (optimistic-lock, duplicate, etc.).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
    UnprocessableEntity:
      description: Semantic error (constraint feasibility, etc.).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
