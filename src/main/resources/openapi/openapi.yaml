    UpdateLifestyleConfigRequest: { $ref: 'schemas/preference.yaml#/UpdateLifestyleConfigRequest' }
    LifestyleConfigAuditEntryDto: { $ref: 'schemas/preference.yaml#/LifestyleConfigAuditEntryDto' }
    # taste profile (01c)
