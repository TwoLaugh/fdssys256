components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: AUTH_SESSION
      description: |
        Session cookie issued by /api/v1/auth/login or /api/v1/auth/register.
        Auth-01a: anonymous access is rejected outside the whitelisted paths.
        Auth-roles-followup will tighten ROLE_ADMIN gating on admin endpoints.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Service-token authentication (Pattern B) for scheduled jobs and other non-user callers
        per `design/origin-tracking-pattern.md` §Authentication. The token plaintext is shown once
        at mint time; only the SHA-256 hash is stored server-side. Tokens carry a whitelist of
        permitted `X-Origin` values — a token tagged `SYSTEM_SCHEDULED` cannot make
        `AI_FEEDBACK` calls. The token authenticates the system caller; the `X-Acting-As` header
        identifies the user the call is for.
  parameters:
    # Origin-tracking header parameters (core-02b). Referenced from non-user endpoints in future
    # tickets via `parameters: [{ $ref: '#/components/parameters/OriginHeader' }, ...]`. No paths
    # reference these in 02b; the registration here is a forward declaration so consumer tickets
    # can plug in without re-touching this file.
    OriginHeader:
      name: X-Origin
      in: header
      required: false
      schema:
        type: string
        enum: [USER, AI_FEEDBACK, AI_ADAPTATION, SYSTEM_SCHEDULED, SYSTEM_REOPT, SYSTEM_DISCOVERY]
      description: |
        Origin of the request. Absence means USER (direct user call). Non-USER values require
        `X-Origin-Trace` and either an inherited user session (Pattern A) or a permitted service
        token (Pattern B).
    OriginTraceHeader:
      name: X-Origin-Trace
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: |
        Free-form trace string linking the request to the originating event or scheduled-job
        instance (e.g. `feedback-<uuid>`, `scheduled-price-refresh-<cron>`). Required when
        `X-Origin` is non-USER.
    OriginDepthHeader:
      name: X-Origin-Depth
      in: header
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 3
        default: 0
      description: |
        Recursion-guard depth. 0 for first-hop calls; system code increments on cascading
        outbound calls. The filter rejects depth > 3 with HTTP 422.
    ActingAsHeader:
      name: X-Acting-As
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: |
        User the service caller is acting on behalf of (Pattern B). Required when authenticating
        via `Authorization: Bearer <service-token>`.
  schemas:
    # auth
    RegisterRequest: { $ref: 'schemas/auth.yaml#/RegisterRequest' }
    LoginRequest: { $ref: 'schemas/auth.yaml#/LoginRequest' }
    LoginResponse: { $ref: 'schemas/auth.yaml#/LoginResponse' }
    PasswordChangeRequest: { $ref: 'schemas/auth.yaml#/PasswordChangeRequest' }
    UserDto: { $ref: 'schemas/auth.yaml#/UserDto' }
    # core
    DecisionLogDto: { $ref: 'schemas/core.yaml#/DecisionLogDto' }
    AncestryResponse: { $ref: 'schemas/core.yaml#/AncestryResponse' }
    # preference
    DietaryIdentityExceptionDto: { $ref: 'schemas/preference.yaml#/DietaryIdentityExceptionDto' }
    DietaryIdentityDto: { $ref: 'schemas/preference.yaml#/DietaryIdentityDto' }
    HardIntoleranceDto: { $ref: 'schemas/preference.yaml#/HardIntoleranceDto' }
    AgeRestrictionDto: { $ref: 'schemas/preference.yaml#/AgeRestrictionDto' }
    HardConstraintsDto: { $ref: 'schemas/preference.yaml#/HardConstraintsDto' }
    UpdateHardConstraintsRequest: { $ref: 'schemas/preference.yaml#/UpdateHardConstraintsRequest' }
    HardConstraintsAuditEntryDto: { $ref: 'schemas/preference.yaml#/HardConstraintsAuditEntryDto' }
    PreferenceLifestyleConfigDocument: { $ref: 'schemas/preference.yaml#/PreferenceLifestyleConfigDocument' }
