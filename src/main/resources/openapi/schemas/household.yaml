HouseholdRole:
  type: string
  enum: [primary, member]
HouseholdMemberDto:
  type: object
  required: [id, householdId, userId, role, priority, joinedAt, version]
  properties:
    id: { type: string, format: uuid }
    householdId: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    role: { $ref: '#/HouseholdRole' }
    displayName: { type: string, maxLength: 64, nullable: true }
    priority: { type: integer, minimum: 0, maximum: 1000 }
    joinedAt: { type: string, format: date-time }
    version: { type: integer, format: int64 }
HouseholdDto:
  type: object
  required: [id, name, createdByUserId, members, createdAt, version]
  properties:
    id: { type: string, format: uuid }
    name: { type: string, maxLength: 128 }
    createdByUserId: { type: string, format: uuid }
    members:
      type: array
      items: { $ref: '#/HouseholdMemberDto' }
    createdAt: { type: string, format: date-time }
    version: { type: integer, format: int64 }
CreateHouseholdRequest:
  type: object
  required: [name]
  properties:
    name: { type: string, minLength: 1, maxLength: 128 }
SlotKind:
  type: string
  enum: [breakfast, lunch, dinner, snack, custom]
SlotDefault:
  type: object
  required: [shared]
  properties:
    shared: { type: boolean }
    headcount: { type: integer, minimum: 1, maximum: 16, nullable: true }
    timeBudgetMin: { type: integer, minimum: 0, maximum: 480, nullable: true }
CustomSlotDefinition:
  type: object
  required: [key, label, backedByKind, shared]
  properties:
    key: { type: string, minLength: 1, maxLength: 48, pattern: '^[a-z0-9-]+$' }
    label: { type: string, minLength: 1, maxLength: 64 }
    backedByKind: { $ref: '#/SlotKind' }
    shared: { type: boolean }
    headcount: { type: integer, minimum: 1, maximum: 16, nullable: true }
    timeBudgetMin: { type: integer, minimum: 0, maximum: 480, nullable: true }
HouseholdSchedulingPreferences:
  type: object
  additionalProperties: false
  description: Reserved for v2 per-day overrides; empty object in v1.
HouseholdSettingsDocument:
  type: object
  required: [slotDefaults, customSlots]
  properties:
    slotDefaults:
      type: object
      additionalProperties: { $ref: '#/SlotDefault' }
    customSlots:
      type: array
      items: { $ref: '#/CustomSlotDefinition' }
    defaultHeadcount: { type: integer, minimum: 1, maximum: 16, nullable: true }
    scheduling: { $ref: '#/HouseholdSchedulingPreferences' }
HouseholdSettingsDto:
  type: object
  required: [id, householdId, document, version, createdAt]
  properties:
    id: { type: string, format: uuid }
    householdId: { type: string, format: uuid }
    document: { $ref: '#/HouseholdSettingsDocument' }
    version: { type: integer, format: int64 }
    createdAt: { type: string, format: date-time }
UpdateHouseholdSettingsRequest:
  type: object
  required: [document, expectedVersion]
  properties:
    document: { $ref: '#/HouseholdSettingsDocument' }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
HouseholdSettingsAuditEntryDto:
  type: object
  required: [id, actorUserId, fieldPath, previousValue, newValue, occurredAt]
  properties:
    id: { type: string, format: uuid }
    actorUserId: { type: string, format: uuid }
    fieldPath: { type: string, maxLength: 128 }
    previousValue: {}
    newValue: {}
    occurredAt: { type: string, format: date-time }
HouseholdSettingsAuditEntryDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/HouseholdSettingsAuditEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
SlotConfigEntryDto:
  type: object
  required: [slotKey, kind, shared, headcount, timeBudgetMin]
  properties:
    slotKey: { type: string, minLength: 1, maxLength: 48 }
    kind: { $ref: '#/SlotKind' }
    shared: { type: boolean }
    headcount: { type: integer, minimum: 1, maximum: 16 }
    timeBudgetMin: { type: integer, minimum: 0, maximum: 480 }
    eaterUserIdsIfPerPerson:
      type: array
      items: { type: string, format: uuid }
      nullable: true
SlotConfigurationDto:
  type: object
  required: [householdId, slots, allEaterUserIds]
  properties:
    householdId: { type: string, format: uuid }
    slots:
      type: array
      items: { $ref: '#/SlotConfigEntryDto' }
    allEaterUserIds:
      type: array
      items: { type: string, format: uuid }
InviteStatus:
  type: string
  enum: [PENDING, ACCEPTED, REVOKED, EXPIRED]
  description: Derived from acceptedAt / revokedAt / expiresAt; never persisted.
HouseholdInviteDto:
  type: object
  required: [id, householdId, issuedByUserId, intendedRole, expiresAt, status]
  properties:
    id: { type: string, format: uuid }
    householdId: { type: string, format: uuid }
    inviteCode:
      type: string
      maxLength: 32
      nullable: true
      description: Returned non-null ONLY on the create response. Always null on list / accept responses.
    issuedByUserId: { type: string, format: uuid }
    issuedForUserId:
      type: string
      format: uuid
      nullable: true
    intendedRole: { $ref: '#/HouseholdRole' }
    expiresAt: { type: string, format: date-time }
    acceptedAt:
      type: string
      format: date-time
      nullable: true
    revokedAt:
      type: string
      format: date-time
      nullable: true
    status: { $ref: '#/InviteStatus' }
CreateInviteRequest:
  type: object
  required: [intendedRole, expiresAt]
  properties:
    issuedForUserId:
      type: string
      format: uuid
      nullable: true
    intendedRole: { $ref: '#/HouseholdRole' }
    expiresAt:
      type: string
      format: date-time
      description: Must be in the future. Server caps at now + 30 days; values beyond the cap are silently truncated.
AcceptInviteRequest:
  type: object
  required: [inviteCode]
  properties:
    inviteCode:
      type: string
      minLength: 1
      maxLength: 32
AddMemberRequest:
  type: object
  required: [userId, role]
  properties:
    userId: { type: string, format: uuid }
    role: { $ref: '#/HouseholdRole' }
    priority:
      type: integer
      minimum: 1
      maximum: 1000
      default: 100
      nullable: true
    displayName:
      type: string
      maxLength: 64
      nullable: true
UpdateMemberRequest:
  type: object
  required: [expectedVersion]
  properties:
    priority:
      type: integer
      minimum: 1
      maximum: 1000
      nullable: true
      description: PATCH semantics — null = no change.
    displayName:
      type: string
      maxLength: 64
      nullable: true
      description: PATCH semantics — null = no change.
    expectedVersion: { type: integer, format: int64, minimum: 0 }
ChangeRoleRequest:
  type: object
  required: [newRole, expectedVersion]
  properties:
    newRole: { $ref: '#/HouseholdRole' }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
MergeStrategy:
  type: string
  enum: [MEAN_WEIGHTED_BY_PRIORITY]
TasteProfileDocument:
  type: object
  description: 'Lightweight stub shape; preference-01c will own the canonical record.'
  properties:
    ingredientLikes:
      type: object
      additionalProperties: { type: number, format: double, minimum: -1, maximum: 1 }
    cuisineLikes:
      type: object
      additionalProperties: { type: number, format: double, minimum: -1, maximum: 1 }
    avoidList:
      type: array
      items: { type: string, maxLength: 160 }
LifestyleConfigDocument:
  type: object
  description: 'Lightweight stub shape; preference-01c will own the canonical record.'
  properties:
    mealTimingWindowStart:
      type: string
      pattern: '^[0-2][0-9]:[0-5][0-9]$'
      nullable: true
    mealTimingWindowEnd:
      type: string
      pattern: '^[0-2][0-9]:[0-5][0-9]$'
      nullable: true
    noveltyTolerancePercent:
      type: integer
      minimum: 0
      maximum: 100
      nullable: true
    batchCookingPreferred: { type: boolean, default: false }
SoftPreferenceBundleDto:
  type: object
  required: [userId]
  properties:
    userId: { type: string, format: uuid }
    tasteProfile:
      type: object
      nullable: true
      properties:
        ingredientLikes:
          type: object
          additionalProperties: { type: number, format: double, minimum: -1, maximum: 1 }
        cuisineLikes:
          type: object
          additionalProperties: { type: number, format: double, minimum: -1, maximum: 1 }
        avoidList:
          type: array
          items: { type: string, maxLength: 160 }
    lifestyleConfig:
      type: object
      nullable: true
      properties:
        mealTimingWindowStart:
          type: string
          pattern: '^[0-2][0-9]:[0-5][0-9]$'
          nullable: true
        mealTimingWindowEnd:
          type: string
          pattern: '^[0-2][0-9]:[0-5][0-9]$'
          nullable: true
        noveltyTolerancePercent:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        batchCookingPreferred: { type: boolean, default: false }
MergedSoftPreferencesDto:
  type: object
  required: [contributingUserIds, mergedTasteProfile, mergedLifestyleConfig, userIdsByPriority, strategy, mergedAt]
  properties:
    householdId:
      type: string
      format: uuid
      nullable: true
      description: 'Null for the mergeSoftPreferencesForUsers variant which bypasses household lookup.'
    contributingUserIds:
      type: array
      items: { type: string, format: uuid }
    mergedTasteProfile: { $ref: '#/TasteProfileDocument' }
    mergedLifestyleConfig: { $ref: '#/LifestyleConfigDocument' }
    userIdsByPriority:
      type: array
      items: { type: string, format: uuid }
    strategy: { $ref: '#/MergeStrategy' }
    mergedAt: { type: string, format: date-time }
MergeSoftPreferencesRequest:
  type: object
  properties:
    eaterUserIds:
      type: array
      nullable: true
      description: 'Null or empty = all current household members.'
      items: { type: string, format: uuid }
