# Grocery — Tier 1 shopping-list (01b) + Tier 4 price-history (01c) schemas. Shapes mirror the
# api.dto records exactly. Conventions: inline `nullable: true` (never $ref + nullable sibling);
# Page schemas use additionalProperties: true; description strings with , : ' are single-quoted.

# ===== Tier 1 — shopping list (01b) =====

ExportFormat:
  type: string
  enum: [PRINTABLE_HTML, PLAIN_TEXT, MARKDOWN, CSV]

ShoppingListLineType:
  type: string
  enum: [PLANNED_DEMAND, STAPLE_REPLENISHMENT]

LineFulfilmentStatus:
  type: string
  enum: [UNFILLED, PARTIAL, BOUGHT, SUBSTITUTED, DROPPED]

ShoppingListLineDto:
  type: object
  required:
    [id, ingredientMappingKey, displayName, requestedQuantity, requestedUnit, lineType,
     isStaleEstimate, fulfilmentStatus]
  properties:
    id: { type: string, format: uuid }
    ingredientMappingKey: { type: string, maxLength: 128 }
    displayName: { type: string, maxLength: 128 }
    requestedQuantity: { type: number }
    requestedUnit: { type: string, maxLength: 16 }
    suggestedPackSizeG:
      type: integer
      nullable: true
    suggestedPackCount:
      type: integer
      nullable: true
    suggestedPackUnit:
      type: string
      maxLength: 16
      nullable: true
    lineType: { $ref: '#/ShoppingListLineType' }
    qualityNotes:
      type: string
      maxLength: 255
      nullable: true
    estimatedUnitPence:
      type: integer
      nullable: true
    estimatedLinePence:
      type: integer
      nullable: true
    estimatedConfidence:
      type: number
      nullable: true
    isStaleEstimate: { type: boolean }
    fulfilmentStatus: { $ref: '#/LineFulfilmentStatus' }
    boughtQuantity:
      type: number
      nullable: true
    boughtUnit:
      type: string
      maxLength: 16
      nullable: true
    boughtPricePence:
      type: integer
      nullable: true
    boughtAt:
      type: string
      format: date-time
      nullable: true
    boughtVia:
      type: string
      enum: [MANUAL, ORDER, BULK_TOTAL]
      nullable: true
    groceryOrderId:
      type: string
      format: uuid
      nullable: true

ShoppingListDto:
  type: object
  required:
    [id, userId, planId, planGeneration, generatedAt, estimatedTotalCurrency,
     staleIngredientCount, pantryTrackingEnabled, lines, version]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    householdId:
      type: string
      format: uuid
      nullable: true
    planId: { type: string, format: uuid }
    planGeneration: { type: integer }
    generatedAt: { type: string, format: date-time }
    supersededAt:
      type: string
      format: date-time
      nullable: true
    estimatedTotalPence:
      type: integer
      nullable: true
    estimatedTotalCurrency: { type: string, maxLength: 3 }
    costConfidence:
      type: number
      nullable: true
    staleIngredientCount: { type: integer }
    pantryTrackingEnabled: { type: boolean }
    notes:
      type: string
      maxLength: 255
      nullable: true
    lines:
      type: array
      items: { $ref: '#/ShoppingListLineDto' }
    version: { type: integer, format: int64 }

ShoppingListDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/ShoppingListDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }

RecalculateShoppingListRequest:
  type: object
  required: [planId]
  properties:
    planId: { type: string, format: uuid }
    planGeneration:
      type: integer
      nullable: true

ShoppingListExportDto:
  type: object
  required: [shoppingListId, format, content]
  properties:
    shoppingListId: { type: string, format: uuid }
    format: { $ref: '#/ExportFormat' }
    content: { type: string }

# ===== Tier 2 — manual fulfilment (01d) =====

MarkBoughtRequest:
  type: object
  required: [shoppingListLineId, boughtQuantity, boughtUnit]
  properties:
    shoppingListLineId: { type: string, format: uuid }
    boughtQuantity: { type: number }
    boughtUnit:
      type: string
      enum: [g, kg, ml, l, items, pt, tsp, tbsp, cup]
    boughtPricePence:
      type: integer
      nullable: true
    store:
      type: string
      maxLength: 64
      nullable: true
    boughtAt:
      type: string
      format: date-time
      nullable: true

BulkMarkBoughtRequest:
  type: object
  required: [shoppingListId, shoppingListLineIds]
  properties:
    shoppingListId: { type: string, format: uuid }
    shoppingListLineIds:
      type: array
      minItems: 1
      items: { type: string, format: uuid }
    totalSpendPence:
      type: integer
      nullable: true
    store:
      type: string
      maxLength: 64
      nullable: true
    boughtAt:
      type: string
      format: date-time
      nullable: true

MarkBoughtResultDto:
  type: object
  required: [shoppingListLineId, newStatus]
  properties:
    shoppingListLineId: { type: string, format: uuid }
    newStatus: { $ref: '#/LineFulfilmentStatus' }
    priceObservationId:
      type: string
      format: uuid
      nullable: true
    inventoryItemId:
      type: string
      format: uuid
      nullable: true
    note:
      type: string
      maxLength: 255
      nullable: true

# ===== Tier 4 — price history (01c) =====

PriceSource:
  type: string
  enum: [PAID, QUOTE, MANUAL, MANUAL_ESTIMATED, INFLATION_INDEXED]

PriceAggregateDto:
  type: object
  required: [ingredientMappingKey, sampleCount, isStale]
  properties:
    ingredientMappingKey: { type: string, maxLength: 128 }
    store:
      type: string
      maxLength: 64
      nullable: true
    pointEstimatePence:
      type: integer
      nullable: true
    confidence:
      type: number
      format: double
      nullable: true
    minPence:
      type: integer
      nullable: true
    maxPence:
      type: integer
      nullable: true
    minObservedAt:
      type: string
      format: date-time
      nullable: true
    maxObservedAt:
      type: string
      format: date-time
      nullable: true
    lastSeenAt:
      type: string
      format: date-time
      nullable: true
    sampleCount: { type: integer }
    isStale: { type: boolean }

PriceObservationDto:
  type: object
  required: [id, userId, ingredientMappingKey, store, currency, source, confidenceWeight, observedAt]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    householdId:
      type: string
      format: uuid
      nullable: true
    ingredientMappingKey: { type: string, maxLength: 128 }
    store: { type: string, maxLength: 64 }
    providerProductId:
      type: string
      maxLength: 128
      nullable: true
    packSizeG:
      type: integer
      nullable: true
    packCount:
      type: integer
      nullable: true
    quantity:
      type: number
      nullable: true
    quantityUnit:
      type: string
      maxLength: 16
      nullable: true
    paidUnitPence:
      type: integer
      nullable: true
    paidTotalPence:
      type: integer
      nullable: true
    currency: { type: string, maxLength: 3 }
    source: { $ref: '#/PriceSource' }
    confidenceWeight: { type: number, format: double }
    groceryOrderId:
      type: string
      format: uuid
      nullable: true
    shoppingListLineId:
      type: string
      format: uuid
      nullable: true
    observedAt: { type: string, format: date-time }
    note:
      type: string
      maxLength: 255
      nullable: true

PriceObservationDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/PriceObservationDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }

RecordManualPriceRequest:
  type: object
  required: [ingredientMappingKey, store]
  properties:
    ingredientMappingKey: { type: string, minLength: 1, maxLength: 128 }
    store: { type: string, minLength: 1, maxLength: 64 }
    paidTotalPence:
      type: integer
      nullable: true
    quantity:
      type: number
      nullable: true
    quantityUnit:
      type: string
      maxLength: 16
      nullable: true
    observedAt:
      type: string
      format: date-time
      nullable: true

RefreshPricesRequest:
  type: object
  required: [userId]
  properties:
    userId: { type: string, format: uuid }
    ingredientMappingKeys:
      type: array
      maxItems: 200
      items: { type: string, minLength: 1 }
      nullable: true
    useProviderQuote: { type: boolean }

RefreshPricesResultDto:
  type: object
  required: [observationsWritten, ingredientsRefreshed, aiUnavailableFallbackUsed]
  properties:
    observationsWritten: { type: integer }
    ingredientsRefreshed: { type: integer }
    aiUnavailableFallbackUsed: { type: boolean }
    fallbackMessage:
      type: string
      nullable: true

# ===== Tier 3 — grocery order (01e) =====

GroceryOrderStatus:
  type: string
  enum:
    [DRAFT, QUOTED, PLACED, PLACED_PARTIAL, AWAITING_USER_CONFIRMATION, CONFIRMED, DELIVERED,
     RECONCILED, CANCELLED, ARCHIVED, PROVIDER_UNAVAILABLE]

OrderLineStatus:
  type: string
  enum: [QUEUED, ADDED, ADDED_PARTIAL, UNAVAILABLE, SUBSTITUTED, DELIVERED, REJECTED]

SubstitutionProposalStatus:
  type: string
  enum: [PENDING_USER_REVIEW, ACCEPTED, REJECTED, UNPARSED]

GroceryOrderLineDto:
  type: object
  required:
    [id, ingredientMappingKey, displayName, quantityRequested, quantityUnit, lineStatus]
  properties:
    id: { type: string, format: uuid }
    shoppingListLineId:
      type: string
      format: uuid
      nullable: true
    providerProductId:
      type: string
      maxLength: 128
      nullable: true
    ingredientMappingKey: { type: string, maxLength: 128 }
    displayName: { type: string, maxLength: 255 }
    quantityRequested: { type: number }
    quantityUnit: { type: string, maxLength: 16 }
    packSizeG:
      type: integer
      nullable: true
    packCountRequested:
      type: integer
      nullable: true
    packCountDelivered:
      type: integer
      nullable: true
    quotedUnitPence:
      type: integer
      nullable: true
    confirmedUnitPence:
      type: integer
      nullable: true
    paidUnitPence:
      type: integer
      nullable: true
    lineStatus: { $ref: '#/OrderLineStatus' }
    note:
      type: string
      maxLength: 255
      nullable: true

GrocerySubstitutionProposalDto:
  type: object
  required:
    [id, groceryOrderId, originalProductId, originalDisplayName, substituteProductId,
     substituteDisplayName, proposalStatus]
  properties:
    id: { type: string, format: uuid }
    groceryOrderId: { type: string, format: uuid }
    groceryOrderLineId:
      type: string
      format: uuid
      nullable: true
    originalProductId: { type: string, maxLength: 128 }
    originalDisplayName: { type: string, maxLength: 255 }
    originalIngredientMappingKey:
      type: string
      maxLength: 128
      nullable: true
    substituteProductId: { type: string, maxLength: 128 }
    substituteDisplayName: { type: string, maxLength: 255 }
    substituteIngredientMappingKey:
      type: string
      maxLength: 128
      nullable: true
    substituteQuantity:
      type: number
      nullable: true
    substituteUnit:
      type: string
      maxLength: 16
      nullable: true
    substituteUnitPence:
      type: integer
      nullable: true
    reason:
      type: string
      maxLength: 255
      nullable: true
    proposalStatus: { $ref: '#/SubstitutionProposalStatus' }
    resolvedAt:
      type: string
      format: date-time
      nullable: true
    resolvedByUserId:
      type: string
      format: uuid
      nullable: true

GroceryOrderDto:
  type: object
  required:
    [id, userId, shoppingListId, providerKey, status, currency, lines, version]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    householdId:
      type: string
      format: uuid
      nullable: true
    shoppingListId: { type: string, format: uuid }
    providerKey: { type: string, maxLength: 32 }
    providerOrderId:
      type: string
      maxLength: 128
      nullable: true
    status: { $ref: '#/GroceryOrderStatus' }
    statusReason:
      type: string
      maxLength: 255
      nullable: true
    quotedTotalPence:
      type: integer
      nullable: true
    confirmedTotalPence:
      type: integer
      nullable: true
    paidTotalPence:
      type: integer
      nullable: true
    currency: { type: string, maxLength: 3 }
    deliverySlotStart:
      type: string
      format: date-time
      nullable: true
    deliverySlotEnd:
      type: string
      format: date-time
      nullable: true
    confirmLink:
      type: string
      nullable: true
    placedAt:
      type: string
      format: date-time
      nullable: true
    confirmedAt:
      type: string
      format: date-time
      nullable: true
    deliveredAt:
      type: string
      format: date-time
      nullable: true
    reconciledAt:
      type: string
      format: date-time
      nullable: true
    cancelledAt:
      type: string
      format: date-time
      nullable: true
    cancelReason:
      type: string
      maxLength: 64
      nullable: true
    lastStatusCheckAt:
      type: string
      format: date-time
      nullable: true
    lines:
      type: array
      items: { $ref: '#/GroceryOrderLineDto' }
    outstandingProposals:
      type: array
      nullable: true
      items: { $ref: '#/GrocerySubstitutionProposalDto' }
    version: { type: integer, format: int64 }

GroceryOrderDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/GroceryOrderDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }

GroceryProviderStateDto:
  type: object
  required: [id, userId, providerKey, enabled, consecutiveFailures, scheduledRefreshEnabled, refreshTopNIngredients]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    providerKey: { type: string, maxLength: 32 }
    enabled: { type: boolean }
    sessionExpiresAt:
      type: string
      format: date-time
      nullable: true
    lastLoginAt:
      type: string
      format: date-time
      nullable: true
    lastFailureAt:
      type: string
      format: date-time
      nullable: true
    lastFailureReason:
      type: string
      maxLength: 255
      nullable: true
    consecutiveFailures: { type: integer }
    scheduledRefreshEnabled: { type: boolean }
    refreshTopNIngredients: { type: integer }

CreateOrderRequest:
  type: object
  required: [shoppingListId, providerKey]
  properties:
    shoppingListId: { type: string, format: uuid }
    providerKey: { type: string, minLength: 1 }

CancelOrderRequest:
  type: object
  required: [groceryOrderId]
  properties:
    groceryOrderId: { type: string, format: uuid }
    reason:
      type: string
      maxLength: 64
      nullable: true

ResolveSubstitutionRequest:
  type: object
  required: [proposalId, decision]
  properties:
    proposalId: { type: string, format: uuid }
    decision: { $ref: '#/SubstitutionProposalStatus' }

ProviderConnectionRequest:
  type: object
  required: [providerKey]
  properties:
    providerKey: { type: string, minLength: 1 }
    enabled: { type: boolean }
    scheduledRefreshEnabled: { type: boolean }
    refreshTopNIngredients:
      type: integer
      minimum: 0
      maximum: 200
      nullable: true
