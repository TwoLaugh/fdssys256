ProblemDetail:
  type: object
  description: RFC 9457 ProblemDetail; the canonical error shape across all endpoints.
  required: [type, title, status]
  properties:
    type:
      type: string
      format: uri
      description: A URI identifying the problem type.
      example: https://mealprep.example.com/problems/validation-error
    title:
      type: string
      description: Short human-readable summary.
      example: Validation failed
    status:
      type: integer
      description: HTTP status code.
      example: 400
    detail:
      type: string
      description: Human-readable explanation specific to this occurrence.
    instance:
      type: string
      format: uri
      description: A URI identifying the specific occurrence.
    errors:
      type: array
      description: Optional field-level validation errors.
      items:
        type: object
        properties:
          field: { type: string }
          message: { type: string }
          rejectedValue: {}
    reasons:
      type: array
      description: >-
        Optional machine-readable policy-rejection codes. Used by the auth
        weak-password response (type `.../problems/weak-password`) so a UI can
        render actionable feedback without the human-readable `detail` ever
        leaking block-list contents or specific policy reasons.
      items:
        type: string
        enum: [TOO_SHORT, TOO_LONG, LEADING_OR_TRAILING_WHITESPACE, MATCHES_USERNAME, BREACHED]
PageEnvelope:
  type: object
  description: >-
    Shared shape for Spring Data `Page<X>` JSON serialisation. Per-endpoint Page
    response schemas (e.g. PlanDtoPage, WasteEntryDtoPage) inline this shape with
    a concrete `content[]` item type; this schema is the canonical reference for
    consumers (and future spec-side helpers) that want the envelope type without
    duplicating its fields.
  required: [content, totalElements, totalPages, number, size, empty, first, last]
  properties:
    content:
      type: array
      description: Page content; override `items` per-endpoint with the concrete item type.
      items: { type: object }
    totalElements: { type: integer, format: int64, minimum: 0 }
    totalPages: { type: integer, minimum: 0 }
    number: { type: integer, minimum: 0, description: Zero-based page index. }
    size: { type: integer, minimum: 1, maximum: 100 }
    empty: { type: boolean }
    first: { type: boolean }
    last: { type: boolean }
    numberOfElements: { type: integer, minimum: 0 }
    sort:
      type: object
      additionalProperties: true
RecipeImportFailure:
  type: object
  description: >-
    RFC 9457 ProblemDetail returned by POST /api/v1/recipes/imports/url when a
    URL import fails (fetch leg or extraction leg). It is a self-contained
    superset of ProblemDetail (not an allOf composition) because the contract
    validator injects additionalProperties:false into every object schema and
    evaluates each allOf branch independently, so an allOf of ProblemDetail +
    the extension can never validate. Keep the shared members below in sync with
    ProblemDetail; the only addition is the machine-readable failureReason
    extension member documented in lld/recipe.md (Flow 2 failure modes).
  required: [type, title, status, failureReason]
  properties:
    type:
      type: string
      format: uri
      description: A URI identifying the problem type.
      example: https://mealprep.example.com/problems/recipe-import-failure
    title:
      type: string
      description: Short human-readable summary.
      example: Recipe import failed
    status:
      type: integer
      description: HTTP status code.
      example: 422
    detail:
      type: string
      description: Human-readable explanation specific to this occurrence.
    instance:
      type: string
      format: uri
      description: A URI identifying the specific occurrence.
    failureReason:
      type: string
      maxLength: 64
      description: >-
        Stable token identifying why the import failed. Known values:
        no_extractor_matched, fetch_timeout, fetch_io_error, oversize,
        schema_mismatch, and the dynamic forms fetch_4xx_<status> /
        fetch_5xx_<status> (e.g. fetch_4xx_404). Treat as an open
        vocabulary; unknown tokens should degrade gracefully.
