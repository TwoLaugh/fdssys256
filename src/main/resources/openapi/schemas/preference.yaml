      type: object
      additionalProperties: { type: string }
PreferenceMealTiming:
  type: object
  additionalProperties: false
  properties:
    preferredSchedule: { $ref: '#/PreferenceMealSchedule' }
    flexibility: { type: string, nullable: true }
    notes: { type: string, nullable: true }
PreferenceNoveltyMode:
  type: object
  additionalProperties: false
