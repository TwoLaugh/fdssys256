    newPerWeek: { type: integer, nullable: true }
PreferenceNoveltyTolerance:
  type: object
  additionalProperties: false
  properties:
    bySlot:
      type: object
      additionalProperties: { $ref: '#/PreferenceNoveltyMode' }
    recipeRepeatCooldownWeeks:
      type: object
      additionalProperties: { type: integer }
    ingredientFrequencyCaps:
      type: object
      additionalProperties: { type: string }
PreferenceIngredientCountRange:
  type: object
  additionalProperties: false
  required: [min, max]
  properties:
    min: { type: integer }
    max: { type: integer }
PreferenceCookingContext:
  type: object
  additionalProperties: false
  properties:
    maxTimeMins: { type: integer }
    complexity: { type: string, nullable: true }
    preferredStyles:
      type: array
      items: { type: string }
    preferredIngredientCount: { $ref: '#/PreferenceIngredientCountRange' }
    notes: { type: string, nullable: true }
    source: { type: string, nullable: true }
    frequency: { type: string, nullable: true }
PreferenceCookingContexts:
  type: object
  additionalProperties: false
  properties:
    byContext:
      type: object
      additionalProperties: { $ref: '#/PreferenceCookingContext' }
PreferencePrepDay:
  type: object
  additionalProperties: false
  properties:
    day: { type: string, nullable: true }
    window: { type: string, nullable: true }
    maxSessionHours: { type: integer }
    maxRecipes: { type: integer }
PreferenceFreezerTolerance:
  type: object
  additionalProperties: false
  properties:
    acceptable: { type: boolean }
    maxFrozenMealsPerWeek: { type: integer }
    exclusions:
      type: array
      items: { type: string }
PreferenceBatchCooking:
  type: object
  additionalProperties: false
  properties:
    prepDays:
      type: array
      items: { $ref: '#/PreferencePrepDay' }
    maxLeftoverDays:
      type: object
      additionalProperties: { type: integer }
    leftoverStrategy: { type: string, nullable: true }
    freezerTolerance: { $ref: '#/PreferenceFreezerTolerance' }
    sameProteinSameDay: { type: boolean }
    parallelCookingTolerance: { type: string, nullable: true }
PreferenceReheatRule:
  type: object
  additionalProperties: false
  properties:
    category: { type: string, nullable: true }
    rule: { type: string, nullable: true }
    reason: { type: string, nullable: true }
PreferenceReheatingPreferences:
  type: object
  additionalProperties: false
  properties:
    availableAtWork:
      type: array
      items: { type: string }
    availableAtHome:
      type: array
      items: { type: string }
    preferredMethod: { type: string, nullable: true }
    exclusions:
      type: array
      items: { $ref: '#/PreferenceReheatRule' }
    coldMealTolerance:
      type: array
      items: { type: string }
PreferenceContextEntry:
  type: object
  additionalProperties: false
  properties:
    location: { type: string, nullable: true }
    format: { type: string, nullable: true }
    constraints:
      type: array
      items: { type: string }
PreferenceEatingContext:
  type: object
  additionalProperties: false
  properties:
    bySlot:
      type: object
      additionalProperties: { $ref: '#/PreferenceContextEntry' }
PreferenceSeasonPolicy:
  type: object
  additionalProperties: false
  properties:
    leanToward:
      type: array
      items: { type: string }
    avoid:
      type: array
      items: { type: string }
PreferenceSeasonalPreferences:
  type: object
  additionalProperties: false
  properties:
    bySeason:
      type: object
      additionalProperties: { $ref: '#/PreferenceSeasonPolicy' }
PreferenceMealTypeRule:
  type: object
  additionalProperties: false
  properties:
    varietyTolerance: { type: string, nullable: true }
    complexityTolerance: { type: string, nullable: true }
    staples:
      type: array
      items: { type: string }
    notes: { type: string, nullable: true }
PreferenceMealTypePreferences:
  type: object
  additionalProperties: false
  properties:
    byType:
      type: object
      additionalProperties: { $ref: '#/PreferenceMealTypeRule' }
PreferenceBeveragePolicy:
  type: object
  additionalProperties: false
  properties:
    withMeals: { type: string, nullable: true }
    morning: { type: string, nullable: true }
    avoids:
      type: array
      items: { type: string }
PreferenceSidesPolicy:
  type: object
  additionalProperties: false
  properties:
    notes: { type: string, nullable: true }
PreferenceAccompaniments:
  type: object
  additionalProperties: false
  properties:
    beverages: { $ref: '#/PreferenceBeveragePolicy' }
    sides: { $ref: '#/PreferenceSidesPolicy' }
PreferenceGroceryQualityPreferences:
  type: object
  additionalProperties: false
  properties:
    organic: { type: string, nullable: true }
    freeRangeEggs: { type: string, nullable: true }
    freeRangeMeat: { type: string, nullable: true }
    brandedVsOwnLabel: { type: string, nullable: true }
    notes: { type: string, nullable: true }
PreferencePantryTracking:
  type: object
  additionalProperties: false
  required: [enabled]
  properties:
    enabled: { type: boolean }
PreferenceLifestyleConfigDocument:
  type: object
  additionalProperties: false
  properties:
    mealStructure: { $ref: '#/PreferenceMealStructure' }
    mealTiming: { $ref: '#/PreferenceMealTiming' }
    noveltyTolerance: { $ref: '#/PreferenceNoveltyTolerance' }
    cookingContexts: { $ref: '#/PreferenceCookingContexts' }
    batchCooking: { $ref: '#/PreferenceBatchCooking' }
    reheatingPreferences: { $ref: '#/PreferenceReheatingPreferences' }
    eatingContext: { $ref: '#/PreferenceEatingContext' }
    seasonalPreferences: { $ref: '#/PreferenceSeasonalPreferences' }
    mealTypePreferences: { $ref: '#/PreferenceMealTypePreferences' }
    accompaniments: { $ref: '#/PreferenceAccompaniments' }
    groceryQualityPreferences: { $ref: '#/PreferenceGroceryQualityPreferences' }
    pantryTracking: { $ref: '#/PreferencePantryTracking' }
LifestyleConfigDto:
  type: object
  required: [id, userId, document, optimisticVersion, createdAt, updatedAt]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    document: { $ref: '#/PreferenceLifestyleConfigDocument' }
    lastReviewPromptAt: { type: string, format: date-time, nullable: true }
    optimisticVersion: { type: integer, format: int64 }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
UpdateLifestyleConfigRequest:
  type: object
  required: [document, expectedVersion]
  properties:
    document: { $ref: '#/PreferenceLifestyleConfigDocument' }
    expectedVersion:
      type: integer
      format: int64
      minimum: 0
LifestyleConfigAuditEntryDto:
  type: object
  required: [id, actorUserId, fieldPath, previousValueJson, newValueJson, occurredAt]
  properties:
    id: { type: string, format: uuid }
    actorUserId: { type: string, format: uuid }
    fieldPath: { type: string }
    previousValueJson: {}
    newValueJson: {}
    occurredAt: { type: string, format: date-time }
# ============================================================================
# Taste profile (01c) — canonical record-tree mirror of the JSONB document.
# Household's lightweight TasteProfileDocument stub is preserved local-only in
# household.yaml (used inside SoftPreferenceBundleDto's inline shape) but the
# global components.schemas.TasteProfileDocument points here.
# ============================================================================
TasteVectorStatus:
  type: string
  enum: [PENDING, EMBEDDED, FAILED]
TasteProfileTrigger:
  type: string
  enum: [BATCH, WEEKLY, MANUAL]
ActorType:
  type: string
  enum: [USER, AI, SYSTEM]
TasteProfileChangeType:
  type: string
  enum: [INITIALIZED, MANUAL_OVERRIDE, AI_DELTA_APPLIED, REFRESH_TRIGGERED, ROLLED_BACK]
IngredientPreferenceSource:
  type: string
  enum: [FEEDBACK, INFERRED, ONBOARDING]
ExperimentStatus:
  type: string
  enum: [TESTING, PROMOTED, DISCARDED]
SkillLevel:
  type: string
  enum: [BEGINNER, INTERMEDIATE, ADVANCED]
SoftIntolerance:
  type: object
  additionalProperties: false
  properties:
    substance: { type: string, maxLength: 64 }
    severity: { type: string, maxLength: 32 }
    notes: { type: string, maxLength: 255, nullable: true }
SoftConstraintsSection:
  type: object
  additionalProperties: false
  properties:
    intolerances:
      type: array
      maxItems: 30
      items: { $ref: '#/SoftIntolerance' }
FlavourPreferences:
  type: object
  additionalProperties: false
  properties:
    likes:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    dislikes:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    notes: { type: string, maxLength: 512, nullable: true }
TexturePreferences:
  type: object
  additionalProperties: false
  properties:
    likes:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    dislikes:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
IngredientPreference:
  type: object
  additionalProperties: false
  properties:
    item: { type: string, maxLength: 128 }
    evidenceCount: { type: integer }
    lastSignal: { type: string, format: date, nullable: true }
    source: { $ref: '#/IngredientPreferenceSource' }
TrendingIngredient:
  type: object
  additionalProperties: false
  properties:
    item: { type: string, maxLength: 128 }
    evidenceCount: { type: integer }
    firstSignal: { type: string, format: date, nullable: true }
IngredientPreferencesSection:
  type: object
  additionalProperties: false
  properties:
    favourites:
      type: array
      maxItems: 50
      items: { $ref: '#/IngredientPreference' }
    disliked:
      type: array
      maxItems: 50
      items: { $ref: '#/IngredientPreference' }
    trendingPositive:
      type: array
      maxItems: 50
      items: { $ref: '#/TrendingIngredient' }
    trendingNegative:
      type: array
      maxItems: 50
      items: { $ref: '#/TrendingIngredient' }
CuisinePreferences:
  type: object
  additionalProperties: false
  properties:
    favourites:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    enjoys:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    lessPreferred:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    notes: { type: string, maxLength: 512, nullable: true }
CookingPreferences:
  type: object
  additionalProperties: false
  properties:
    skillLevel: { $ref: '#/SkillLevel' }
    preferredMethods:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
    dislikedMethods:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 64 }
PortionStyle:
  type: object
  additionalProperties: false
  properties:
    preference: { type: string, maxLength: 64, nullable: true }
    saladMeals: { type: string, maxLength: 64, nullable: true }
HouseholdContextSection:
  type: object
  additionalProperties: false
  properties:
    individualOnlyPreferences:
      type: array
      maxItems: 30
      items: { type: string, maxLength: 128 }
    householdSuitableNotes: { type: string, maxLength: 512, nullable: true }
RecipeRecommendation:
  type: object
  additionalProperties: false
  properties:
    name: { type: string, maxLength: 128 }
    suitableFor: { type: string, maxLength: 64, nullable: true }
    reason: { type: string, maxLength: 512, nullable: true }
ActiveExperiment:
  type: object
  additionalProperties: false
  properties:
    hypothesis: { type: string, maxLength: 512 }
    status: { $ref: '#/ExperimentStatus' }
    evidenceFor: { type: integer }
    evidenceAgainst: { type: integer }
    created: { type: string, format: date, nullable: true }
TasteProfileDocument:
  type: object
  additionalProperties: false
  description: |
    Canonical taste profile document — preference-01c owns this schema; the AI never produces it whole, it
    produces deltas applied to this structure by the (deferred) delta-applier pipeline.
  properties:
    lastUpdated: { type: string, format: date, nullable: true }
    version: { type: integer }
    basedOnFeedbackCount: { type: integer }
    feedbackCursor: { type: string, maxLength: 64, nullable: true }
    softConstraints: { $ref: '#/SoftConstraintsSection' }
    flavourPreferences: { $ref: '#/FlavourPreferences' }
    texturePreferences: { $ref: '#/TexturePreferences' }
    ingredientPreferences: { $ref: '#/IngredientPreferencesSection' }
    cuisinePreferences: { $ref: '#/CuisinePreferences' }
    cookingPreferences: { $ref: '#/CookingPreferences' }
    portionStyle: { $ref: '#/PortionStyle' }
    householdContext: { $ref: '#/HouseholdContextSection' }
    recipesToRepeat:
      type: array
      maxItems: 50
      items: { $ref: '#/RecipeRecommendation' }
    recipesToAvoid:
      type: array
      maxItems: 50
      items: { $ref: '#/RecipeRecommendation' }
    activeExperiments:
      type: array
      maxItems: 20
      items: { $ref: '#/ActiveExperiment' }
    learnedInsights:
      type: array
      maxItems: 20
      items: { type: string, maxLength: 512 }
TasteProfileDto:
  type: object
  required: [id, userId, document, documentVersion, basedOnFeedbackCount, tasteVectorStatus, optimisticVersion]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    document: { $ref: '#/TasteProfileDocument' }
    documentVersion: { type: integer, minimum: 1 }
    feedbackCursor: { type: string, maxLength: 64, nullable: true }
    basedOnFeedbackCount: { type: integer, minimum: 0 }
    lastDeltaAppliedAt: { type: string, format: date-time, nullable: true }
    lastTokenEstimate: { type: integer, nullable: true }
    tasteVectorStatus: { $ref: '#/TasteVectorStatus' }
    optimisticVersion: { type: integer, format: int64 }
    createdAt: { type: string, format: date-time, nullable: true }
    updatedAt: { type: string, format: date-time, nullable: true }
TasteProfileVersionDto:
  type: object
  required: [id, tasteProfileId, documentVersion, documentSnapshot, trigger, deltasApplied, modelTierUsed, generatedAt]
  properties:
    id: { type: string, format: uuid }
    tasteProfileId: { type: string, format: uuid }
    documentVersion: { type: integer, minimum: 1 }
    documentSnapshot: { $ref: '#/TasteProfileDocument' }
    feedbackRangeStart: { type: string, maxLength: 64, nullable: true }
    feedbackRangeEnd: { type: string, maxLength: 64, nullable: true }
    trigger: { $ref: '#/TasteProfileTrigger' }
    deltasApplied: {}
    modelTierUsed: { type: string, maxLength: 16 }
    generatedAt: { type: string, format: date-time }
TasteProfileAuditEntryDto:
  type: object
  required: [id, actorUserId, actorType, changeType, newDocumentVersion, occurredAt]
  properties:
    id: { type: string, format: uuid }
    actorUserId: { type: string, format: uuid }
    actorType: { $ref: '#/ActorType' }
    changeType: { $ref: '#/TasteProfileChangeType' }
    previousDocumentVersion: { type: integer, nullable: true }
    newDocumentVersion: { type: integer }
    summary: { type: string, maxLength: 512, nullable: true }
    traceId: { type: string, format: uuid, nullable: true }
    occurredAt: { type: string, format: date-time }
UpdateTasteProfileRequest:
  type: object
  required: [document, expectedVersion]
  properties:
    document: { $ref: '#/TasteProfileDocument' }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
TriggerTasteProfileRefreshRequest:
  type: object
  properties:
    feedbackRangeStart: { type: string, maxLength: 64, nullable: true }
    feedbackRangeEnd: { type: string, maxLength: 64, nullable: true }
# ============================================================================
# Preference archive (01e) — pruned-item retention + re-emergence storage.
# ============================================================================
PreferenceArchiveEntryDto:
  type: object
  required: [id, userId, fieldPath, itemKey, itemPayload, evidenceCount, archivedAt, archivedReason]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    fieldPath: { type: string, maxLength: 128 }
    itemKey: { type: string, maxLength: 128 }
    itemPayload: { type: object, additionalProperties: true }
    evidenceCount: { type: integer, minimum: 0 }
    lastSignalAt: { type: string, format: date, nullable: true }
    archivedAt: { type: string, format: date-time }
    archivedReason: { type: string, enum: [LOW_EVIDENCE, STALE, TOKEN_PRESSURE] }
    rePromotedAt: { type: string, format: date-time, nullable: true }
PreferenceArchiveEntryDtoPage:
  type: object
  description: 'Paged response of PreferenceArchiveEntryDto rows.'
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/PreferenceArchiveEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
