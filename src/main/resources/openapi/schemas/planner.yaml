PlanStatus:
  type: string
  enum: [DRAFT, GENERATED, ACTIVE, SUPERSEDED, COMPLETED, REJECTED, ABANDONED]
TriggerKind:
  type: string
  enum: [USER_INITIATED, SCHEDULED_WEEKLY, MID_WEEK_REOPT]
PlannerSlotKind:
  type: string
  enum: [BREAKFAST, LUNCH, DINNER, SNACK, CUSTOM]
SlotState:
  type: string
  enum: [PLANNED, COOKING, COOKED, EATEN, SKIPPED]
PinnedReason:
  type: string
  enum: [EATEN, COOKED, COOKING, SKIPPED, USER_PINNED]
AugmentationSource:
  type: string
  enum: [LLM, USER]
ReoptTriggerKind:
  type: string
  enum: [PROVISIONS, NUTRITION, PREFERENCE, HOUSEHOLD_SETTINGS, USER]
ReoptStatus:
  type: string
  enum: [PENDING, ACCEPTED, DISMISSED, EXPIRED]

DailyRollupDocument:
  type: object
  required: [date, kcal, proteinG, fatG, carbsG, fibreG, costGbp, totalTimeMin, violations]
  properties:
    date: { type: string, format: date }
    kcal: { type: integer }
    proteinG: { type: number }
    fatG: { type: number }
    carbsG: { type: number }
    fibreG: { type: number }
    costGbp: { type: number }
    totalTimeMin: { type: integer }
    violations:
      type: array
      items: { type: string }

WeeklyRollupDocument:
  type: object
  required:
    - kcalTotal
    - proteinAvgG
    - fatAvgG
    - carbsAvgG
    - costEstimateGbp
    - costConfidence
    - staleIngredientCount
    - varietyIndex
    - batchCookSessions
    - constraintViolations
  properties:
    kcalTotal: { type: integer }
    proteinAvgG: { type: number }
    fatAvgG: { type: number }
    carbsAvgG: { type: number }
    costEstimateGbp: { type: number }
    costConfidence: { type: number }
    staleIngredientCount: { type: integer }
    varietyIndex: { type: number }
    batchCookSessions: { type: integer }
    constraintViolations:
      type: array
      items: { type: string }

RollupSummaryDocument:
  type: object
  required: [daily, weekly]
  properties:
    daily:
      type: array
      items: { $ref: '#/DailyRollupDocument' }
    weekly: { $ref: '#/WeeklyRollupDocument' }

ScoreBreakdownDocument:
  type: object
  required:
    - preference
    - nutrition
    - cost
    - variety
    - time
    - batch
    - provisions
    - composite
    - nutritionFloorGatePassed
    - varietyGatePassed
    - weightSchemeVersion
  properties:
    preference: { type: number }
    nutrition: { type: number }
    cost: { type: number }
    variety: { type: number }
    time: { type: number }
    batch: { type: number }
    provisions: { type: number }
    composite: { type: number }
    nutritionFloorGatePassed: { type: boolean }
    varietyGatePassed: { type: boolean }
    weightSchemeVersion: { type: string }

ScheduledRecipeDto:
  type: object
  required: [id, recipeId, recipeVersionId, recipeBranchId, servings, phase2Addition]
  properties:
    id: { type: string, format: uuid }
    recipeId: { type: string, format: uuid }
    recipeVersionId: { type: string, format: uuid }
    recipeBranchId: { type: string, format: uuid }
    servings: { type: integer }
    batchCookSessionId: { type: string, format: uuid, nullable: true }
    augmentationNotes: { type: string, maxLength: 512, nullable: true }
    augmentationSource:
      type: string
      enum: [LLM, USER]
      nullable: true
    phase2Addition: { type: boolean }

MealSlotDto:
  type: object
  required: [id, slotIndex, kind, label, timeBudgetMin, shared, eaters, state]
  properties:
    id: { type: string, format: uuid }
    slotIndex: { type: integer }
    kind: { $ref: '#/PlannerSlotKind' }
    label: { type: string, maxLength: 64 }
    timeBudgetMin: { type: integer }
    shared: { type: boolean }
    eaters:
      type: array
      items: { type: string, format: uuid }
    state: { $ref: '#/SlotState' }
    pinnedReason:
      type: string
      enum: [EATEN, COOKED, COOKING, SKIPPED, USER_PINNED]
      nullable: true
    scheduledRecipe:
      # Inlined nullable object — $ref + nullable: true is silently ignored by OpenAPI 3.0
      # (gotchas #3). The same shape is published as a named ScheduledRecipeDto for reuse
      # in future write endpoints; here we inline.
      type: object
      nullable: true
      required: [id, recipeId, recipeVersionId, recipeBranchId, servings, phase2Addition]
      properties:
        id: { type: string, format: uuid }
        recipeId: { type: string, format: uuid }
        recipeVersionId: { type: string, format: uuid }
        recipeBranchId: { type: string, format: uuid }
        servings: { type: integer }
        batchCookSessionId: { type: string, format: uuid, nullable: true }
        augmentationNotes: { type: string, maxLength: 512, nullable: true }
        augmentationSource:
          type: string
          enum: [LLM, USER]
          nullable: true
        phase2Addition: { type: boolean }

DayDto:
  type: object
  required: [id, date, slots]
  properties:
    id: { type: string, format: uuid }
    date: { type: string, format: date }
    notes: { type: string, maxLength: 255, nullable: true }
    slots:
      type: array
      items: { $ref: '#/MealSlotDto' }

PlanDto:
  type: object
  required:
    - id
    - householdId
    - weekStartDate
    - generation
    - status
    - triggerKind
    - qualityWarning
    - coldStart
    - aiAugmented
    - traceId
    - decisionId
    - scoreBreakdown
    - rollupSummary
    - days
    - version
    - createdAt
    - updatedAt
  properties:
    id: { type: string, format: uuid }
    householdId: { type: string, format: uuid }
    weekStartDate: { type: string, format: date }
    generation: { type: integer }
    replacesPlanId: { type: string, format: uuid, nullable: true }
    status: { $ref: '#/PlanStatus' }
    triggerKind: { $ref: '#/TriggerKind' }
    triggerEventId: { type: string, format: uuid, nullable: true }
    qualityWarning: { type: boolean }
    coldStart: { type: boolean }
    aiAugmented: { type: boolean }
    traceId: { type: string, format: uuid }
    decisionId: { type: string, format: uuid }
    acceptedAt: { type: string, format: date-time, nullable: true }
    completedAt: { type: string, format: date-time, nullable: true }
    rejectedAt: { type: string, format: date-time, nullable: true }
    rejectedReason: { type: string, maxLength: 255, nullable: true }
    abandonedAt: { type: string, format: date-time, nullable: true }
    abandonedReason: { type: string, maxLength: 255, nullable: true }
    scoreBreakdown: { $ref: '#/ScoreBreakdownDocument' }
    rollupSummary: { $ref: '#/RollupSummaryDocument' }
    days:
      type: array
      items: { $ref: '#/DayDto' }
    version: { type: integer, format: int64 }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

ReoptSuggestionDto:
  type: object
  required:
    - id
    - householdId
    - weekStartDate
    - planId
    - triggerKind
    - affectedSlotIds
    - summary
    - status
    - createdAt
  properties:
    id: { type: string, format: uuid }
    householdId: { type: string, format: uuid }
    weekStartDate: { type: string, format: date }
    planId: { type: string, format: uuid }
    triggerKind: { $ref: '#/ReoptTriggerKind' }
    triggerEventId: { type: string, format: uuid, nullable: true }
    affectedSlotIds:
      type: array
      items: { type: string, format: uuid }
    summary: { type: string, maxLength: 255 }
    status: { $ref: '#/ReoptStatus' }
    expiresAt: { type: string, format: date-time, nullable: true }
    createdAt: { type: string, format: date-time }
    resolvedAt: { type: string, format: date-time, nullable: true }

PlanDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/PlanDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }

GeneratePlanRequest:
  type: object
  required: [householdId, weekStartDate]
  properties:
    householdId: { type: string, format: uuid }
    weekStartDate: { type: string, format: date }
    forceRegenerateIfActive: { type: boolean, default: false }

RejectPlanRequest:
  type: object
  properties:
    reason: { type: string, maxLength: 255, nullable: true }

AbandonPlanRequest:
  type: object
  properties:
    reason: { type: string, maxLength: 255, nullable: true }

SlotStateChangeRequest:
  type: object
  required: [newState]
  properties:
    newState: { $ref: '#/SlotState' }

ProposedSlotChange:
  type: object
  required: [slotId, newRecipeId, newServings]
  properties:
    slotId: { type: string, format: uuid }
    oldRecipeId: { type: string, format: uuid, nullable: true }
    newRecipeId: { type: string, format: uuid }
    newRecipeVersionId: { type: string, format: uuid, nullable: true }
    newRecipeBranchId: { type: string, format: uuid, nullable: true }
    newServings: { type: integer }
    reason: { type: string, nullable: true }

ProposedReoptAssignmentsDocument:
  type: object
  required: [schemaVersion, changes]
  properties:
    schemaVersion: { type: integer }
    changes:
      type: array
      items: { $ref: '#/ProposedSlotChange' }

PlanReoptSuggestionDto:
  type: object
  required: [id, planId, triggerKind, traceId, summary, status, proposedAssignments, createdAt]
  properties:
    id: { type: string, format: uuid }
    planId: { type: string, format: uuid }
    triggerKind: { $ref: '#/ReoptTriggerKind' }
    triggerEventId: { type: string, format: uuid, nullable: true }
    traceId: { type: string, format: uuid }
    decisionId: { type: string, format: uuid, nullable: true }
    summary: { type: string, maxLength: 255 }
    status:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED, EXPIRED]
    proposedAssignments: { $ref: '#/ProposedReoptAssignmentsDocument' }
    createdAt: { type: string, format: date-time }
    expiresAt: { type: string, format: date-time, nullable: true }

ReoptSuggestionDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/ReoptSuggestionDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }

PlannerDecisionRowDto:
  type: object
  required: [decisionId, traceId, inputs, createdAt]
  properties:
    decisionId: { type: string, format: uuid }
    parentDecisionId: { type: string, format: uuid, nullable: true }
    traceId: { type: string, format: uuid }
    kind: { type: string, nullable: true, example: "STAGE_C_DONE" }
    inputs:
      type: object
      additionalProperties: true
    outputs:
      type: object
      nullable: true
      additionalProperties: true
    reasoning: { type: string, nullable: true }
    createdAt: { type: string, format: date-time }

PlannerDecisionChainDto:
  type: object
  required: [planId, rows]
  description: >-
    A plan's decision-log chain (planner-01l). rows is ordered by createdAt ascending and forms a
    single connected DAG via parentDecisionId. Plans generated before planner-01l shipped have no
    rows (empty list; no retroactive backfill).
  properties:
    planId: { type: string, format: uuid }
    rows:
      type: array
      items: { $ref: '#/PlannerDecisionRowDto' }
