Goal:
  type: string
  enum: [LOSE_WEIGHT, MAINTAIN, GAIN_WEIGHT]
EnforcementDirection:
  type: string
  enum: [UPPER_LIMIT, LOWER_FLOOR, BOTH_BOUNDED]
MealSlot:
  type: string
  enum: [BREAKFAST, LUNCH, DINNER, SNACKS]
ActivityLevel:
  type: string
  enum: [REST_DAY, LIGHT_ACTIVITY, TRAINING_DAY, HEAVY_TRAINING]
ActorKind:
  type: string
  enum: [USER, HEALTH_DIRECTIVE, FEEDBACK]
CalorieTargetDto:
  type: object
  required: [dailyTarget, toleranceUnder, toleranceOver, enforcement, direction]
  properties:
    dailyTarget: { type: integer, minimum: 0 }
    toleranceUnder: { type: integer, minimum: 0 }
    toleranceOver: { type: integer, minimum: 0 }
    enforcement: { type: string, maxLength: 24 }
    direction: { $ref: '#/EnforcementDirection' }
MacroTargetDto:
  type: object
  required: [direction]
  properties:
    targetG: { type: number, format: double, minimum: 0, nullable: true }
    floorG: { type: number, format: double, minimum: 0, nullable: true }
    enforcement: { type: string, maxLength: 24, nullable: true }
    direction: { $ref: '#/EnforcementDirection' }
PerMealDistributionDto:
  type: object
  required: [mealSlot, calorieTarget, proteinTargetG]
  properties:
    mealSlot: { $ref: '#/MealSlot' }
    calorieTarget: { type: integer, minimum: 0 }
    proteinTargetG: { type: number, format: double, minimum: 0 }
MicroTargetDto:
  type: object
  required: [nutrientKey]
  properties:
    nutrientKey: { type: string, minLength: 1, maxLength: 48 }
    targetValue: { type: number, format: double, minimum: 0, nullable: true }
    upperLimit: { type: number, format: double, minimum: 0, nullable: true }
    sourcePreference: { type: string, maxLength: 24, nullable: true }
    notes: { type: string, maxLength: 255, nullable: true }
EatingWindowDto:
  type: object
  required: [enabled]
  nullable: true
  properties:
    enabled: { type: boolean }
    windowStart: { type: string, format: time, nullable: true }
    windowEnd: { type: string, format: time, nullable: true }
    notes: { type: string, maxLength: 255, nullable: true }
ActivityAdjustmentDto:
  type: object
  required: [activityLevel, calorieModifier, carbModifierG]
  properties:
    activityLevel: { $ref: '#/ActivityLevel' }
    calorieModifier: { type: integer }
    carbModifierG: { type: integer }
TargetsDto:
  type: object
  required:
    - id
    - userId
    - goal
    - calories
    - protein
    - carbs
    - fat
    - fibre
    - satFat
    - userOverriddenDirections
    - perMealDistribution
    - microTargets
    - activityAdjustments
    - createdAt
    - version
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    goal: { $ref: '#/Goal' }
    calories: { $ref: '#/CalorieTargetDto' }
    protein: { $ref: '#/MacroTargetDto' }
    carbs: { $ref: '#/MacroTargetDto' }
    fat: { $ref: '#/MacroTargetDto' }
    fibre: { $ref: '#/MacroTargetDto' }
    satFat: { $ref: '#/MacroTargetDto' }
    notes: { type: string, maxLength: 512, nullable: true }
    userOverriddenDirections:
      type: array
      items: { type: string }
    perMealDistribution:
      type: array
      items: { $ref: '#/PerMealDistributionDto' }
    microTargets:
      type: array
      items: { $ref: '#/MicroTargetDto' }
    eatingWindow:
      type: object
      nullable: true
      required: [enabled]
      properties:
        enabled: { type: boolean }
        windowStart: { type: string, format: time, nullable: true }
        windowEnd: { type: string, format: time, nullable: true }
        notes: { type: string, maxLength: 255, nullable: true }
    activityAdjustments:
      type: array
      items: { $ref: '#/ActivityAdjustmentDto' }
    createdAt: { type: string, format: date-time }
    version: { type: integer, format: int64 }
UpdateTargetsRequest:
  type: object
  required:
    - goal
    - calories
    - protein
    - carbs
    - fat
    - fibre
    - satFat
    - perMealDistribution
    - microTargets
    - activityAdjustments
    - expectedVersion
  properties:
    goal: { $ref: '#/Goal' }
    calories: { $ref: '#/CalorieTargetDto' }
    protein: { $ref: '#/MacroTargetDto' }
    carbs: { $ref: '#/MacroTargetDto' }
    fat: { $ref: '#/MacroTargetDto' }
    fibre: { $ref: '#/MacroTargetDto' }
    satFat: { $ref: '#/MacroTargetDto' }
    notes: { type: string, maxLength: 512, nullable: true }
    perMealDistribution:
      type: array
      maxItems: 4
      items: { $ref: '#/PerMealDistributionDto' }
    microTargets:
      type: array
      maxItems: 30
      items: { $ref: '#/MicroTargetDto' }
    eatingWindow:
      type: object
      nullable: true
      required: [enabled]
      properties:
        enabled: { type: boolean }
        windowStart: { type: string, format: time, nullable: true }
        windowEnd: { type: string, format: time, nullable: true }
        notes: { type: string, maxLength: 255, nullable: true }
    activityAdjustments:
      type: array
      maxItems: 4
      items: { $ref: '#/ActivityAdjustmentDto' }
    expectedVersion:
      type: integer
      format: int64
      minimum: 0
NutritionTargetsAuditEntryDto:
  type: object
  required: [id, targetsId, actorUserId, actorKind, fieldPath, previousValueJson, newValueJson, occurredAt]
  properties:
    id: { type: string, format: uuid }
    targetsId: { type: string, format: uuid }
    actorUserId: { type: string, format: uuid }
    actorKind: { $ref: '#/ActorKind' }
    sourceDirectiveId: { type: string, format: uuid, nullable: true }
    fieldPath: { type: string, maxLength: 96 }
    previousValueJson: {}
    newValueJson: {}
    occurredAt: { type: string, format: date-time }
NutritionTargetsAuditEntryDtoPage:
  type: object
  additionalProperties: true
  properties:
    content:
      type: array
      items: { $ref: '#/NutritionTargetsAuditEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    numberOfElements: { type: integer }
    empty: { type: boolean }
IntakeSlotStatus:
  type: string
  enum: [PENDING, CONFIRMED, OVERRIDDEN, EDITED, SKIPPED]
IntakeAuditAction:
  type: string
  enum: [PREFILL, CONFIRM, OVERRIDE, EDIT, SKIP, SNACK_ADD, SNACK_REMOVE]
IntakeSource:
  type: string
  enum: [USDA, OPEN_FOOD_FACTS, MANUAL, PREFERENCE_ACCOMPANIMENT]
PlannedIntakeDto:
  type: object
  properties:
    recipeId: { type: string, format: uuid, nullable: true }
    calories: { type: integer, minimum: 0, nullable: true }
    proteinG: { type: number, format: double, minimum: 0, nullable: true }
    carbsG: { type: number, format: double, minimum: 0, nullable: true }
    fatG: { type: number, format: double, minimum: 0, nullable: true }
    fibreG: { type: number, format: double, minimum: 0, nullable: true }
    micros:
      type: object
      additionalProperties: { type: number, format: double }
      nullable: true
ActualIntakeDto:
  type: object
  required: [status, needsAiParse]
  properties:
    status: { $ref: '#/IntakeSlotStatus' }
    calories: { type: integer, minimum: 0, nullable: true }
    proteinG: { type: number, format: double, minimum: 0, nullable: true }
    carbsG: { type: number, format: double, minimum: 0, nullable: true }
    fatG: { type: number, format: double, minimum: 0, nullable: true }
    fibreG: { type: number, format: double, minimum: 0, nullable: true }
    micros:
      type: object
      additionalProperties: { type: number, format: double }
      nullable: true
    overrideFreeText: { type: string, maxLength: 512, nullable: true }
    overriddenAt: { type: string, format: date-time, nullable: true }
    needsAiParse: { type: boolean }
IntakeSlotDto:
  type: object
  required: [id, mealSlot, planned, actual]
  properties:
    id: { type: string, format: uuid }
    mealSlot: { $ref: '#/MealSlot' }
    planned: { $ref: '#/PlannedIntakeDto' }
    actual: { $ref: '#/ActualIntakeDto' }
IntakeSnackDto:
  type: object
  required: [id, freeText, quantityG, calories, proteinG, carbsG, fatG, source, loggedAt]
  properties:
    id: { type: string, format: uuid }
    ingredientMappingKey: { type: string, maxLength: 255, nullable: true }
    freeText: { type: string, minLength: 1, maxLength: 255 }
    quantityG: { type: number, format: double, minimum: 0 }
    calories: { type: integer, minimum: 0 }
    proteinG: { type: number, format: double, minimum: 0 }
    carbsG: { type: number, format: double, minimum: 0 }
    fatG: { type: number, format: double, minimum: 0 }
    fibreG: { type: number, format: double, minimum: 0, nullable: true }
    micros:
      type: object
      additionalProperties: { type: number, format: double }
      nullable: true
    source: { $ref: '#/IntakeSource' }
    loggedAt: { type: string, format: date-time }
IntakeDayDto:
  type: object
  required: [id, userId, onDate, slots, snacks, version]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    onDate: { type: string, format: date }
    planId: { type: string, format: uuid, nullable: true }
    slots:
      type: array
      items: { $ref: '#/IntakeSlotDto' }
    snacks:
      type: array
      items: { $ref: '#/IntakeSnackDto' }
    version: { type: integer, format: int64 }
IntakeEntryDto:
  type: object
  required: [calories, proteinG, carbsG, fatG]
  properties:
    calories: { type: integer, minimum: 0 }
    proteinG: { type: number, format: double, minimum: 0 }
    carbsG: { type: number, format: double, minimum: 0 }
    fatG: { type: number, format: double, minimum: 0 }
    fibreG: { type: number, format: double, minimum: 0, nullable: true }
    micros:
      type: object
      additionalProperties: { type: number, format: double }
      nullable: true
OverrideIntakeRequest:
  type: object
  required: [freeText]
  properties:
    freeText: { type: string, minLength: 1, maxLength: 512 }
LogSnackRequest:
  type: object
  required: [freeText, quantityG, calories, proteinG, carbsG, fatG, source]
  properties:
    freeText: { type: string, minLength: 1, maxLength: 255 }
    ingredientMappingKey: { type: string, maxLength: 255, nullable: true }
    quantityG: { type: number, format: double, minimum: 0 }
    calories: { type: integer, minimum: 0 }
    proteinG: { type: number, format: double, minimum: 0 }
    carbsG: { type: number, format: double, minimum: 0 }
    fatG: { type: number, format: double, minimum: 0 }
    fibreG: { type: number, format: double, minimum: 0, nullable: true }
    micros:
      type: object
      additionalProperties: { type: number, format: double }
      nullable: true
    source: { $ref: '#/IntakeSource' }
    deductFromPantry:
      type: boolean
      default: false
      nullable: true
      description: Reserved for nutrition-01l. Currently a no-op.
IntakeAuditEntryDto:
  type: object
  required: [id, intakeDayId, actorUserId, action, occurredAt]
  properties:
    id: { type: string, format: uuid }
    intakeDayId: { type: string, format: uuid }
    actorUserId: { type: string, format: uuid }
    action: { $ref: '#/IntakeAuditAction' }
    mealSlot:
      type: string
      enum: [BREAKFAST, LUNCH, DINNER, SNACKS]
      nullable: true
    snackId: { type: string, format: uuid, nullable: true }
    previousValue: {}
    newValue: {}
    occurredAt: { type: string, format: date-time }
IntakeAuditEntryDtoPage:
  type: object
  additionalProperties: true
  properties:
    content:
      type: array
      items: { $ref: '#/IntakeAuditEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    numberOfElements: { type: integer }
    empty: { type: boolean }
DailyActivityDto:
  type: object
  required: [id, userId, onDate, activityLevel, createdAt]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    onDate: { type: string, format: date }
    activityLevel: { $ref: '#/ActivityLevel' }
    notes: { type: string, maxLength: 255, nullable: true }
    createdAt: { type: string, format: date-time }
UpsertDailyActivityRequest:
  type: object
  required: [activityLevel]
  properties:
    activityLevel: { $ref: '#/ActivityLevel' }
    notes: { type: string, maxLength: 255, nullable: true }
PlannedSlotInputDto:
  type: object
  required: [mealSlot]
  properties:
    mealSlot: { $ref: '#/MealSlot' }
    plannedRecipeId: { type: string, format: uuid, nullable: true }
    plannedCalories: { type: integer, minimum: 0, nullable: true }
    plannedProteinG: { type: number, format: double, minimum: 0, nullable: true }
    plannedCarbsG: { type: number, format: double, minimum: 0, nullable: true }
    plannedFatG: { type: number, format: double, minimum: 0, nullable: true }
    plannedFibreG: { type: number, format: double, minimum: 0, nullable: true }
    plannedMicros:
      type: object
      additionalProperties: { type: number, format: double }
      nullable: true
FoodMoodEntryDto:
  type: object
  required: [id, userId, onDate, journalEntry, loggedAt, optimisticVersion]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    onDate: { type: string, format: date }
    mealSlot:
      type: string
      enum: [BREAKFAST, LUNCH, DINNER, SNACKS]
      nullable: true
    journalEntry: { type: string, maxLength: 4000 }
    loggedAt: { type: string, format: date-time }
    optimisticVersion: { type: integer, format: int64 }
UpsertFoodMoodEntryRequest:
  type: object
  required: [onDate, journalEntry, loggedAt]
  properties:
    onDate: { type: string, format: date }
    mealSlot:
      type: string
      enum: [BREAKFAST, LUNCH, DINNER, SNACKS]
      nullable: true
    journalEntry: { type: string, minLength: 1, maxLength: 4000 }
    loggedAt: { type: string, format: date-time }
    expectedVersion: { type: integer, format: int64, minimum: 0, default: 0 }
FoodMoodEntryDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/FoodMoodEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
JournalAction:
  type: string
  enum: [CREATED, UPDATED, DELETED]
  description: Used internally by FoodMoodEntryWrittenEvent; not surfaced via REST.
IngredientMappingSource:
  type: string
  enum: [USDA, OPEN_FOOD_FACTS, MANUAL]
IngredientNutritionDocument:
  type: object
  description: JSONB blob describing nutrition per 100g. All scalars nullable (USDA / OFF returns are sparse).
  properties:
    calories: { type: integer, nullable: true }
    proteinG: { type: number, format: double, nullable: true }
    carbsG: { type: number, format: double, nullable: true }
    fatG: { type: number, format: double, nullable: true }
    fibreG: { type: number, format: double, nullable: true }
    saturatedFatG: { type: number, format: double, nullable: true }
    sugarG: { type: number, format: double, nullable: true }
    micros:
      type: object
      additionalProperties: { type: number, format: double }
    vitamins:
      type: object
      additionalProperties: { type: number, format: double }
IngredientNutritionDto:
  type: object
  required: [searchTerm, source, nutritionPer100g, confidence, needsReview, version]
  properties:
    searchTerm: { type: string, maxLength: 255 }
    source: { $ref: '#/IngredientMappingSource' }
    externalId:
      type: string
      maxLength: 64
      nullable: true
    nutritionPer100g: { $ref: '#/IngredientNutritionDocument' }
    defaultPieceGrams:
      type: integer
      nullable: true
    confidence: { type: number, format: double, minimum: 0, maximum: 1 }
    needsReview: { type: boolean }
    lastVerifiedAt:
      type: string
      format: date-time
      nullable: true
    version: { type: integer, format: int64 }
IngredientLookupRequest:
  type: object
  required: [query]
  properties:
    query: { type: string, minLength: 1, maxLength: 255 }
    maxResults:
      type: integer
      minimum: 1
      maximum: 20
      default: 10
      nullable: true
IngredientLookupResultDto:
  type: object
  required: [hits, cacheOnly]
  properties:
    hits:
      type: array
      items: { $ref: '#/IngredientNutritionDto' }
    cacheOnly:
      type: boolean
      description: True in v1 (cache-only search). False once nutrition-01m wires live USDA/OFF search.
CorrectIngredientMappingRequest:
  type: object
  required: [override, expectedVersion]
  properties:
    override: { $ref: '#/IngredientNutritionDocument' }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
IngredientNutritionDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/IngredientNutritionDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
UnmappedIngredientDto:
  type: object
  required: [name, reason, confidence]
  properties:
    name: { type: string, maxLength: 255 }
    reason: { type: string, maxLength: 128 }
    confidence: { type: number, format: double, minimum: 0, maximum: 1 }
DirectiveStatus:
  type: string
  enum: [PENDING_REVIEW, ACCEPTED, REJECTED, SUPERSEDED, EXPIRED]
DirectiveType:
  type: string
  enum: [INGREDIENT_RESTRICTION, TARGET_ADJUSTMENT, MACRO_REBALANCE, ELIMINATION_TRIAL, REINTRODUCTION_PROTOCOL, SENSITIVITY_DOWNGRADE]
DirectiveConfidence:
  type: string
  enum: [LOW, MODERATE, HIGH]
SafetyGateVerdict:
  type: string
  enum: [PASSED, BLOCKED, PASSED_WITH_WARNINGS]
SafetyFindingDto:
  type: object
  required: [code, message, severity]
  properties:
    code: { type: string, maxLength: 64 }
    message: { type: string, maxLength: 512 }
    severity: { type: string, enum: [BLOCK, WARN, INFO] }
DirectivePhaseDto:
  type: object
  required: [phase]
  properties:
    phase: { type: string, maxLength: 32 }
    durationWeeks: { type: integer, minimum: 1, nullable: true }
    rule: { type: string, maxLength: 256, nullable: true }
DirectiveDurationDto:
  type: object
  required: [type]
  properties:
    type: { type: string, maxLength: 32 }
    phases:
      type: array
      nullable: true
      items: { $ref: '#/DirectivePhaseDto' }
    durationWeeks: { type: integer, minimum: 1, nullable: true }
DirectiveInstructionDocument:
  type: object
  required: [action]
  properties:
    action: { type: string, maxLength: 64 }
    target: { type: string, maxLength: 160, nullable: true }
    scope: { type: string, maxLength: 64, nullable: true }
    duration:
      type: object
      nullable: true
      properties:
        type: { type: string, maxLength: 32 }
        phases:
          type: array
          items: { $ref: '#/DirectivePhaseDto' }
        durationWeeks: { type: integer, minimum: 1, nullable: true }
    extras:
      type: object
      additionalProperties: true
HealthDirectiveDto:
  type: object
  required: [id, userId, externalDirectiveId, sourcePlatform, receivedAt, status, directiveType, instruction, mapsToModel, temporary, optimisticVersion]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    externalDirectiveId: { type: string, maxLength: 128 }
    sourcePlatform: { type: string, maxLength: 64 }
    receivedAt: { type: string, format: date-time }
    status: { $ref: '#/DirectiveStatus' }
    directiveType: { $ref: '#/DirectiveType' }
    evidenceSummary: { type: string, nullable: true }
    evidenceConfidence:
      type: string
      enum: [LOW, MODERATE, HIGH]
      nullable: true
    instruction: { $ref: '#/DirectiveInstructionDocument' }
    mapsToModel: { type: string, maxLength: 24 }
    mapsToTier: { type: string, maxLength: 48, nullable: true }
    temporary: { type: boolean }
    autoExpiresAt:
      type: string
      format: date-time
      nullable: true
    decidedAt:
      type: string
      format: date-time
      nullable: true
    decidedByUserId:
      type: string
      format: uuid
      nullable: true
    userModification:
      type: object
      nullable: true
      description: 'Same shape as instruction; supplied when the user accepted with a modification.'
      properties:
        action: { type: string }
        target: { type: string, nullable: true }
        scope: { type: string, nullable: true }
    rejectionReason: { type: string, maxLength: 255, nullable: true }
    safetyGateVerdict:
      type: string
      enum: [PASSED, BLOCKED, PASSED_WITH_WARNINGS]
      nullable: true
    safetyGateFindings:
      type: array
      nullable: true
      items: { $ref: '#/SafetyFindingDto' }
    optimisticVersion: { type: integer, format: int64 }
InboundHealthDirectiveRequest:
  type: object
  required: [externalDirectiveId, sourcePlatform, userId, directiveType, instruction, mapsToModel, temporary]
  properties:
    userId: { type: string, format: uuid }
    externalDirectiveId: { type: string, minLength: 1, maxLength: 128 }
    sourcePlatform: { type: string, minLength: 1, maxLength: 64 }
    directiveType: { $ref: '#/DirectiveType' }
    evidenceSummary:
      type: string
      maxLength: 4000
      nullable: true
    evidenceConfidence:
      type: string
      enum: [LOW, MODERATE, HIGH]
      nullable: true
    instruction: { $ref: '#/DirectiveInstructionDocument' }
    mapsToModel: { type: string, minLength: 1, maxLength: 24 }
    mapsToTier: { type: string, maxLength: 48, nullable: true }
    temporary: { type: boolean }
    autoExpiresAt:
      type: string
      format: date-time
      nullable: true
AcceptDirectiveRequest:
  type: object
  required: [expectedVersion]
  properties:
    userModification:
      type: object
      nullable: true
      properties:
        action: { type: string }
        target: { type: string, nullable: true }
        scope: { type: string, nullable: true }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
RejectDirectiveRequest:
  type: object
  required: [expectedVersion]
  properties:
    rejectionReason: { type: string, maxLength: 255, nullable: true }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
HealthDirectiveDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/HealthDirectiveDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
RecalculateRecipeNutritionRequest:
  type: object
  required: [branchId, versionNumber]
  properties:
    branchId: { type: string, format: uuid }
    versionNumber: { type: integer, minimum: 1 }
RecipeNutritionResultDto:
  type: object
  required:
    - recipeId
    - caloriesPerServing
    - proteinPerServingG
    - carbsPerServingG
    - fatPerServingG
    - fibrePerServingG
    - microsPerServing
    - nutritionStatus
    - unmapped
  properties:
    recipeId: { type: string, format: uuid }
    caloriesPerServing: { type: integer, minimum: 0 }
    proteinPerServingG: { type: number, format: double, minimum: 0 }
    carbsPerServingG: { type: number, format: double, minimum: 0 }
    fatPerServingG: { type: number, format: double, minimum: 0 }
    fibrePerServingG: { type: number, format: double, minimum: 0 }
    microsPerServing:
      type: object
      additionalProperties: { type: number, format: double, minimum: 0 }
    nutritionStatus:
      type: string
      enum: [calculated, partial, pending]
    unmapped:
      type: array
      items: { $ref: '#/UnmappedIngredientDto' }
CandidatePlanRollupDto:
  type: object
  required: [startDate, endDate, perDay]
  properties:
    startDate: { type: string, format: date }
    endDate:   { type: string, format: date }
    perDay:
      type: array
      minItems: 1
      items: { $ref: '#/CandidateDailyRollupDto' }
CandidateDailyRollupDto:
  type: object
  required: [date, activityLevel, calories, proteinG, carbsG, fatG, fibreG, micros]
  properties:
    date: { type: string, format: date }
    activityLevel:
      type: string
      enum: [REST_DAY, LIGHT_ACTIVITY, TRAINING_DAY, HEAVY_TRAINING]
    calories: { type: integer, minimum: 0 }
    proteinG: { type: number, format: double, minimum: 0 }
    carbsG:   { type: number, format: double, minimum: 0 }
    fatG:     { type: number, format: double, minimum: 0 }
    fibreG:   { type: number, format: double, minimum: 0 }
    micros:
      type: object
      additionalProperties: { type: number, format: double, minimum: 0 }
FloorGateResultDto:
  type: object
  required: [passed, violations, summary]
  properties:
    passed: { type: boolean }
    violations:
      type: array
      items: { $ref: '#/FloorViolationDto' }
    summary: { type: string, maxLength: 255 }
FloorViolationDto:
  type: object
  required: [date, macroOrMicro, floor, actual]
  properties:
    date: { type: string, format: date }
    macroOrMicro: { type: string, maxLength: 64 }
    floor:  { type: number, format: double, minimum: 0 }
    actual: { type: number, format: double, minimum: 0 }
