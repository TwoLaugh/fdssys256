Catalogue:
  type: string
  enum: [USER, SYSTEM]
DataQuality:
  type: string
  enum: [USER_VERIFIED, IMPORTED, AI_GENERATED, WEB_DISCOVERED]
NutritionStatus:
  type: string
  enum: [CALCULATED, PENDING, PARTIAL]
VersionTrigger:
  type: string
  enum: [MANUAL_CREATE, MANUAL_EDIT, IMPORT, ADAPTATION_PIPELINE, SUBSTITUTION_PROMOTION, BRANCH_CREATION, REVERT]
Complexity:
  type: string
  enum: [MINIMAL, MODERATE, INVOLVED]
MealType:
  type: string
  enum: [BREAKFAST, LUNCH, DINNER, SNACK]
IngredientDto:
  type: object
  required: [id, lineOrder, ingredientMappingKey, displayName, optional, needsReview]
  properties:
    id: { type: string, format: uuid }
    lineOrder: { type: integer, minimum: 0 }
    ingredientMappingKey: { type: string, maxLength: 160 }
    displayName: { type: string, maxLength: 160 }
    quantity: { type: number, format: double, nullable: true }
    unit: { type: string, maxLength: 16, nullable: true }
    preparation: { type: string, maxLength: 80, nullable: true }
    optional: { type: boolean }
    needsReview: { type: boolean }
    mappingConfidence: { type: number, format: double, nullable: true }
MethodStepDto:
  type: object
  required: [id, stepNumber, instruction]
  properties:
    id: { type: string, format: uuid }
    stepNumber: { type: integer, minimum: 1 }
    instruction: { type: string }
    durationMinutes: { type: integer, nullable: true }
RecipeMetadataDto:
  type: object
  required: [servings, prepTimeMins, cookTimeMins, totalTimeMins, equipmentRequired, packable, mealTypes]
  properties:
    servings: { type: integer, minimum: 1 }
    prepTimeMins: { type: integer, minimum: 0 }
    cookTimeMins: { type: integer, minimum: 0 }
    totalTimeMins: { type: integer, minimum: 0 }
    equipmentRequired:
      type: array
      items: { type: string }
    fridgeDays: { type: integer, nullable: true }
    freezerWeeks: { type: integer, nullable: true }
    packable: { type: boolean }
    cuisine: { type: string, maxLength: 64, nullable: true }
    mealTypes:
      type: array
      items: { type: string }
RecipeTagsDto:
  type: object
  required: [flavourProfile, dietaryFlags]
  properties:
    protein: { type: string, maxLength: 64, nullable: true }
    cookingMethod: { type: string, maxLength: 64, nullable: true }
    complexity:
      type: string
      enum: [MINIMAL, MODERATE, INVOLVED]
      nullable: true
    flavourProfile:
      type: array
      items: { type: string }
    dietaryFlags:
      type: array
      items: { type: string }
RecipeVersionDto:
  type: object
  required: [id, branchId, versionNumber, trigger, embeddingStatus, createdAt, createdByActor, ingredients, methodSteps]
  properties:
    id: { type: string, format: uuid }
    branchId: { type: string, format: uuid }
    versionNumber: { type: integer, minimum: 1 }
    parentVersionId: { type: string, format: uuid, nullable: true }
    trigger: { $ref: '#/VersionTrigger' }
    changeReason: { type: string, nullable: true }
    embeddingStatus: { type: string, maxLength: 16 }
    createdAt: { type: string, format: date-time }
    createdByActor: { type: string, maxLength: 64 }
    adapterTraceId: { type: string, format: uuid, nullable: true }
    ingredients:
      type: array
      items: { $ref: '#/IngredientDto' }
    methodSteps:
      type: array
      items: { $ref: '#/MethodStepDto' }
    metadata:
      type: object
      nullable: true
      required: [servings, prepTimeMins, cookTimeMins, totalTimeMins, equipmentRequired, packable, mealTypes]
      properties:
        servings: { type: integer, minimum: 1 }
        prepTimeMins: { type: integer, minimum: 0 }
        cookTimeMins: { type: integer, minimum: 0 }
        totalTimeMins: { type: integer, minimum: 0 }
        equipmentRequired:
          type: array
          items: { type: string }
        fridgeDays: { type: integer, nullable: true }
        freezerWeeks: { type: integer, nullable: true }
        packable: { type: boolean }
        cuisine: { type: string, maxLength: 64, nullable: true }
        mealTypes:
          type: array
          items: { type: string }
    tags:
      type: object
      nullable: true
      required: [flavourProfile, dietaryFlags]
      properties:
        protein: { type: string, maxLength: 64, nullable: true }
        cookingMethod: { type: string, maxLength: 64, nullable: true }
        complexity:
          type: string
          enum: [MINIMAL, MODERATE, INVOLVED]
          nullable: true
        flavourProfile:
          type: array
          items: { type: string }
        dietaryFlags:
          type: array
          items: { type: string }
    appliedSubstitutionIds:
      type: array
      nullable: true
      description: 'Populated only by GET /versions/{versionId}/with-substitutions; null on every other read.'
      items: { type: string, format: uuid }
RecipeDto:
  type: object
  required:
    - id
    - userId
    - catalogue
    - name
    - currentVersion
    - dataQuality
    - nutritionStatus
    - optimisticVersion
    - createdAt
    - updatedAt
    - branches
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    catalogue: { $ref: '#/Catalogue' }
    name: { type: string, maxLength: 160 }
    description: { type: string, nullable: true }
    currentVersion: { type: integer, minimum: 1 }
    currentBranchId: { type: string, format: uuid, nullable: true }
    dataQuality: { $ref: '#/DataQuality' }
    nutritionStatus: { $ref: '#/NutritionStatus' }
    forkedFromRecipeId: { type: string, format: uuid, nullable: true }
    lastUsedInPlanAt: { type: string, format: date-time, nullable: true }
    archivedAt: { type: string, format: date-time, nullable: true }
    deletedAt: { type: string, format: date-time, nullable: true }
    optimisticVersion: { type: integer, format: int64 }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
    currentVersionBody:
      type: object
      nullable: true
      required: [id, branchId, versionNumber, trigger, embeddingStatus, createdAt, createdByActor, ingredients, methodSteps]
      properties:
        id: { type: string, format: uuid }
        branchId: { type: string, format: uuid }
        versionNumber: { type: integer, minimum: 1 }
        parentVersionId: { type: string, format: uuid, nullable: true }
        trigger: { $ref: '#/VersionTrigger' }
        changeReason: { type: string, nullable: true }
        embeddingStatus: { type: string, maxLength: 16 }
        createdAt: { type: string, format: date-time }
        createdByActor: { type: string, maxLength: 64 }
        adapterTraceId: { type: string, format: uuid, nullable: true }
        ingredients:
          type: array
          items: { $ref: '#/IngredientDto' }
        methodSteps:
          type: array
          items: { $ref: '#/MethodStepDto' }
        metadata:
          type: object
          nullable: true
          required: [servings, prepTimeMins, cookTimeMins, totalTimeMins, equipmentRequired, packable, mealTypes]
          properties:
            servings: { type: integer, minimum: 1 }
            prepTimeMins: { type: integer, minimum: 0 }
            cookTimeMins: { type: integer, minimum: 0 }
            totalTimeMins: { type: integer, minimum: 0 }
            equipmentRequired:
              type: array
              items: { type: string }
            fridgeDays: { type: integer, nullable: true }
            freezerWeeks: { type: integer, nullable: true }
            packable: { type: boolean }
            cuisine: { type: string, maxLength: 64, nullable: true }
            mealTypes:
              type: array
              items: { type: string }
        tags:
          type: object
          nullable: true
          required: [flavourProfile, dietaryFlags]
          properties:
            protein: { type: string, maxLength: 64, nullable: true }
            cookingMethod: { type: string, maxLength: 64, nullable: true }
            complexity:
              type: string
              enum: [MINIMAL, MODERATE, INVOLVED]
              nullable: true
            flavourProfile:
              type: array
              items: { type: string }
            dietaryFlags:
              type: array
              items: { type: string }
        appliedSubstitutionIds:
          type: array
          nullable: true
          description: 'Populated only by GET /versions/{versionId}/with-substitutions; null on every other read.'
          items: { type: string, format: uuid }
    branches:
      type: array
      items: { $ref: '#/RecipeBranchDto' }
CreateIngredientRequest:
  type: object
  required: [lineOrder, ingredientMappingKey, displayName]
  properties:
    lineOrder: { type: integer, minimum: 0 }
    ingredientMappingKey: { type: string, minLength: 1, maxLength: 160 }
    displayName: { type: string, minLength: 1, maxLength: 160 }
    quantity: { type: number, format: double, nullable: true }
    unit: { type: string, maxLength: 16, nullable: true }
    preparation: { type: string, maxLength: 80, nullable: true }
    optional: { type: boolean, nullable: true }
CreateMethodStepRequest:
  type: object
  required: [stepNumber, instruction]
  properties:
    stepNumber: { type: integer, minimum: 1 }
    instruction: { type: string, minLength: 1 }
    durationMinutes: { type: integer, nullable: true }
CreateRecipeMetadataRequest:
  type: object
  required: [servings, prepTimeMins, cookTimeMins, totalTimeMins]
  properties:
    servings: { type: integer, minimum: 1 }
    prepTimeMins: { type: integer, minimum: 0 }
    cookTimeMins: { type: integer, minimum: 0 }
    totalTimeMins: { type: integer, minimum: 0 }
    equipmentRequired:
      type: array
      items: { type: string, maxLength: 64 }
    fridgeDays: { type: integer, nullable: true }
    freezerWeeks: { type: integer, nullable: true }
    packable: { type: boolean, nullable: true }
    cuisine: { type: string, maxLength: 64, nullable: true }
    mealTypes:
      type: array
      items: { type: string, maxLength: 32 }
CreateRecipeTagsRequest:
  type: object
  properties:
    protein: { type: string, maxLength: 64, nullable: true }
    cookingMethod: { type: string, maxLength: 64, nullable: true }
    complexity:
      type: string
      enum: [MINIMAL, MODERATE, INVOLVED]
      nullable: true
    flavourProfile:
      type: array
      items: { type: string, maxLength: 32 }
    dietaryFlags:
      type: array
      items: { type: string, maxLength: 32 }
CreateRecipeRequest:
  type: object
  required: [name, ingredients, method, metadata]
  properties:
    name: { type: string, minLength: 1, maxLength: 160 }
    description: { type: string, maxLength: 2000, nullable: true }
    ingredients:
      type: array
      minItems: 1
      items: { $ref: '#/CreateIngredientRequest' }
    method:
      type: array
      minItems: 1
      items: { $ref: '#/CreateMethodStepRequest' }
    metadata: { $ref: '#/CreateRecipeMetadataRequest' }
    tags:
      type: object
      nullable: true
      properties:
        protein: { type: string, maxLength: 64, nullable: true }
        cookingMethod: { type: string, maxLength: 64, nullable: true }
        complexity:
          type: string
          enum: [MINIMAL, MODERATE, INVOLVED]
          nullable: true
        flavourProfile:
          type: array
          items: { type: string, maxLength: 32 }
        dietaryFlags:
          type: array
          items: { type: string, maxLength: 32 }
ImportSource:
  type: string
  enum: [manual, url, ai_generated, web_discovered]
ImportRecipeFromUrlRequest:
  type: object
  required: [url]
  properties:
    url: { type: string, format: uri, minLength: 1, maxLength: 2048 }
    catalogue: { $ref: '#/Catalogue' }
RecipeImportDto:
  type: object
  required: [id, recipeId, sourceType, importedAt, importedByUserId]
  properties:
    id: { type: string, format: uuid }
    recipeId: { type: string, format: uuid }
    sourceType: { $ref: '#/ImportSource' }
    sourceUrl: { type: string, format: uri, maxLength: 2048, nullable: true }
    sourcePayload: {}
    extractionMethod:
      type: string
      maxLength: 32
      nullable: true
    duplicateOfRecipeId: { type: string, format: uuid, nullable: true }
    importedAt: { type: string, format: date-time }
    importedByUserId: { type: string, format: uuid }
RecipeBranchDto:
  type: object
  required: [id, recipeId, name, currentVersion, divergenceScore, createdAt, createdByActor, version]
  properties:
    id: { type: string, format: uuid }
    recipeId: { type: string, format: uuid }
    parentBranchId: { type: string, format: uuid, nullable: true }
    branchPointVersionId: { type: string, format: uuid, nullable: true }
    name: { type: string, minLength: 1, maxLength: 64 }
    label: { type: string, maxLength: 120, nullable: true }
    reason: { type: string, nullable: true }
    currentVersion: { type: integer, minimum: 1 }
    divergenceScore: { type: number, format: double, minimum: 0, maximum: 1 }
    createdAt: { type: string, format: date-time }
    createdByActor: { type: string, maxLength: 64 }
    adapterTraceId: { type: string, format: uuid, nullable: true }
    version: { type: integer, format: int64 }
ChangeAction:
  type: string
  enum: [ADDED, REMOVED, MODIFIED]
IngredientChangeDto:
  type: object
  required: [action]
  properties:
    action: { $ref: '#/ChangeAction' }
    from:
      type: object
      nullable: true
      description: The ingredient as it was in the parent version. Null on ADDED.
      properties:
        ingredientMappingKey: { type: string, maxLength: 160 }
        displayName: { type: string, maxLength: 160 }
        quantity: { type: number, format: double, nullable: true }
        unit: { type: string, maxLength: 16, nullable: true }
        preparation: { type: string, maxLength: 80, nullable: true }
        optional: { type: boolean }
        lineOrder: { type: integer }
    to:
      type: object
      nullable: true
      description: The ingredient as it is in the new version. Null on REMOVED.
      properties:
        ingredientMappingKey: { type: string, maxLength: 160 }
        displayName: { type: string, maxLength: 160 }
        quantity: { type: number, format: double, nullable: true }
        unit: { type: string, maxLength: 16, nullable: true }
        preparation: { type: string, maxLength: 80, nullable: true }
        optional: { type: boolean }
        lineOrder: { type: integer }
    fieldChanged:
      type: string
      maxLength: 32
      nullable: true
      description: Set on MODIFIED only; identifies which scalar field differs.
MethodChangeDto:
  type: object
  required: [action, step]
  properties:
    action: { $ref: '#/ChangeAction' }
    step: { type: integer, minimum: 1 }
    from:
      type: string
      nullable: true
    to:
      type: string
      nullable: true
MetadataChangeDto:
  type: object
  required: [action, field]
  properties:
    action: { $ref: '#/ChangeAction' }
    field: { type: string, maxLength: 64 }
    from: {}
    to: {}
TagChangeDto:
  type: object
  required: [action, dimension]
  properties:
    action: { $ref: '#/ChangeAction' }
    dimension: { type: string, maxLength: 32 }
    from: {}
    to: {}
RecipeDiffDto:
  type: object
  required: [fromVersionId, toVersionId, ingredientChanges, methodChanges, metadataChanges, tagChanges]
  properties:
    fromVersionId: { type: string, format: uuid }
    toVersionId: { type: string, format: uuid }
    ingredientChanges:
      type: array
      items: { $ref: '#/IngredientChangeDto' }
    methodChanges:
      type: array
      items: { $ref: '#/MethodChangeDto' }
    metadataChanges:
      type: array
      items: { $ref: '#/MetadataChangeDto' }
    tagChanges:
      type: array
      items: { $ref: '#/TagChangeDto' }
UpdateRecipeManualEditRequest:
  type: object
  required: [name, ingredients, method, metadata, changeReason, expectedOptimisticVersion]
  properties:
    name: { type: string, minLength: 1, maxLength: 160 }
    description: { type: string, maxLength: 2000, nullable: true }
    ingredients:
      type: array
      minItems: 1
      items: { $ref: '#/CreateIngredientRequest' }
    method:
      type: array
      minItems: 1
      items: { $ref: '#/CreateMethodStepRequest' }
    metadata: { $ref: '#/CreateRecipeMetadataRequest' }
    tags:
      type: object
      nullable: true
      properties:
        protein: { type: string, maxLength: 64, nullable: true }
        cookingMethod: { type: string, maxLength: 64, nullable: true }
        complexity:
          type: string
          enum: [MINIMAL, MODERATE, INVOLVED]
          nullable: true
        flavourProfile:
          type: array
          items: { type: string, maxLength: 32 }
        dietaryFlags:
          type: array
          items: { type: string, maxLength: 32 }
    changeReason: { type: string, minLength: 1, maxLength: 2000 }
    expectedOptimisticVersion: { type: integer, format: int64, minimum: 0 }
CharacterFingerprintDto:
  type: object
  description: Per-version character fingerprint, refreshed only on branch creation.
  required: [definingIngredients, definingTechniques, textureEssentials, flavourAnchors, complexityTier]
  properties:
    definingIngredients:
      type: array
      maxItems: 5
      items: { type: string, maxLength: 160 }
    definingTechniques:
      type: array
      maxItems: 5
      items: { type: string, maxLength: 64 }
    textureEssentials:
      type: array
      maxItems: 5
      items: { type: string, maxLength: 64 }
    flavourAnchors:
      type: array
      maxItems: 5
      items: { type: string, maxLength: 64 }
    complexityTier: { $ref: '#/Complexity' }
    cuisineAnchor:
      type: string
      maxLength: 64
      nullable: true
CreateRecipeBodyRequest:
  type: object
  required: [ingredients, method, metadata]
  properties:
    ingredients:
      type: array
      minItems: 1
      items: { $ref: '#/CreateIngredientRequest' }
    method:
      type: array
      minItems: 1
      items: { $ref: '#/CreateMethodStepRequest' }
    metadata: { $ref: '#/CreateRecipeMetadataRequest' }
    tags:
      type: object
      nullable: true
      properties:
        protein: { type: string, maxLength: 64, nullable: true }
        cookingMethod: { type: string, maxLength: 64, nullable: true }
        complexity:
          type: string
          enum: [MINIMAL, MODERATE, INVOLVED]
          nullable: true
        flavourProfile:
          type: array
          items: { type: string, maxLength: 32 }
        dietaryFlags:
          type: array
          items: { type: string, maxLength: 32 }
CreateBranchRequest:
  type: object
  required: [name, reason, branchPointVersionId, body]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-z0-9-]+$'
    label:
      type: string
      maxLength: 120
      nullable: true
    reason: { type: string, minLength: 1, maxLength: 2000 }
    branchPointVersionId: { type: string, format: uuid }
    body: { $ref: '#/CreateRecipeBodyRequest' }
    fingerprintOverride:
      type: object
      nullable: true
      description: When supplied, the branch's v1 character_fingerprint is set verbatim. Otherwise derived from the body.
      required: [definingIngredients, definingTechniques, textureEssentials, flavourAnchors, complexityTier]
      properties:
        definingIngredients:
          type: array
          maxItems: 5
          items: { type: string, maxLength: 160 }
        definingTechniques:
          type: array
          maxItems: 5
          items: { type: string, maxLength: 64 }
        textureEssentials:
          type: array
          maxItems: 5
          items: { type: string, maxLength: 64 }
        flavourAnchors:
          type: array
          maxItems: 5
          items: { type: string, maxLength: 64 }
        complexityTier:
          type: string
          enum: [MINIMAL, MODERATE, INVOLVED]
        cuisineAnchor:
          type: string
          maxLength: 64
          nullable: true
RevertToVersionRequest:
  type: object
  required: [branchId, versionNumber, expectedRecipeOptimisticVersion]
  properties:
    branchId: { type: string, format: uuid }
    versionNumber: { type: integer, minimum: 1 }
    expectedRecipeOptimisticVersion: { type: integer, format: int64, minimum: 0 }
SubstitutionReason:
  type: string
  enum: [BUDGET, AVAILABILITY, DIETARY_TEMP, EQUIPMENT]
SubstitutionState:
  type: string
  enum: [PROPOSED, ACCEPTED, REJECTED, SUPERSEDED]
SubstitutionItemRequest:
  type: object
  required: [ingredientMappingKey, quantity, unit]
  properties:
    ingredientMappingKey: { type: string, minLength: 1, maxLength: 160 }
    quantity: { type: number, format: double, minimum: 0 }
    unit: { type: string, minLength: 1, maxLength: 16 }
MethodOverlayLineRequest:
  type: object
  required: [step, instruction]
  properties:
    step: { type: integer, minimum: 1 }
    instruction: { type: string, minLength: 1, maxLength: 2000 }
MethodOverlayLineDto:
  type: object
  required: [step, instruction]
  properties:
    step: { type: integer, minimum: 1 }
    instruction: { type: string, maxLength: 2000 }
SubstitutedItemDto:
  type: object
  required: [ingredientMappingKey, quantity, unit]
  properties:
    ingredientMappingKey: { type: string, maxLength: 160 }
    quantity: { type: number, format: double, minimum: 0 }
    unit: { type: string, maxLength: 16 }
RecipeSubstitutionDto:
  type: object
  required: [id, recipeId, versionId, branchId, original, substitute, reason, state, applicationCount, temporary, createdAt, createdByActor, version]
  properties:
    id: { type: string, format: uuid }
    recipeId: { type: string, format: uuid }
    versionId: { type: string, format: uuid }
    branchId: { type: string, format: uuid }
    original: { $ref: '#/SubstitutedItemDto' }
    substitute: { $ref: '#/SubstitutedItemDto' }
    reason: { $ref: '#/SubstitutionReason' }
    constraintRef:
      type: string
      maxLength: 160
      nullable: true
    methodOverlay:
      type: array
      nullable: true
      items: { $ref: '#/MethodOverlayLineDto' }
    notes:
      type: string
      maxLength: 2000
      nullable: true
    temporary: { type: boolean }
    applicationCount: { type: integer, minimum: 0 }
    lastAppliedAt:
      type: string
      format: date-time
      nullable: true
    state: { $ref: '#/SubstitutionState' }
    promotedToVersionId:
      type: string
      format: uuid
      nullable: true
    createdAt: { type: string, format: date-time }
    createdByActor: { type: string, maxLength: 64 }
    adapterTraceId:
      type: string
      format: uuid
      nullable: true
    version: { type: integer, format: int64 }
CreateSubstitutionRequest:
  type: object
  required: [versionId, original, substitute, reason]
  properties:
    versionId: { type: string, format: uuid }
    original: { $ref: '#/SubstitutionItemRequest' }
    substitute: { $ref: '#/SubstitutionItemRequest' }
    reason: { $ref: '#/SubstitutionReason' }
    constraintRef:
      type: string
      maxLength: 160
      nullable: true
    methodOverlay:
      type: array
      nullable: true
      items: { $ref: '#/MethodOverlayLineRequest' }
    notes:
      type: string
      maxLength: 1000
      nullable: true
    temporary: { type: boolean, default: true }
AcceptSubstitutionRequest:
  type: object
  required: [expectedVersion]
  properties:
    expectedVersion: { type: integer, format: int64, minimum: 0 }
RejectSubstitutionRequest:
  type: object
  required: [expectedVersion]
  properties:
    expectedVersion: { type: integer, format: int64, minimum: 0 }
    reason:
      type: string
      maxLength: 255
      nullable: true
PromoteSubstitutionRequest:
  type: object
  required: [expectedVersion, changeReason]
  properties:
    expectedVersion: { type: integer, format: int64, minimum: 0 }
    changeReason: { type: string, minLength: 1, maxLength: 2000 }
RunArchiveScanResultDto:
  type: object
  required: [flaggedCount]
  properties:
    flaggedCount:
      type: integer
      minimum: 0
      description: 'Count of system-catalogue rows newly transitioned to archived_at != null this run.'
