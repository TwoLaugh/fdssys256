StorageLocation:
  type: string
  enum: [FRIDGE, FREEZER, CUPBOARD, SPICE_RACK]
TrackingMode:
  type: string
  enum: [QUANTITY, STATUS]
StapleStatus:
  type: string
  enum: [STOCKED, LOW, OUT]
ItemSource:
  type: string
  enum: [TESCO_ORDER, OTHER_SHOP, MANUAL_ADD, BATCH_COOK, GIFT]
ItemLifecycleStatus:
  type: string
  enum: [ACTIVE, EXHAUSTED, SPOILED, WASTED]
DefrostMethod:
  type: string
  enum: [OVERNIGHT_FRIDGE, ROOM_TEMP, MICROWAVE, QUICK_DEFROST]
FreezerExtensionDto:
  type: object
  properties:
    frozenAt: { type: string, format: date, nullable: true }
    maxFreezeWeeks: { type: integer, minimum: 0, nullable: true }
    defrostMethod: { $ref: '#/DefrostMethod', nullable: true }
    defrostLeadTimeHours: { type: integer, minimum: 0, nullable: true }
    sourceRecipeId: { type: string, format: uuid, nullable: true }
InventoryItemDto:
  type: object
  required:
    - id
    - userId
    - name
    - category
    - storageLocation
    - trackingMode
    - isStaple
    - source
    - itemStatus
    - createdAt
    - updatedAt
    - version
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    name: { type: string, maxLength: 128 }
    category: { type: string, maxLength: 64 }
    storageLocation: { $ref: '#/StorageLocation' }
    trackingMode: { $ref: '#/TrackingMode' }
    quantity: { type: number, nullable: true }
    unit: { type: string, maxLength: 16, nullable: true }
    costPaid: { type: number, nullable: true }
    status:
      type: string
      enum: [STOCKED, LOW, OUT]
      nullable: true
    isStaple: { type: boolean }
    expiryDate: { type: string, format: date, nullable: true }
    ingredientMappingKey: { type: string, maxLength: 128, nullable: true }
    notes: { type: string, maxLength: 255, nullable: true }
    source: { $ref: '#/ItemSource' }
    sourceRef: { type: string, maxLength: 128, nullable: true }
    itemStatus: { $ref: '#/ItemLifecycleStatus' }
    freezerExtension:
      type: object
      nullable: true
      properties:
        frozenAt: { type: string, format: date, nullable: true }
        maxFreezeWeeks: { type: integer, minimum: 0, nullable: true }
        defrostMethod:
          type: string
          enum: [OVERNIGHT_FRIDGE, ROOM_TEMP, MICROWAVE, QUICK_DEFROST]
          nullable: true
        defrostLeadTimeHours: { type: integer, minimum: 0, nullable: true }
        sourceRecipeId: { type: string, format: uuid, nullable: true }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
    version: { type: integer, format: int64 }
InventoryItemDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/InventoryItemDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
CreateInventoryItemRequest:
  type: object
  required: [name, category, storageLocation, trackingMode, source]
  properties:
    name: { type: string, minLength: 1, maxLength: 128 }
    category: { type: string, minLength: 1, maxLength: 64 }
    storageLocation: { $ref: '#/StorageLocation' }
    trackingMode: { $ref: '#/TrackingMode' }
    quantity: { type: number, nullable: true }
    unit: { type: string, maxLength: 16, nullable: true }
    costPaid: { type: number, nullable: true }
    status:
      type: string
      enum: [STOCKED, LOW, OUT]
      nullable: true
    isStaple: { type: boolean, default: false }
    expiryDate: { type: string, format: date, nullable: true }
    ingredientMappingKey: { type: string, maxLength: 128, nullable: true }
    notes: { type: string, maxLength: 255, nullable: true }
    source: { $ref: '#/ItemSource' }
    sourceRef: { type: string, maxLength: 128, nullable: true }
    freezerExtension:
      type: object
      nullable: true
      properties:
        frozenAt: { type: string, format: date, nullable: true }
        maxFreezeWeeks: { type: integer, minimum: 0, nullable: true }
        defrostMethod:
          type: string
          enum: [OVERNIGHT_FRIDGE, ROOM_TEMP, MICROWAVE, QUICK_DEFROST]
          nullable: true
        defrostLeadTimeHours: { type: integer, minimum: 0, nullable: true }
        sourceRecipeId: { type: string, format: uuid, nullable: true }
UpdateInventoryItemRequest:
  type: object
  required: [name, category, storageLocation, trackingMode, source, itemStatus, expectedVersion]
  properties:
    name: { type: string, minLength: 1, maxLength: 128 }
    category: { type: string, minLength: 1, maxLength: 64 }
    storageLocation: { $ref: '#/StorageLocation' }
    trackingMode: { $ref: '#/TrackingMode' }
    quantity: { type: number, nullable: true }
    unit: { type: string, maxLength: 16, nullable: true }
    costPaid: { type: number, nullable: true }
    status:
      type: string
      enum: [STOCKED, LOW, OUT]
      nullable: true
    isStaple: { type: boolean, default: false }
    expiryDate: { type: string, format: date, nullable: true }
    ingredientMappingKey: { type: string, maxLength: 128, nullable: true }
    notes: { type: string, maxLength: 255, nullable: true }
    source: { $ref: '#/ItemSource' }
    sourceRef: { type: string, maxLength: 128, nullable: true }
    itemStatus: { $ref: '#/ItemLifecycleStatus' }
    freezerExtension:
      type: object
      nullable: true
      properties:
        frozenAt: { type: string, format: date, nullable: true }
        maxFreezeWeeks: { type: integer, minimum: 0, nullable: true }
        defrostMethod:
          type: string
          enum: [OVERNIGHT_FRIDGE, ROOM_TEMP, MICROWAVE, QUICK_DEFROST]
          nullable: true
        defrostLeadTimeHours: { type: integer, minimum: 0, nullable: true }
        sourceRecipeId: { type: string, format: uuid, nullable: true }
    expectedVersion: { type: integer, format: int64 }
EquipmentDto:
  type: object
  required: [id, userId, name, available, version]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    name: { type: string, minLength: 1, maxLength: 64, pattern: '^[a-z0-9_]+$' }
    available: { type: boolean }
    details: { type: string, maxLength: 255, nullable: true }
    version: { type: integer, format: int64 }
UpsertEquipmentRequest:
  type: object
  required: [available]
  properties:
    available: { type: boolean }
    details: { type: string, maxLength: 255, nullable: true }
    expectedVersion:
      type: integer
      format: int64
      minimum: 0
      nullable: true
      description: Required for update; ignored for insert.
AuditActor:
  type: string
  enum: [USER, COOK_EVENT, GROCERY_IMPORT, NUTRITION_LOGGER, SYSTEM]
InventoryAuditEntryDto:
  type: object
  required: [id, inventoryItemId, actor, fieldChanged, previousValue, newValue, occurredAt]
  properties:
    id: { type: string, format: uuid }
    inventoryItemId: { type: string, format: uuid }
    actor: { $ref: '#/AuditActor' }
    actorUserId: { type: string, format: uuid, nullable: true }
    fieldChanged: { type: string, maxLength: 64 }
    previousValue: {}
    newValue: {}
    occurredAt: { type: string, format: date-time }
InventoryAuditEntryDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/InventoryAuditEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
PriceSensitivity:
  type: string
  enum: [low, moderate, high]
BudgetSpendTrackingDto:
  type: object
  description: Reserved for v1.5; populated by provisions-01f/01h. v1 leaves this null on every BudgetDto.
  required: [currentWeekTarget, currentWeekActual, currentWeekRemaining, rollingFourWeekAverage]
  properties:
    currentWeekTarget: { type: number, format: double }
    currentWeekActual: { type: number, format: double }
    currentWeekRemaining: { type: number, format: double }
    currentWeekOrders:
      type: array
      items: { $ref: '#/BudgetOrderRefDto' }
    rollingFourWeekAverage: { type: number, format: double }
BudgetOrderRefDto:
  type: object
  required: [supplier, orderRef, totalCost, deliveredOn]
  properties:
    supplier: { type: string, maxLength: 32 }
    orderRef: { type: string, maxLength: 128 }
    totalCost: { type: number, format: double }
    deliveredOn: { type: string, format: date }
BudgetDto:
  type: object
  required: [id, userId, weeklyTarget, currency, toleranceOver, priceSensitivity, enabled, version]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    weeklyTarget: { type: number, format: double, exclusiveMinimum: true, minimum: 0 }
    currency:
      type: string
      minLength: 3
      maxLength: 3
      pattern: '^[A-Z]{3}$'
    toleranceOver: { type: number, format: double, minimum: 0 }
    priceSensitivity: { $ref: '#/PriceSensitivity' }
    enabled: { type: boolean }
    spendTracking:
      type: object
      nullable: true
      description: Always null in v1 (provisions-01c). Populated by 01f/01h once order history is wired.
      properties:
        currentWeekTarget: { type: number, format: double }
        currentWeekActual: { type: number, format: double }
        currentWeekRemaining: { type: number, format: double }
        currentWeekOrders:
          type: array
          items: { $ref: '#/BudgetOrderRefDto' }
        rollingFourWeekAverage: { type: number, format: double }
    version: { type: integer, format: int64 }
UpdateBudgetRequest:
  type: object
  required: [weeklyTarget, currency, priceSensitivity, expectedVersion]
  properties:
    weeklyTarget: { type: number, format: double, exclusiveMinimum: true, minimum: 0 }
    currency:
      type: string
      minLength: 3
      maxLength: 3
      pattern: '^[A-Z]{3}$'
    toleranceOver: { type: number, format: double, minimum: 0, default: 0 }
    priceSensitivity: { $ref: '#/PriceSensitivity' }
    enabled: { type: boolean, default: true, nullable: true }
    expectedVersion: { type: integer, format: int64, minimum: 0, default: 0 }
SubstitutionRecordDto:
  type: object
  required: [date, substitutedWithProductId, accepted]
  properties:
    date: { type: string, format: date }
    substitutedWithProductId: { type: string, maxLength: 128 }
    accepted: { type: boolean }
    notes:
      type: string
      maxLength: 1000
      nullable: true
SupplierProductDto:
  type: object
  required: [id, productId, supplier, name, lastChecked, substitutionHistory, version]
  properties:
    id: { type: string, format: uuid }
    productId: { type: string, maxLength: 128 }
    supplier: { type: string, maxLength: 32 }
    name: { type: string, maxLength: 255 }
    price:
      type: number
      format: double
      minimum: 0
      nullable: true
    pricePerUnit:
      type: number
      format: double
      minimum: 0
      nullable: true
    unit:
      type: string
      maxLength: 16
      nullable: true
    packSizeG:
      type: integer
      nullable: true
    packSizeUnit:
      type: string
      maxLength: 16
      nullable: true
    category:
      type: string
      maxLength: 64
      nullable: true
    clubcardPrice:
      type: number
      format: double
      minimum: 0
      nullable: true
    lastChecked: { type: string, format: date }
    substitutionHistory:
      type: array
      items: { $ref: '#/SubstitutionRecordDto' }
    ingredientMappingKey:
      type: string
      maxLength: 128
      nullable: true
    version: { type: integer, format: int64 }
UpsertSupplierProductRequest:
  type: object
  required: [productId, supplier, name, lastChecked]
  properties:
    productId: { type: string, minLength: 1, maxLength: 128 }
    supplier: { type: string, minLength: 1, maxLength: 32 }
    name: { type: string, minLength: 1, maxLength: 255 }
    price:
      type: number
      format: double
      minimum: 0
      nullable: true
    pricePerUnit:
      type: number
      format: double
      minimum: 0
      nullable: true
    unit:
      type: string
      maxLength: 16
      nullable: true
    packSizeG:
      type: integer
      nullable: true
    packSizeUnit:
      type: string
      maxLength: 16
      nullable: true
    category:
      type: string
      maxLength: 64
      nullable: true
    clubcardPrice:
      type: number
      format: double
      minimum: 0
      nullable: true
    lastChecked: { type: string, format: date }
    ingredientMappingKey:
      type: string
      maxLength: 128
      nullable: true
RecordSubstitutionRequest:
  type: object
  required: [record, userAccepted, expectedVersion]
  properties:
    record: { $ref: '#/SubstitutionRecordDto' }
    userAccepted: { type: boolean }
    expectedVersion: { type: integer, format: int64, minimum: 0 }
SupplierProductDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/SupplierProductDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
WasteReason:
  type: string
  enum: [EXPIRED, LEFTOVER_NOT_EATEN, DIDNT_LIKE, SPOILED_EARLY, MADE_TOO_MUCH]
WasteEntryDto:
  type: object
  required: [id, userId, itemName, reason, occurredOn, createdAt]
  properties:
    id: { type: string, format: uuid }
    userId: { type: string, format: uuid }
    inventoryItemId:
      type: string
      format: uuid
      nullable: true
    itemName: { type: string, maxLength: 128 }
    quantity:
      type: number
      format: double
      minimum: 0
      nullable: true
    unit:
      type: string
      maxLength: 16
      nullable: true
    reason: { $ref: '#/WasteReason' }
    costEstimate:
      type: number
      format: double
      minimum: 0
      nullable: true
    occurredOn: { type: string, format: date }
    notes:
      type: string
      maxLength: 255
      nullable: true
    createdAt: { type: string, format: date-time }
LogWasteRequest:
  type: object
  required: [itemName, reason, occurredOn]
  properties:
    inventoryItemId:
      type: string
      format: uuid
      nullable: true
    itemName: { type: string, minLength: 1, maxLength: 128 }
    quantity:
      type: number
      format: double
      minimum: 0
      nullable: true
    unit:
      type: string
      maxLength: 16
      nullable: true
    reason: { $ref: '#/WasteReason' }
    costEstimate:
      type: number
      format: double
      minimum: 0
      nullable: true
    occurredOn: { type: string, format: date }
    notes:
      type: string
      maxLength: 255
      nullable: true
TopWastedItemDto:
  type: object
  required: [itemName, entryCount, totalCost]
  properties:
    itemName: { type: string, maxLength: 128 }
    entryCount: { type: integer, format: int64, minimum: 0 }
    totalCost: { type: number, format: double, minimum: 0 }
WasteSummaryDto:
  type: object
  required: [from, to, totalCostEstimate, totalEntries, countByReason, topItems]
  properties:
    from: { type: string, format: date }
    to: { type: string, format: date }
    totalCostEstimate: { type: number, format: double, minimum: 0 }
    totalEntries: { type: integer, format: int64, minimum: 0 }
    countByReason:
      type: object
      additionalProperties: { type: integer, format: int64, minimum: 0 }
    topItems:
      type: array
      items: { $ref: '#/TopWastedItemDto' }
WasteEntryDtoPage:
  type: object
  additionalProperties: true
  required: [content, totalElements, totalPages, number, size]
  properties:
    content:
      type: array
      items: { $ref: '#/WasteEntryDto' }
    totalElements: { type: integer, format: int64 }
    totalPages: { type: integer }
    number: { type: integer }
    size: { type: integer }
    first: { type: boolean }
    last: { type: boolean }
    empty: { type: boolean }
    numberOfElements: { type: integer }
ProvisionForPlannerBundleDto:
  type: object
  required: [userId, activeInventory, staplesAtLowOrOut, equipment, supplierPricesByMappingKey, staleness]
  properties:
    userId: { type: string, format: uuid }
    activeInventory:
      type: array
      items: { $ref: '#/InventoryItemDto' }
    staplesAtLowOrOut:
      type: array
      items: { $ref: '#/InventoryItemDto' }
    equipment:
      type: array
      items: { $ref: '#/EquipmentDto' }
    budget:
      type: object
      nullable: true
      description: 'Null when the user has no budget row; the planner falls back to no-gate.'
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        weeklyTarget: { type: number, format: double, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        toleranceOver: { type: number, format: double, minimum: 0 }
        priceSensitivity: { $ref: '#/PriceSensitivity' }
        enabled: { type: boolean }
        spendTracking:
          type: object
          nullable: true
          description: 'Reserved for v1.5; null in v1 (OpenAPI 3.0 gotcha — inline nullable instead of $ref+nullable).'
          properties:
            currentWeekTarget: { type: number, format: double }
            currentWeekActual: { type: number, format: double }
            currentWeekRemaining: { type: number, format: double }
            currentWeekOrders:
              type: array
              items: { $ref: '#/BudgetOrderRefDto' }
            rollingFourWeekAverage: { type: number, format: double }
        version: { type: integer, format: int64 }
    supplierPricesByMappingKey:
      type: object
      additionalProperties: { $ref: '#/SupplierProductDto' }
    staleness:
      type: object
      required: [supplierCacheCoverageBps, inRampUpWindow, generatedAt]
      properties:
        supplierCacheCoverageBps:
          type: integer
          minimum: 0
          maximum: 10000
          description: 'Share of requested mapping keys with a fresh supplier-product entry (basis points).'
        inRampUpWindow: { type: boolean }
        generatedAt: { type: string, format: date-time }
CookEventCommand:
  type: object
  required: [recipeId, mealSlotId, servingsCooked, ingredientsUsed]
  properties:
    recipeId: { type: string, format: uuid }
    planId: { type: string, format: uuid, nullable: true }
    mealSlotId: { type: string, format: uuid }
    servingsCooked: { type: integer, minimum: 1 }
    isBatchCook: { type: boolean, nullable: true, default: false }
    proportionOfRecipe:
      type: number
      format: double
      minimum: 0
      maximum: 1
      nullable: true
      default: 1.0
    strict:
      type: boolean
      nullable: true
      default: false
      description: 'When true, an underflow throws 422 InventoryUnderflowException; when false (default) underflows are floored at zero and surfaced in result.underflows.'
    dedupeKey:
      type: string
      maxLength: 64
      nullable: true
      description: 'Idempotency token; server defaults to SHA-256 over (mealSlotId, recipeId, servingsCooked, isBatchCook) when null.'
    ingredientsUsed:
      type: array
      minItems: 1
      items: { $ref: '#/RecipeIngredientUsage' }
    traceId: { type: string, format: uuid, nullable: true }
RecipeIngredientUsage:
  type: object
  required: [ingredientMappingKey, quantity, unit]
  properties:
    ingredientMappingKey: { type: string, maxLength: 128 }
    quantity: { type: number, format: double, minimum: 0 }
    unit: { type: string, maxLength: 16 }
MealConsumptionCommand:
  type: object
  required: [inventoryItemId, portions]
  properties:
    inventoryItemId: { type: string, format: uuid }
    portions: { type: number, format: double, minimum: 0 }
    traceId: { type: string, format: uuid, nullable: true }
StandaloneConsumptionCommand:
  type: object
  required: [ingredientMappingKey, quantity, unit, userConfirmedDeduction]
  properties:
    ingredientMappingKey: { type: string, maxLength: 128 }
    quantity: { type: number, format: double, minimum: 0 }
    unit: { type: string, maxLength: 16 }
    userConfirmedDeduction: { type: boolean }
    traceId: { type: string, format: uuid, nullable: true }
InventoryDeductionResultDto:
  type: object
  required: [updatedItems, exhaustedItems, underflows]
  properties:
    updatedItems:
      type: array
      items: { $ref: '#/InventoryItemDto' }
    exhaustedItems:
      type: array
      items: { type: string, format: uuid }
    underflows:
      type: array
      items: { $ref: '#/UnderflowFlagDto' }
UnderflowFlagDto:
  type: object
  required: [ingredientMappingKey, requested, available]
  properties:
    ingredientMappingKey: { type: string, maxLength: 128 }
    requested: { type: number, format: double, minimum: 0 }
    available: { type: number, format: double, minimum: 0 }
GroceryOrderImportCommand:
  type: object
  required: [supplier, orderRef, deliveredOn, lines]
  properties:
    supplier:    { type: string, maxLength: 32 }
    orderRef:    { type: string, maxLength: 128 }
    deliveredOn: { type: string, format: date }
    lines:
      type: array
      minItems: 1
      items: { $ref: '#/GroceryOrderLine' }
    substitutions:
      type: array
      nullable: true
      items: { $ref: '#/GroceryOrderSubstitution' }
    traceId:
      type: string
      format: uuid
      nullable: true
GroceryOrderLine:
  type: object
  required: [productId, name, quantity, unit]
  properties:
    productId:            { type: string, maxLength: 128 }
    name:                 { type: string, maxLength: 255 }
    ingredientMappingKey:
      type: string
      maxLength: 128
      nullable: true
    quantity:             { type: number, format: double, minimum: 0 }
    unit:                 { type: string, maxLength: 16 }
    pricePaid:
      type: number
      format: double
      minimum: 0
      nullable: true
    category:
      type: string
      maxLength: 64
      nullable: true
    packSizeG:
      type: integer
      minimum: 1
      nullable: true
GroceryOrderSubstitution:
  type: object
  required: [orderedProductId, substitutedProductId]
  properties:
    orderedProductId:     { type: string, maxLength: 128 }
    substitutedProductId: { type: string, maxLength: 128 }
    reason:
      type: string
      maxLength: 255
      nullable: true
GroceryImportResultDto:
  type: object
  required: [addedItems, mergedItems, updatedSupplierProducts, warnings]
  properties:
    addedItems:
      type: array
      items: { $ref: '#/InventoryItemDto' }
    mergedItems:
      type: array
      items: { $ref: '#/InventoryItemDto' }
    updatedSupplierProducts:
      type: array
      items: { $ref: '#/SupplierProductDto' }
    warnings:
      type: array
      items: { type: string, maxLength: 255 }
