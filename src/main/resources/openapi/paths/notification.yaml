notificationsBulkRead:
  post:
    tags: [Notifications]
    operationId: markAllNotificationsRead
    summary: Mark all unread notifications read; an empty kinds list means all kinds.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/notification.yaml#/BulkReadRequest' }
    responses:
      '200':
        description: The number of notifications updated.
        content:
          application/json:
            schema: { $ref: '../schemas/notification.yaml#/BulkReadResponse' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

notificationDeliveryLog:
  get:
    tags: [Notifications]
    operationId: getNotificationDeliveryLog
    summary: Paginated delivery-log entries for a notification; newest-first.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of delivery-log entries.
        content:
          application/json:
            schema: { $ref: '../schemas/notification.yaml#/DeliveryLogEntryDtoPage' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
