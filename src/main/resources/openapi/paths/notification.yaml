            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

notificationPreferences:
  get:
    tags: [Notifications]
    operationId: getNotificationPreferences
    summary: Read the calling user's notification preferences; auto-seeds defaults.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: The user's notification preferences.
        content:
          application/json:
            schema: { $ref: '../schemas/notification.yaml#/NotificationPreferenceDto' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Notifications]
    operationId: updateNotificationPreferences
    summary: Replace the calling user's notification preferences.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/notification.yaml#/UpdateNotificationPreferenceRequest' }
    responses:
      '200':
        description: The updated notification preferences.
        content:
          application/json:
            schema: { $ref: '../schemas/notification.yaml#/NotificationPreferenceDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Optimistic-lock conflict.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
