# ============================================================================
# Taste profile (01c) — six endpoints. Rollback endpoint is deferred.
# ============================================================================
tasteProfile:
  get:
    tags: [Preferences]
    operationId: getTasteProfile
    summary: Read the calling user's taste profile.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: The user's taste profile.
        content:
          application/json:
            schema: { $ref: '../schemas/preference.yaml#/TasteProfileDto' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Profile not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Preferences]
    operationId: updateTasteProfile
    summary: Replace the calling user's taste profile document (manual override).
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/preference.yaml#/UpdateTasteProfileRequest' }
    responses:
      '200':
        description: The updated taste profile.
        content:
          application/json:
            schema: { $ref: '../schemas/preference.yaml#/TasteProfileDto' }
      '400':
        description: Validation or syntactic error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Profile not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
tasteProfileRefreshNow:
  post:
    tags: [Preferences]
    operationId: triggerTasteProfileRefresh
    summary: Request an asynchronous AI refresh of the taste profile.
    security:
      - cookieAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema: { $ref: '../schemas/preference.yaml#/TriggerTasteProfileRefreshRequest' }
    responses:
      '202':
        description: Refresh requested; returns the current state immediately.
        content:
          application/json:
            schema: { $ref: '../schemas/preference.yaml#/TasteProfileDto' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Profile not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
tasteProfileRollback:
  post:
    tags: [Preferences]
    operationId: rollbackTasteProfile
    summary: >-
      Roll the calling user's taste profile back to a prior version (restored as a new monotonic
      version) and replay feedback from that version's cursor forward.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/preference.yaml#/RollbackTasteProfileRequest' }
    responses:
      '200':
        description: The rolled-back taste profile (restored document at the new monotonic version).
        content:
          application/json:
            schema: { $ref: '../schemas/preference.yaml#/TasteProfileDto' }
      '400':
        description: Validation or syntactic error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Profile not initialised, or the target version has no snapshot.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion (profile was concurrently edited).
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
tasteProfileVersions:
  get:
    tags: [Preferences]
    operationId: listTasteProfileVersions
    summary: Paginated taste-profile version snapshots; newest-first.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of version snapshots.
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: array
                  items: { $ref: '../schemas/preference.yaml#/TasteProfileVersionDto' }
                totalElements: { type: integer }
                totalPages: { type: integer }
                number: { type: integer }
                size: { type: integer }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
tasteProfileVersionByNumber:
  get:
    tags: [Preferences]
    operationId: getTasteProfileVersion
    summary: Read a single taste-profile version snapshot.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: documentVersion
        required: true
        schema: { type: integer, minimum: 1 }
    responses:
      '200':
        description: The requested version snapshot.
        content:
          application/json:
            schema: { $ref: '../schemas/preference.yaml#/TasteProfileVersionDto' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Version not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
# ============================================================================
# Preference archive (01e) — two read endpoints. Writes are in-process only.
# ============================================================================
preferenceArchive:
  get:
    tags: [Preferences]
    operationId: getPreferenceArchive
    summary: Paginated archive of pruned taste-profile items; newest-archived first.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      - in: query
        name: fieldPathPrefix
        required: false
        schema: { type: string, maxLength: 128 }
    responses:
      '200':
        description: Page of archive entries; empty content when the archive is empty.
        content:
          application/json:
            schema: { $ref: '../schemas/preference.yaml#/PreferenceArchiveEntryDtoPage' }
      '400':
        description: Validation or syntactic error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
preferenceArchiveActiveCount:
  get:
    tags: [Preferences]
    operationId: getPreferenceArchiveActiveCount
    summary: Count of active (not-yet-re-promoted) archive entries for the user.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: The active archive-entry count.
        content:
          application/json:
            schema:
              type: object
              required: [count]
              properties:
                count: { type: integer, format: int64, minimum: 0 }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
tasteProfileAuditLog:
  get:
    tags: [Preferences]
    operationId: getTasteProfileAuditLog
    summary: Paginated audit log of taste-profile changes; newest-first.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of audit-log entries; empty when no profile yet.
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: array
                  items: { $ref: '../schemas/preference.yaml#/TasteProfileAuditEntryDto' }
                totalElements: { type: integer }
                totalPages: { type: integer }
                number: { type: integer }
                size: { type: integer }
      '401':
        description: Missing or invalid authentication.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
