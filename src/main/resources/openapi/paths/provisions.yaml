inventory:
  get:
    tags: [Provisions]
    operationId: listInventory
    summary: List the calling user's active pantry items.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: storageLocation
        schema: { $ref: '../schemas/provisions.yaml#/StorageLocation' }
        required: false
      - in: query
        name: isStaple
        schema: { type: boolean }
        required: false
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of items.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  post:
    tags: [Provisions]
    operationId: createInventoryItem
    summary: Create a new pantry item.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/CreateInventoryItemRequest' }
    responses:
      '201':
        description: Created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
inventoryItem:
  get:
    tags: [Provisions]
    operationId: getInventoryItem
    summary: Get a single pantry item by id.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Item.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Provisions]
    operationId: updateInventoryItem
    summary: Replace a pantry item (full replacement; expectedVersion required).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/UpdateInventoryItemRequest' }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  delete:
    tags: [Provisions]
    operationId: softDeleteInventoryItem
    summary: Soft-delete an inventory item (sets itemStatus=wasted).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: Deleted.
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found or not owned.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
equipment:
  get:
    tags: [Provisions]
    operationId: listEquipment
    summary: List the calling user's equipment.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Equipment list.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/provisions.yaml#/EquipmentDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
equipmentByName:
  put:
    tags: [Provisions]
    operationId: upsertEquipment
    summary: Create or update an equipment row by canonical name.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[a-z0-9_]+$' }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/UpsertEquipmentRequest' }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/EquipmentDto' }
      '201':
        description: Created.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/EquipmentDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  delete:
    tags: [Provisions]
    operationId: deleteEquipment
    summary: Delete an equipment row.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[a-z0-9_]+$' }
    responses:
      '204':
        description: Deleted.
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
