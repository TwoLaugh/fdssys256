inventory:
  get:
    tags: [Provisions]
    operationId: listInventory
    summary: List the calling user's active pantry items.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: storageLocation
        schema: { $ref: '../schemas/provisions.yaml#/StorageLocation' }
        required: false
      - in: query
        name: isStaple
        schema: { type: boolean }
        required: false
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of items.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  post:
    tags: [Provisions]
    operationId: createInventoryItem
    summary: Create a new pantry item.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/CreateInventoryItemRequest' }
    responses:
      '201':
        description: Created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
inventoryItem:
  get:
    tags: [Provisions]
    operationId: getInventoryItem
    summary: Get a single pantry item by id.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Item.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Provisions]
    operationId: updateInventoryItem
    summary: Replace a pantry item (full replacement; expectedVersion required).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/UpdateInventoryItemRequest' }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  delete:
    tags: [Provisions]
    operationId: softDeleteInventoryItem
    summary: Soft-delete an inventory item (sets itemStatus=wasted).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: Deleted.
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found or not owned.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
equipment:
  get:
    tags: [Provisions]
    operationId: listEquipment
    summary: List the calling user's equipment.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Equipment list.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/provisions.yaml#/EquipmentDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
equipmentByName:
  put:
    tags: [Provisions]
    operationId: upsertEquipment
    summary: Create or update an equipment row by canonical name.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[a-z0-9_]+$' }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/UpsertEquipmentRequest' }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/EquipmentDto' }
      '201':
        description: Created.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/EquipmentDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  delete:
    tags: [Provisions]
    operationId: deleteEquipment
    summary: Delete an equipment row.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[a-z0-9_]+$' }
    responses:
      '204':
        description: Deleted.
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
inventoryItemMarkSpoiled:
  post:
    tags: [Provisions]
    operationId: markInventoryItemSpoiled
    summary: Mark an inventory item as spoiled (idempotent).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Marked.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found or not owned.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
inventoryItemMarkExhausted:
  post:
    tags: [Provisions]
    operationId: markInventoryItemExhausted
    summary: Mark an inventory item as exhausted (idempotent).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Marked.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryItemDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found or not owned.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
inventoryItemAuditLog:
  get:
    tags: [Provisions]
    operationId: getInventoryItemAuditLog
    summary: Paginated audit log for an inventory item.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Audit page.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryAuditEntryDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found or not owned.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsBudget:
  get:
    tags: [Provisions]
    operationId: getProvisionsBudget
    summary: Return the calling user's budget configuration, or 404 if not yet initialised.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Budget configuration; spendTracking is null in v1 (derivation deferred to provisions-01f/01h).
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/BudgetDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Budget not initialised for the calling user.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Provisions]
    operationId: upsertProvisionsBudget
    summary: Insert or update the calling user's budget configuration.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/UpdateBudgetRequest' }
    responses:
      '200':
        description: Budget upserted (insert and update both return 200).
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/BudgetDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion (update path only).
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: Currency change rejected (use an explicit reset endpoint when one lands).
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsSupplierProducts:
  get:
    tags: [Provisions]
    operationId: searchSupplierProducts
    summary: Paginated supplier-products search; both filters optional. Sorted last_checked DESC.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: mappingKey
        required: false
        schema: { type: string, maxLength: 128 }
      - in: query
        name: supplier
        required: false
        schema: { type: string, maxLength: 32 }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of supplier products.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/SupplierProductDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  post:
    tags: [Provisions]
    operationId: upsertSupplierProduct
    summary: Insert or update a supplier product. Refreshes lastChecked on every call; preserves substitutionHistory.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/UpsertSupplierProductRequest' }
    responses:
      '200':
        description: Supplier product updated.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/SupplierProductDto' }
      '201':
        description: Supplier product created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/SupplierProductDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsSupplierProductSubstitution:
  post:
    tags: [Provisions]
    operationId: recordSupplierProductSubstitution
    summary: Append a substitution event to a supplier product's history (JSONB append).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: supplierProductId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/RecordSubstitutionRequest' }
    responses:
      '200':
        description: Substitution recorded.
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/SupplierProductDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Supplier product not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsWaste:
  post:
    tags: [Provisions]
    operationId: logWaste
    summary: 'Log a wasted item; deducts from linked inventory when tracking-active.'
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/LogWasteRequest' }
    responses:
      '201':
        description: 'Waste entry persisted.'
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/WasteEntryDto' }
      '400':
        description: 'Validation error'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Linked inventory item not found or not owned'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Waste quantity exceeds remaining inventory (tracking active)'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  get:
    tags: [Provisions]
    operationId: listWasteEntries
    summary: 'Paginated waste history; defaults to last 90 days.'
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: from
        required: false
        schema: { type: string, format: date }
      - in: query
        name: to
        required: false
        schema: { type: string, format: date }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: 'Page of waste entries sorted occurred_on DESC.'
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/WasteEntryDtoPage' }
      '400':
        description: 'Invalid date range (from > to)'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsWasteSummary:
  get:
    tags: [Provisions]
    operationId: getWasteSummary
    summary: 'Aggregate waste over a window; total cost, total entries, counts by reason, top items.'
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: from
        required: true
        schema: { type: string, format: date }
      - in: query
        name: to
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: 'Summary.'
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/WasteSummaryDto' }
      '400':
        description: 'Invalid date range'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsPlannerBundle:
  get:
    tags: [Provisions]
    operationId: getProvisionsPlannerBundle
    summary: 'Planner-friendly snapshot of the calling user''s inventory, equipment, budget, and supplier prices.'
    security:
      - cookieAuth: []
    responses:
      '200':
        description: 'Planner-bundle snapshot.'
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/ProvisionForPlannerBundleDto' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
provisionsCookEvent:
  post:
    tags: [Provisions]
    operationId: applyCookEvent
    summary: 'Apply a cook event for the calling user; deducts ingredients FIFO-by-expiry from the pantry.'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/CookEventCommand' }
    responses:
      '200':
        description: 'Deduction outcome including any underflow flags.'
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryDeductionResultDto' }
      '400': { description: 'Validation error', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '422': { description: 'Strict-mode underflow or batch cook (not supported in v1)', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
provisionsMealConsumption:
  post:
    tags: [Provisions]
    operationId: applyMealConsumption
    summary: 'Decrement a specific inventory item by a number of portions.'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/MealConsumptionCommand' }
    responses:
      '200':
        description: 'Deduction outcome.'
        content:
          application/json:
            schema: { $ref: '../schemas/provisions.yaml#/InventoryDeductionResultDto' }
      '400': { description: 'Validation error', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: 'Inventory item not found or not owned by caller', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
provisionsStandaloneConsumption:
  post:
    tags: [Provisions]
    operationId: applyStandaloneConsumption
    summary: 'Standalone food log — finds an active inventory row matching ingredientMappingKey and optionally decrements.'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/provisions.yaml#/StandaloneConsumptionCommand' }
    responses:
      '200':
        description: 'The matched inventory item (nullable; null when no matching active row exists).'
        content:
          application/json:
            schema:
              type: object
              nullable: true
              description: 'InventoryItemDto inlined to honor the round-1/4/6 nullable+$ref sticky-trap avoidance — do NOT use $ref with nullable here.'
              properties:
                id: { type: string, format: uuid }
                userId: { type: string, format: uuid }
                name: { type: string, maxLength: 128 }
                quantity: { type: number, format: double, nullable: true }
                unit: { type: string, maxLength: 16, nullable: true }
                ingredientMappingKey: { type: string, maxLength: 128, nullable: true }
                itemStatus: { type: string, enum: [ACTIVE, EXHAUSTED, SPOILED, WASTED] }
                version: { type: integer, format: int64 }
      '400': { description: 'Validation error', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
