# Grocery — Tier 1 shopping list (01b) + Tier 4 price history (01c).
# Per lld/grocery.md lines 689-697 / 729-738. userId resolved server-side from the session cookie.

# ===== Tier 1 — shopping list (01b) =====

shoppingListById:
  get:
    tags: [Grocery — Shopping List]
    operationId: getShoppingListById
    summary: 'Fetch a shopping list by id, with its lines.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: shoppingListId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: The shopping list.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/ShoppingListDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No such shopping list.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

shoppingListCurrent:
  get:
    tags: [Grocery — Shopping List]
    operationId: getCurrentShoppingList
    summary: 'The current (non-superseded) shopping list for a plan.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: planId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: The current shopping list for the plan.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/ShoppingListDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No current shopping list for that plan.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

shoppingListHistory:
  get:
    tags: [Grocery — Shopping List]
    operationId: getShoppingListHistory
    summary: 'Paginated shopping-list history for the caller, newest-first.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of shopping lists.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/ShoppingListDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

shoppingListRecalculate:
  post:
    tags: [Grocery — Shopping List]
    operationId: recalculateShoppingList
    summary: 'Recalculate the shopping list from a plan + provisions snapshot (idempotent per generation).'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/grocery.yaml#/RecalculateShoppingListRequest' }
    responses:
      '200':
        description: The recalculated (or existing, idempotent) shopping list.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/ShoppingListDto' }
      '400':
        description: 'Validation error (missing planId).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No such plan / no active generation.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

shoppingListExport:
  get:
    tags: [Grocery — Shopping List]
    operationId: exportShoppingList
    summary: 'Render a shopping list (PRINTABLE_HTML | PLAIN_TEXT | MARKDOWN | CSV).'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: shoppingListId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: format
        required: false
        schema: { $ref: '../schemas/grocery.yaml#/ExportFormat' }
    responses:
      '200':
        description: The rendered export.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/ShoppingListExportDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No such shopping list.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

# ===== Tier 2 — manual fulfilment (01d) =====

markBought:
  post:
    tags: [Grocery — Manual Fulfilment]
    operationId: markBought
    summary: 'Mark a single shopping-list line bought (price/store optional; over-mark allowed with a note).'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: listId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: lineId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/grocery.yaml#/MarkBoughtRequest' }
    responses:
      '200':
        description: 'Line marked bought (status BOUGHT); note set when the bought quantity over-marks.'
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/MarkBoughtResultDto' }
      '400':
        description: 'Validation error (bad quantity / unit / price).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No such line.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Line already bought, or a concurrent mark-bought collided (optimistic lock).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

bulkMarkBought:
  post:
    tags: [Grocery — Manual Fulfilment]
    operationId: bulkMarkBought
    summary: 'Mark several lines bought in one operation; optional total-spend distribution.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: listId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/grocery.yaml#/BulkMarkBoughtRequest' }
    responses:
      '200':
        description: 'One result per line (status BOUGHT); single inventory write + single event for the batch.'
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/grocery.yaml#/MarkBoughtResultDto' }
      '400':
        description: 'Validation error (empty line set / bad total spend).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'A requested line is missing or not part of the list.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'A requested line is already bought, or a concurrent edit collided.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

undoMarkBought:
  post:
    tags: [Grocery — Manual Fulfilment]
    operationId: undoMarkBought
    summary: 'Undo a Tier-2 mark-bought (line back to UNFILLED + compensating price note; inventory corrected manually).'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: listId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: lineId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: 'Undone (no body).'
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No such line.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Line is not currently bought — nothing to undo.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

# ===== Tier 4 — price history (01c) =====

priceHistoryAggregates:
  get:
    tags: [Grocery — Price History]
    operationId: getPriceAggregate
    summary: 'Aggregate (estimate, confidence, range) for an ingredient key; optional store filter.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: ingredientKey
        required: true
        schema: { type: string, minLength: 1, maxLength: 128 }
      - in: query
        name: store
        required: false
        schema: { type: string, maxLength: 64 }
    responses:
      '200':
        description: Aggregate estimate resolved (from observations or the reference fallback).
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/PriceAggregateDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'No estimate (key unknown to both observations and the reference source).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

priceHistoryCrossStore:
  get:
    tags: [Grocery — Price History]
    operationId: getCrossStorePriceAggregates
    summary: Per-store aggregates for an ingredient key (one entry per store).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: ingredientKey
        required: true
        schema: { type: string, minLength: 1, maxLength: 128 }
    responses:
      '200':
        description: 'Per-store aggregates (empty list when the key is unknown).'
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/grocery.yaml#/PriceAggregateDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

priceHistoryObservations:
  get:
    tags: [Grocery — Price History]
    operationId: getPriceObservations
    summary: 'Paginated raw observations for the caller (audit / debug), newest-first.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of observations.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/PriceObservationDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

priceHistoryObservationsByKey:
  get:
    tags: [Grocery — Price History]
    operationId: getPriceObservationsByKey
    summary: 'Paginated observations for one mapping key (household scope), newest-first.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: ingredientKey
        required: true
        schema: { type: string, minLength: 1, maxLength: 128 }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of observations for the key.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/PriceObservationDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

priceHistoryManual:
  post:
    tags: [Grocery — Price History]
    operationId: recordManualPrice
    summary: 'Record a one-off manual price observation (source = MANUAL, weight 0.7).'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/grocery.yaml#/RecordManualPriceRequest' }
    responses:
      '201':
        description: Observation recorded.
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/PriceObservationDto' }
      '400':
        description: 'Validation error (blank key/store, or an invalid price).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

priceHistoryRefresh:
  post:
    tags: [Grocery — Price History]
    operationId: refreshPrices
    summary: 'On-demand price refresh; 503 if AI features are paused (provider-quote path).'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/grocery.yaml#/RefreshPricesRequest' }
    responses:
      '200':
        description: 'Refresh result (in v1 with no provider configured, observationsWritten = 0).'
        content:
          application/json:
            schema: { $ref: '../schemas/grocery.yaml#/RefreshPricesResultDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '503':
        description: 'AI features paused (provider-quote path) — enter prices manually.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
