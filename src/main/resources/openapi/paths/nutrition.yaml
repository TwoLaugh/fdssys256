targets:
  get:
    tags: [Nutrition]
    operationId: getNutritionTargets
    summary: Return the calling user's nutrition targets, or 404 if not yet initialised.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Targets aggregate.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/TargetsDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Nutrition]
    operationId: updateNutritionTargets
    summary: Replace the calling user's nutrition targets (full replacement; expectedVersion required).
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/UpdateTargetsRequest' }
    responses:
      '200':
        description: Targets updated.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/TargetsDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
targetsAuditLog:
  get:
    tags: [Nutrition]
    operationId: getNutritionTargetsAuditLog
    summary: Paginated audit log of changes to the calling user's targets.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Audit-log page.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/NutritionTargetsAuditEntryDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeForDay:
  get:
    tags: [Nutrition]
    operationId: getIntakeForDay
    summary: Return the calling user's intake for one day.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: Intake day.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: No day row.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeRange:
  get:
    tags: [Nutrition]
    operationId: getIntakeRange
    summary: List intake days in [from, to] (max 35 days).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: from
        required: true
        schema: { type: string, format: date }
      - in: query
        name: to
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: Intake days.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Invalid range.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotConfirm:
  post:
    tags: [Nutrition]
    operationId: confirmIntakeSlot
    summary: Confirm a planned slot was eaten as planned.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotOverride:
  post:
    tags: [Nutrition]
    operationId: overrideIntakeSlot
    summary: Override a slot with verbatim free text (AI parse deferred).
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/OverrideIntakeRequest' }
    responses:
      '200':
        description: Overridden.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotEdit:
  post:
    tags: [Nutrition]
    operationId: editIntakeSlot
    summary: Manually set a slot's actual values.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/IntakeEntryDto' }
    responses:
      '200':
        description: Edited.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotSkip:
  post:
    tags: [Nutrition]
    operationId: skipIntakeSlot
    summary: Mark a slot as skipped.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    responses:
      '200':
        description: Skipped.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSnacks:
  post:
    tags: [Nutrition]
    operationId: logIntakeSnack
    summary: Log a snack on a date (auto-creates the day row).
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/LogSnackRequest' }
    responses:
      '201':
        description: Logged.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSnackById:
