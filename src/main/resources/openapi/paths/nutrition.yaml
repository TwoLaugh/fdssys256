targets:
  get:
    tags: [Nutrition]
    operationId: getNutritionTargets
    summary: Return the calling user's nutrition targets, or 404 if not yet initialised.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Targets aggregate.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/TargetsDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Nutrition]
    operationId: updateNutritionTargets
    summary: Replace the calling user's nutrition targets (full replacement; expectedVersion required).
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/UpdateTargetsRequest' }
    responses:
      '200':
        description: Targets updated.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/TargetsDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
targetsAuditLog:
  get:
    tags: [Nutrition]
    operationId: getNutritionTargetsAuditLog
    summary: Paginated audit log of changes to the calling user's targets.
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Audit-log page.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/NutritionTargetsAuditEntryDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not initialised.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeForDay:
  get:
    tags: [Nutrition]
    operationId: getIntakeForDay
    summary: Return the calling user's intake for one day.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: Intake day.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: No day row.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeRange:
  get:
    tags: [Nutrition]
    operationId: getIntakeRange
    summary: List intake days in [from, to] (max 35 days).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: from
        required: true
        schema: { type: string, format: date }
      - in: query
        name: to
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: Intake days.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Invalid range.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotConfirm:
  post:
    tags: [Nutrition]
    operationId: confirmIntakeSlot
    summary: Confirm a planned slot was eaten as planned.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    responses:
      '200':
        description: Updated.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotOverride:
  post:
    tags: [Nutrition]
    operationId: overrideIntakeSlot
    summary: Override a slot with verbatim free text (AI parse deferred).
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/OverrideIntakeRequest' }
    responses:
      '200':
        description: Overridden.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotEdit:
  post:
    tags: [Nutrition]
    operationId: editIntakeSlot
    summary: Manually set a slot's actual values.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/IntakeEntryDto' }
    responses:
      '200':
        description: Edited.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSlotSkip:
  post:
    tags: [Nutrition]
    operationId: skipIntakeSlot
    summary: Mark a slot as skipped.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: mealSlot, required: true, schema: { $ref: '../schemas/nutrition.yaml#/MealSlot' } }
    responses:
      '200':
        description: Skipped.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day or slot not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSnacks:
  post:
    tags: [Nutrition]
    operationId: logIntakeSnack
    summary: Log a snack on a date (auto-creates the day row).
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/LogSnackRequest' }
    responses:
      '201':
        description: Logged.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeDayDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeSnackById:
  delete:
    tags: [Nutrition]
    operationId: removeIntakeSnack
    summary: Delete a snack.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: path, name: snackId, required: true, schema: { type: string, format: uuid } }
    responses:
      '204':
        description: Deleted.
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Snack not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
intakeAuditLog:
  get:
    tags: [Nutrition]
    operationId: getIntakeAuditLog
    summary: Paginated audit log for a day.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
      - { in: query, name: page, schema: { type: integer, minimum: 0, default: 0 } }
      - { in: query, name: size, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    responses:
      '200':
        description: Audit page.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IntakeAuditEntryDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Day not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
targetsActivityRange:
  get:
    tags: [Nutrition]
    operationId: getDailyActivityRange
    summary: List daily activity log entries in [from, to].
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: query, name: from, required: true, schema: { type: string, format: date } }
      - { in: query, name: to,   required: true, schema: { type: string, format: date } }
    responses:
      '200':
        description: Activity entries.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/nutrition.yaml#/DailyActivityDto' }
      '400':
        description: Invalid range.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
targetsActivityByDate:
  put:
    tags: [Nutrition]
    operationId: upsertDailyActivity
    summary: Upsert the activity entry for a date.
    security: [{ cookieAuth: [] }]
    parameters:
      - { in: path, name: date, required: true, schema: { type: string, format: date } }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/UpsertDailyActivityRequest' }
    responses:
      '200':
        description: Upserted.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/DailyActivityDto' }
      '400':
        description: Validation.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionJournalDay:
  get:
    tags: [Nutrition]
    operationId: getNutritionJournalForDay
    summary: List the calling user's food/mood journal entries for a date, oldest first.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, format: date }
    responses:
      '200':
        description: Journal entries for the day (possibly empty).
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/nutrition.yaml#/FoodMoodEntryDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  post:
    tags: [Nutrition]
    operationId: createNutritionJournalEntry
    summary: Create a food/mood journal entry for the calling user.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, format: date }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/UpsertFoodMoodEntryRequest' }
    responses:
      '201':
        description: Entry created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/FoodMoodEntryDto' }
      '400':
        description: Validation error / path-body date mismatch.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: A slot-tied entry already exists for (userId, onDate, mealSlot).
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionJournalEntry:
  put:
    tags: [Nutrition]
    operationId: updateNutritionJournalEntry
    summary: Update an existing food/mood journal entry.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, format: date }
      - in: path
        name: entryId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/UpsertFoodMoodEntryRequest' }
    responses:
      '200':
        description: Entry updated.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/FoodMoodEntryDto' }
      '400':
        description: Validation error / path mismatch.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Entry not found / not owned / wrong date.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  delete:
    tags: [Nutrition]
    operationId: deleteNutritionJournalEntry
    summary: Hard-delete a food/mood journal entry.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, format: date }
      - in: path
        name: entryId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: Entry deleted.
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Entry not found / not owned / wrong date.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionJournalRecent:
  get:
    tags: [Nutrition]
    operationId: getRecentNutritionJournalEntries
    summary: Paginated recent journal entries newest-first.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of journal entries.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/FoodMoodEntryDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionIngredientLookup:
  get:
    tags: [Nutrition]
    operationId: lookupIngredient
    summary: Look up an ingredient by free-text term; cache-checks then falls through USDA / OFF.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: term
        required: true
        schema: { type: string, minLength: 1, maxLength: 255 }
    responses:
      '200':
        description: Ingredient nutrition resolved.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IngredientNutritionDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: No cache hit and no USDA / OFF match.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionIngredientSearch:
  post:
    tags: [Nutrition]
    operationId: searchIngredients
    summary: Search the cache (LIKE) for ingredient candidates; v1 is cache-only.
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/IngredientLookupRequest' }
    responses:
      '200':
        description: Cache search results.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IngredientLookupResultDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionIngredientCorrection:
  put:
    tags: [Nutrition]
    operationId: correctIngredientMapping
    summary: Correct an existing ingredient mapping; bumps source = MANUAL, confidence = 1.0.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: searchTerm
        required: true
        schema: { type: string, maxLength: 255 }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/CorrectIngredientMappingRequest' }
    responses:
      '200':
        description: Mapping corrected.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IngredientNutritionDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Search term not in cache.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionIngredientNeedsReview:
  get:
    tags: [Nutrition]
    operationId: getIngredientsNeedingReview
    summary: Paginated mappings with needs_review = true, sorted updatedAt DESC.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: Page of needs-review mappings.
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/IngredientNutritionDtoPage' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionHealthDirectives:
  get:
    tags: [Nutrition]
    operationId: listHealthDirectives
    summary: 'Paginated list of the caller''s health directives; optional status filter.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: status
        required: false
        schema: { type: string, enum: [PENDING_REVIEW, ACCEPTED, REJECTED, SUPERSEDED, EXPIRED] }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: 'Page of directives.'
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/HealthDirectiveDtoPage' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionHealthDirective:
  get:
    tags: [Nutrition]
    operationId: getHealthDirective
    summary: 'Fetch a single directive.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: directiveId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'The directive.'
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/HealthDirectiveDto' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Directive not found / belongs to another user'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionHealthDirectivesInbound:
  post:
    tags: [Nutrition]
    operationId: receiveInboundHealthDirective
    summary: 'Health platform pushes a new directive. Idempotent on (sourcePlatform, externalDirectiveId).'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/InboundHealthDirectiveRequest' }
    responses:
      '201':
        description: 'Directive persisted as PENDING_REVIEW.'
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/HealthDirectiveDto' }
      '400':
        description: 'Validation error'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Re-delivery of an existing directive'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionHealthDirectiveAccept:
  post:
    tags: [Nutrition]
    operationId: acceptHealthDirective
    summary: 'Accept a pending directive; runs safety gate then applies the deltas.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: directiveId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/AcceptDirectiveRequest' }
    responses:
      '200':
        description: 'Directive accepted and applied.'
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/HealthDirectiveDto' }
      '400':
        description: 'Validation error'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Directive not found / belongs to another user'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Already decided (not PENDING_REVIEW) or stale expectedVersion'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Safety gate blocked / preference-model target unavailable / invalid routing'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionHealthDirectiveReject:
  post:
    tags: [Nutrition]
    operationId: rejectHealthDirective
    summary: 'Reject a pending directive; records the rejection reason.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: directiveId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/RejectDirectiveRequest' }
    responses:
      '200':
        description: 'Directive rejected.'
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/HealthDirectiveDto' }
      '400':
        description: 'Validation error'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Directive not found'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Already decided or stale expectedVersion'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionRecipeRecalc:
  post:
    tags: [Nutrition]
    operationId: recalculateRecipeNutrition
    summary: 'Manually recalculate per-serving nutrition for a recipe version; result written back via the recipe-side SPI.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: versionId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/RecalculateRecipeNutritionRequest' }
    responses:
      '200':
        description: 'Computed per-serving nutrition. May include a Warning header if the recipe-side SPI is not yet wired.'
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/RecipeNutritionResultDto' }
      '400':
        description: 'Validation error'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe version not found'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Recipe-side write failed (e.g. version immutable)'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
nutritionFloorGateEvaluate:
  post:
    tags: [Nutrition]
    operationId: evaluateNutritionFloorGate
    summary: 'Evaluate the hard-floor gate for the calling user against a candidate plan rollup.'
    description: 'Returns passed=true with empty violations when no targets are configured or every hard floor is met across every day.'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/nutrition.yaml#/CandidatePlanRollupDto' }
    responses:
      '200':
        description: 'Gate verdict. HTTP 200 even when passed=false; passed is the actionable signal.'
        content:
          application/json:
            schema: { $ref: '../schemas/nutrition.yaml#/FloorGateResultDto' }
      '400':
        description: 'Validation error (e.g. perDay dates outside [startDate, endDate])'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
