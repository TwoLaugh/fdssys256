adaptationAdminSweepExpired:
  post:
    tags: [Adaptation]
    operationId: sweepExpiredPending
    summary: 'Admin: ad-hoc invoke the expired-pending-change sweep.'
    security:
      - cookieAuth: []
    responses:
      '200':
        description: 'Sweep result; touched is the number of rows flipped to EXPIRED.'
        content:
          application/json:
            schema: { $ref: '../schemas/adaptation.yaml#/SweepExpiredPendingResponse' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '403':
        description: 'Not admin.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
adaptationAdminRetryFailedJob:
  post:
    tags: [Adaptation]
    operationId: retryFailedJob
    summary: 'Admin: re-enqueue a fresh copy of a FAILED job.'
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/adaptation.yaml#/RetryFailedJobRequest' }
    responses:
      '200':
        description: 'The newly-enqueued job.'
        content:
          application/json:
            schema: { $ref: '../schemas/adaptation.yaml#/AdaptationJobDto' }
      '400':
        description: 'Validation error.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '403':
        description: 'Not admin.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Job not found.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Job is not in FAILED state.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
