    tags: [Adaptation]
    operationId: getAdaptationJob
    summary: 'Admin: fetch a job by id.'
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: jobId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'The job.'
        content:
          application/json:
            schema: { $ref: '../schemas/adaptation.yaml#/AdaptationJobDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '403':
        description: 'Not admin.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
