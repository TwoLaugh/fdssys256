feedback:
  post:
    tags: [Feedback]
    operationId: submitFeedback
    summary: 'Submit a free-text feedback entry. Classification + routing run asynchronously after commit.'
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/feedback.yaml#/SubmitFeedbackRequest' }
    responses:
      '202':
        description: 'Feedback received; classification + routing pending.'
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/SubmitFeedbackResponse' }
      '400':
        description: 'Validation error.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  get:
    tags: [Feedback]
    operationId: listFeedback
    summary: 'Paginated list of the caller''s feedback entries, newest-first.'
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: 'Page of feedback entries.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/FeedbackEntryDtoPage' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

feedbackById:
  get:
    tags: [Feedback]
    operationId: getFeedback
    summary: 'Fetch a single feedback entry with its routing log.'
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: feedbackId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Feedback entry.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/FeedbackEntryDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Not found, or belongs to another user.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

feedbackClarifications:
  get:
    tags: [Feedback - clarifications]
    operationId: listClarificationQueries
    summary: 'Paginated list of the caller''s clarification queries; optional status filter.'
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: status
        required: false
        schema: { type: string, enum: [PENDING, ANSWERED, EXPIRED] }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: 'Page of clarification queries.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/ClarificationQueryDtoPage' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

feedbackClarificationById:
  get:
    tags: [Feedback - clarifications]
    operationId: getClarificationQuery
    summary: 'Fetch a single clarification query.'
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: queryId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'The clarification query.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/ClarificationQueryDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Not found, or belongs to another user.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

feedbackClarificationAnswer:
  post:
    tags: [Feedback - clarifications]
    operationId: answerClarificationQuery
    summary: 'Answer a pending clarification; re-classification fires automatically afterwards.'
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: queryId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/feedback.yaml#/AnswerClarificationRequest' }
    responses:
      '200':
        description: 'Answer accepted; re-classification queued.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/SubmitFeedbackResponse' }
      '400':
        description: 'Validation error (neither field provided, or oversized text).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Query not found, or belongs to another user.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '410':
        description: 'Query expired; client should re-submit the original feedback.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Query already answered.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }

feedbackCorrectRoute:
  post:
    tags: [Feedback]
    operationId: correctMisclassification
    summary: 'User-driven correction of a single routing decision. Cancels the original route best-effort, re-fires the corrected destination, records ground truth.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: feedbackId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: routingId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/feedback.yaml#/CorrectionRequest' }
    responses:
      '200':
        description: 'Correction accepted; replay outcome reflected in routes.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/SubmitFeedbackResponse' }
      '400': { description: 'Validation error', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: 'Feedback or routing not found / belongs to another user', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '422': { description: 'Correction target invalid (no-op / chain / structural mismatch)', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }

feedbackCorrections:
  get:
    tags: [Feedback]
    operationId: listCorrections
    summary: 'Paginated list of the caller''s misclassification corrections; ground-truth audit log.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: 'Page of corrections.'
        content:
          application/json:
            schema: { $ref: '../schemas/feedback.yaml#/MisclassificationCorrectionDtoPage' }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
