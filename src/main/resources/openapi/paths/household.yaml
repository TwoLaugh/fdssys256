households:
  post:
    tags: [Households]
    operationId: createHousehold
    summary: Create a new household; the calling user becomes its primary member.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/CreateHouseholdRequest' }
    responses:
      '201':
        description: Household created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: User already a member of a household.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
currentHousehold:
  get:
    tags: [Households]
    operationId: getCurrentHousehold
    summary: Return the calling user's household, or 404 if none.
    security:
      - cookieAuth: []
    responses:
      '200':
        description: The calling user's household.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: User is not in any household.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
householdSettings:
  get:
    tags: [Households]
    operationId: getHouseholdSettings
    summary: Return a household's settings document.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: householdId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Settings.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdSettingsDto' }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Settings not found or caller not a member, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
  put:
    tags: [Households]
    operationId: updateHouseholdSettings
    summary: Replace a household's settings document (primary-only).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: householdId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/UpdateHouseholdSettingsRequest' }
    responses:
      '200': { description: Updated, content: { application/json: { schema: { $ref: '../schemas/household.yaml#/HouseholdSettingsDto' } } } }
      '400': { description: Validation error, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller not primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Settings not found, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: Stale expectedVersion, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdSettingsAuditLog:
  get:
    tags: [Households]
    operationId: getHouseholdSettingsAuditLog
    summary: Paginated audit-log of changes to a household's settings.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: householdId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200': { description: Audit-log page, content: { application/json: { schema: { $ref: '../schemas/household.yaml#/HouseholdSettingsAuditEntryDtoPage' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Settings not found or caller not a member, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdSlotConfiguration:
  get:
    tags: [Households]
    operationId: getHouseholdSlotConfiguration
    summary: Return resolved slot configuration (defaults + custom slots + eater lists).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: householdId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200': { description: Resolved configuration, content: { application/json: { schema: { $ref: '../schemas/household.yaml#/SlotConfigurationDto' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Household not found or caller not a member, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdInvitesCurrent:
  get:
    tags: [Households]
    operationId: listPendingHouseholdInvites
    summary: List the calling user's household's pending invites (codes redacted).
    security: [{ cookieAuth: [] }]
    responses:
      '200':
        description: Pending invites; inviteCode is null on every entry.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/household.yaml#/HouseholdInviteDto' }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Caller not in any household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
  post:
    tags: [Households]
    operationId: createHouseholdInvite
    summary: Create an invite for the calling user's household (PRIMARY only).
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/CreateInviteRequest' }
    responses:
      '201':
        description: Invite created; the response carries the inviteCode (the only response that does).
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdInviteDto' }
      '400': { description: Validation error, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller not primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Caller not in any household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdInviteRevoke:
  delete:
    tags: [Households]
    operationId: revokeHouseholdInvite
    summary: Revoke a pending invite (PRIMARY only).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: inviteId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: Invite revoked. }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller not primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Invite not found / belongs to another household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: Invite already accepted or already revoked, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
inviteAccept:
  post:
    tags: [Households]
    operationId: acceptHouseholdInvite
    summary: Accept an invite by code; the accepter joins the inviting household.
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/AcceptInviteRequest' }
    responses:
      '200':
        description: Invite accepted; returns the new HouseholdMemberDto for the accepter.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdMemberDto' }
      '400': { description: Validation error, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Invite issued for a different user, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Invite code not found, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: Already accepted or accepter already in a household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '410': { description: Invite expired or revoked, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdMembersCurrent:
  post:
    tags: [Households]
    operationId: addHouseholdMember
    summary: Directly add a member to the calling user's household (PRIMARY only). Prefer the invite flow for user-facing onboarding.
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/AddMemberRequest' }
    responses:
      '201':
        description: Member added.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdMemberDto' }
      '400': { description: Validation error, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller not primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Caller not in any household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: 'Target already in a household, or primary collision', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdMember:
  patch:
    tags: [Households]
    operationId: updateHouseholdMember
    summary: Update a member's priority / displayName (PRIMARY only). PATCH semantics — absent fields unchanged.
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: memberId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/UpdateMemberRequest' }
    responses:
      '200':
        description: Member updated.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdMemberDto' }
      '400': { description: Validation error, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller not primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Member not found / belongs to another household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: Stale expectedVersion, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
  delete:
    tags: [Households]
    operationId: removeHouseholdMember
    summary: Remove a member (PRIMARY removes anyone; members can self-remove).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: memberId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: Member removed. }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller is neither primary nor the target, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Member not found / belongs to another household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: Removing the last primary while other members remain, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdMemberRole:
  post:
    tags: [Households]
    operationId: changeHouseholdMemberRole
    summary: Change a member's role (PRIMARY only).
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: memberId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/ChangeRoleRequest' }
    responses:
      '200':
        description: Role updated.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/HouseholdMemberDto' }
      '400': { description: Validation error, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: Unauthenticated, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: Caller not primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: Member not found / belongs to another household, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '409': { description: Stale expectedVersion / demoting the last primary, content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdMerge:
  post:
    tags: [Households]
    operationId: mergeSoftPreferencesForCurrentHousehold
    summary: 'Merge the soft-preferences of the calling user''s household members (or a subset). Read-only; not persisted.'
    security: [{ cookieAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/household.yaml#/MergeSoftPreferencesRequest' }
    responses:
      '200':
        description: Merged soft preferences for the requested eater set.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/MergedSoftPreferencesDto' }
      '400': { description: 'Validation error', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '403': { description: 'eaterUserIds contains a user not in the caller''s household', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: 'Caller not in any household', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '422': { description: 'Merge requested on an empty household (zero members)', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
householdSlotConfigurationPlannerView:
  get:
    tags: [Households]
    operationId: getSlotConfigurationPlannerViewForCurrentHousehold
    summary: 'Planner-friendly slot-configuration view for the calling user''s household; read-only, not persisted.'
    security: [{ cookieAuth: [] }]
    responses:
      '200':
        description: Planner-friendly slot configuration snapshot.
        content:
          application/json:
            schema: { $ref: '../schemas/household.yaml#/SlotConfigurationPlannerViewDto' }
      '401': { description: 'Unauthenticated', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
      '404': { description: 'Caller not in any household, or household has no settings row', content: { application/problem+json: { schema: { $ref: '../schemas/common.yaml#/ProblemDetail' } } } }
