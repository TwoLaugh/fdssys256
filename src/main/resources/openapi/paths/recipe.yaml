recipes:
  post:
    tags: [Recipes]
    operationId: createRecipe
    summary: Create a new user-catalogue recipe (manual_create trigger).
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/CreateRecipeRequest' }
    responses:
      '201':
        description: Recipe created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeRoot:
  get:
    tags: [Recipes]
    operationId: getRecipe
    summary: Fetch a recipe by id (current version body).
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Recipe.
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  put:
    tags: [Recipes]
    operationId: manualEditRecipe
    summary: Manually edit a recipe; creates a new RecipeVersion (v2+) on the current branch.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/UpdateRecipeManualEditRequest' }
    responses:
      '200':
        description: Recipe updated; response body carries the new current version's hydrated DTO.
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeDto' }
      '400':
        description: Validation error or no-op edit.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Recipe not found or not owned by the caller.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedOptimisticVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: Manual edit attempted on a SYSTEM-catalogue recipe.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeVersionDiff:
  get:
    tags: [Recipes]
    operationId: getRecipeVersionDiff
    summary: Return the persisted change_diff between two consecutive versions on the same branch.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: fromVersionId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: toVersionId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Structured diff between fromVersion and toVersion.
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeDiffDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Recipe or version not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: Versions are non-consecutive or cross-branch.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeImports:
  post:
    tags: [Recipes]
    operationId: importRecipeFromUrl
    summary: Import a recipe by fetching and parsing a URL.
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/ImportRecipeFromUrlRequest' }
    responses:
      '201':
        description: Recipe imported.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: Import failed (fetch error or extraction failure).
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/RecipeImportFailure' }
recipeImportProvenance:
  get:
    tags: [Recipes]
    operationId: getRecipeImportProvenance
    summary: Return import provenance (source URL, extraction method, raw payload) for a recipe.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Provenance.
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeImportDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Recipe or provenance not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeBranches:
  get:
    tags: [Recipes]
    operationId: listRecipeBranches
    summary: List a recipe's branches (always at least 'main').
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: Branch list.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/recipe.yaml#/RecipeBranchDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Recipe not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  post:
    tags: [Recipes]
    operationId: createRecipeBranch
    summary: Fork a recipe into a new branch off a specific version.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/CreateBranchRequest' }
    responses:
      '201':
        description: Branch created.
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeBranchDto' }
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Recipe not found or not owned by the caller.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Branch name already exists for this recipe.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: Invalid branch-point version, reserved branch name, or manual branch on SYSTEM recipe.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeBranch:
  get:
    tags: [Recipes]
    operationId: getRecipeBranch
    summary: Fetch a single branch of a recipe.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: branchId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: The branch.
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeBranchDto' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Branch not found or belongs to another recipe.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeVersionsRevert:
  post:
    tags: [Recipes]
    operationId: revertRecipeToVersion
    summary: Revert a branch to an earlier version by writing a new version whose body clones the target.
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/RevertToVersionRequest' }
    responses:
      '200':
        description: New revert-version row created; returned with hydrated body.
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeVersionDto' }
      '400':
        description: Validation error or no-op revert.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: Unauthenticated.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: Recipe, branch, or version not found.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: Stale expectedRecipeOptimisticVersion.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: Revert on a SYSTEM-catalogue recipe.
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeSubstitutions:
  get:
    tags: [Recipes]
    operationId: getSubstitutionsForVersion
    summary: 'List substitutions for a specific version (state filter: ACCEPTED).'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: versionId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Active substitutions on the given version.'
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/recipe.yaml#/RecipeSubstitutionDto' }
      '400':
        description: 'versionId query param missing.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  post:
    tags: [Recipes]
    operationId: createRecipeSubstitution
    summary: 'Propose a new substitution; state = PROPOSED.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/CreateSubstitutionRequest' }
    responses:
      '201':
        description: 'Substitution created in PROPOSED state.'
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeSubstitutionDto' }
      '400':
        description: 'Validation error.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe or version not found or not owned.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Original ingredient missing on version or SYSTEM-catalogue recipe.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeSubstitutionsActive:
  get:
    tags: [Recipes]
    operationId: getActiveSubstitutions
    summary: 'List all ACCEPTED substitutions for the recipe.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Accepted substitutions for the recipe.'
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../schemas/recipe.yaml#/RecipeSubstitutionDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeSubstitutionLifecycle:
  post:
    tags: [Recipes]
    operationId: actOnRecipeSubstitution
    summary: 'Discriminated lifecycle action - single endpoint with action in path: accept, reject, promote-to-version.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: subId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: action
        required: true
        schema: { type: string, enum: [accept, reject, promote-to-version] }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/SubstitutionLifecycleRequest' }
    responses:
      '200':
        description: 'Substitution acted upon; accept and reject return the substitution, promote returns the new RecipeVersion.'
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: '../schemas/recipe.yaml#/RecipeSubstitutionDto' }
                - { $ref: '../schemas/recipe.yaml#/RecipeVersionDto' }
      '400':
        description: 'Validation error or unknown action.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Substitution not found or not owned.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Stale expectedVersion.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Terminal state or promotion precondition (must be ACCEPTED).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeVersionWithSubstitutions:
  get:
    tags: [Recipes]
    operationId: getRecipeVersionWithSubstitutions
    summary: 'Fetch a version with active substitutions overlaid onto the ingredients and method.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: versionId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Version with overlays applied; carries appliedSubstitutionIds list.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeVersionDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe or version not found.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipePromote:
  post:
    tags: [Recipes]
    operationId: promoteRecipeToUserCatalogue
    summary: 'Promote a SYSTEM-catalogue recipe to the calling user''s USER catalogue (flip-in-place).'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Recipe is now in the user catalogue.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Recipe is already USER catalogue, deleted, or archived.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeDemote:
  post:
    tags: [Recipes]
    operationId: demoteRecipeToSystemCatalogue
    summary: 'Demote a USER-catalogue recipe owned by the caller to SYSTEM catalogue (flip-in-place, retains userId for provenance).'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: 'Recipe demoted; no body.'
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found or not owned by the caller.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Recipe is already SYSTEM catalogue.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeArchive:
  post:
    tags: [Recipes]
    operationId: archiveRecipe
    summary: 'Soft-archive the recipe (sets archived_at); idempotent.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: 'Recipe archived (or already was; idempotent).'
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found or not owned by the caller.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '422':
        description: 'Recipe is already deleted.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeUnarchive:
  post:
    tags: [Recipes]
    operationId: unarchiveRecipe
    summary: 'Unarchive the recipe (clears archived_at); idempotent.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: 'Recipe unarchived (or was not archived; idempotent).'
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found or not owned by the caller.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeAdminRunArchiveScan:
  post:
    tags: [Recipes]
    operationId: runArchiveScan
    summary: 'Manual trigger for the daily archive-eligibility scan; returns the count of newly-archived rows.'
    security: [{ cookieAuth: [] }]
    responses:
      '200':
        description: 'Scan completed; flaggedCount is the number of rows newly archived this run.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RunArchiveScanResultDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeImage:
  post:
    tags: [Recipes]
    operationId: uploadRecipeImage
    summary: 'Upload a recipe image (multipart). 5MB cap; MIME allow-list (JPEG, PNG, WebP); owner-only.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
                description: 'Image bytes; MIME validated by magic-byte probe (Tika), browser-supplied type is a hint only.'
    responses:
      '200':
        description: 'Image stored; response carries the public URL the frontend should use.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeImageDto' }
      '400':
        description: 'File missing or empty.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '403':
        description: 'Caller does not own the recipe (or recipe is SYSTEM-catalogue).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe not found or soft-deleted.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '413':
        description: 'Upload exceeds the configured maximum size.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '415':
        description: 'MIME type not in allow-list (image/jpeg, image/png, image/webp).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  get:
    tags: [Recipes]
    operationId: getRecipeImage
    summary: 'Stream the recipe image. Anonymous-accessible.'
    # Anonymous-permitted per AuthSecurityConfig (matches ticket §14).
    # Declared explicitly to satisfy Redocly's security-defined rule.
    security: []
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Image bytes; Content-Type matches the stored MIME; Cache-Control: public, max-age=86400, immutable.'
        headers:
          Cache-Control:
            schema: { type: string }
            description: 'public, max-age=86400, immutable'
        content:
          image/jpeg:
            schema: { type: string, format: binary }
          image/png:
            schema: { type: string, format: binary }
          image/webp:
            schema: { type: string, format: binary }
      '404':
        description: 'No image stored for this recipe, or the recipe itself is missing / soft-deleted.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeRatings:
  post:
    tags: [Recipes]
    operationId: createRecipeRating
    summary: 'Record a multi-dimensional rating on a recipe version. One-tap (taste only) or detailed.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/CreateRatingRequest' }
    responses:
      '201':
        description: 'Rating recorded; aggregate computed server-side.'
        headers:
          Location:
            schema: { type: string, format: uri }
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeRatingDto' }
      '400':
        description: 'Validation error, or versionId does not belong to the path recipe.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Recipe or version not found.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'A rating by this user already exists for this version; use PUT.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  get:
    tags: [Recipes]
    operationId: listRecipeRatings
    summary: 'Paginated list of ratings for a version, newest-first.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: versionId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: page
        schema: { type: integer, minimum: 0, default: 0 }
      - in: query
        name: size
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    responses:
      '200':
        description: 'Page of ratings for the version.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeRatingDtoPage' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeRatingsMine:
  get:
    tags: [Recipes]
    operationId: getMyRecipeRating
    summary: 'The caller''s own rating for a version, if any.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: versionId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'The caller''s rating for the version.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeRatingDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'The caller has not rated this version.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeRatingsSummary:
  get:
    tags: [Recipes]
    operationId: getRecipeRatingSummary
    summary: 'Aggregate rating summary for a version, or the whole recipe when versionId is omitted.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: versionId
        required: false
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: 'Aggregate summary (averages + count).'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeRatingSummaryDto' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
recipeRatingById:
  put:
    tags: [Recipes]
    operationId: updateRecipeRating
    summary: 'Revise an existing rating; recomputes the aggregate and re-fires the rating event.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: ratingId
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../schemas/recipe.yaml#/UpdateRatingRequest' }
    responses:
      '200':
        description: 'Rating updated; aggregate recomputed, optimistic version bumped.'
        content:
          application/json:
            schema: { $ref: '../schemas/recipe.yaml#/RecipeRatingDto' }
      '400':
        description: 'Validation error, or versionId mismatch.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Rating not found, or not owned by the caller.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '409':
        description: 'Stale expectedVersion (optimistic-lock conflict).'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
  delete:
    tags: [Recipes]
    operationId: deleteRecipeRating
    summary: 'Delete the caller''s rating.'
    security: [{ cookieAuth: [] }]
    parameters:
      - in: path
        name: recipeId
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: ratingId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
        description: 'Rating deleted.'
      '401':
        description: 'Unauthenticated.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
      '404':
        description: 'Rating not found, or not owned by the caller.'
        content:
          application/problem+json:
            schema: { $ref: '../schemas/common.yaml#/ProblemDetail' }
