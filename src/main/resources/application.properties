## ============================================================
## MealPrep AI — base configuration
##
## Profile-specific overrides live in application-<profile>.properties.
## Active profile is selected via SPRING_PROFILES_ACTIVE (defaults to dev locally).
## ============================================================

spring.application.name=mealprep
spring.profiles.default=dev

server.port=8080

# Globally-fixed JPA settings (profile properties override ddl-auto where appropriate)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Spring MVC error responses use the RFC 9457 ProblemDetail shape — required to make
# Spring's built-in ResponseStatusException handler emit application/problem+json.
spring.mvc.problemdetails.enabled=true

# Flyway is the source of truth for schema; never let Hibernate mutate it.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Springdoc / Swagger UI — disabled by default; enable per profile.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# OpenAPI spec lookup path used by tests and by the auth-01 contract test base.
mealprep.openapi.spec-classpath=openapi/openapi.yaml

# Recipe-01g ArchiveEligibilityScanner cron (UTC). Default: daily at 03:30. Override per profile if
# needed; tests disable the scheduled trigger via a far-future cron in application-test.properties.
mealprep.recipe.archive.cron=0 30 3 * * *

# Recipe-01h embedding model id stored on recipe_versions.embedding_model_id when the async listener
# stores a successfully-embedded vector. Tracks the OpenAI model used so a future re-embed pass can
# detect model rollovers (text-embedding-3-small -> -large) and re-process stale rows.
mealprep.recipe.embedding.model-id=openai:text-embedding-3-small

# AI dispatcher defaults — actual API key set per profile / env.
mealprep.ai.anthropic-base-url=https://api.anthropic.com
mealprep.ai.tier-cheap-model=claude-haiku-4-5-20251001
mealprep.ai.tier-mid-model=claude-sonnet-4-6
mealprep.ai.tier-high-model=claude-opus-4-7
mealprep.ai.timeout-seconds=60
mealprep.ai.max-retries=3

# Embedding pipeline (01c). openai-api-key is set per profile / env (see application-<profile>.properties).
mealprep.ai.embedding.model=text-embedding-3-small
mealprep.ai.embedding.cache-size=10000
mealprep.ai.embedding.cache-ttl-hours=24

# Per-user rolling-window cost cap (01b). enabled=false short-circuits the check.
mealprep.ai.budget.enabled=true
mealprep.ai.budget.daily-pence-per-user=50
mealprep.ai.budget.window-hours=24

# Ingredient mapping cache external clients (nutrition-01d).
mealprep.nutrition.usda.base-url=https://api.nal.usda.gov/fdc/v1
mealprep.nutrition.usda.api-key=${USDA_API_KEY:test-key-not-real}
mealprep.nutrition.open-food-facts.base-url=https://world.openfoodfacts.org

# Resilience4j: USDA retry on 5xx (2 attempts), 1000 req/h rate limit.
resilience4j.retry.instances.usda.max-attempts=2
resilience4j.retry.instances.usda.wait-duration=200ms
resilience4j.retry.instances.usda.retry-exceptions=org.springframework.web.client.HttpServerErrorException
resilience4j.ratelimiter.instances.usda.limit-for-period=1000
resilience4j.ratelimiter.instances.usda.limit-refresh-period=PT1H
resilience4j.ratelimiter.instances.usda.timeout-duration=0

# Provisions: cook-event dedupe sweep cron (daily at 04:00 UTC by default).
mealprep.provision.cook-dedupe.cron=0 0 4 * * *

# Nutrition divergence detector (01h). Threshold is the |variance| fraction at which a macro is
# considered diverged (0.15 = +/-15%); minimum-planned-floor-kcal silences detection on tiny plans.
mealprep.nutrition.divergence.macro-variance-threshold=0.15
mealprep.nutrition.divergence.minimum-planned-floor-kcal=200

# Resilience4j: OFF retry on 5xx (2 attempts), 100 req/h rate limit.
resilience4j.retry.instances.off.max-attempts=2
resilience4j.retry.instances.off.wait-duration=200ms
resilience4j.retry.instances.off.retry-exceptions=org.springframework.web.client.HttpServerErrorException
resilience4j.ratelimiter.instances.off.limit-for-period=100
resilience4j.ratelimiter.instances.off.limit-refresh-period=PT1H
resilience4j.ratelimiter.instances.off.timeout-duration=0

# Adaptation pipeline (01a). Defaults per lld/adaptation-pipeline.md §Configuration (lines 705-727).
# source-budgets defaults to empty per LLD line 715; tuning lands with first-month traffic data.
mealprep.adaptation.candidate-top-n=5
mealprep.adaptation.plan-time-timeout-ms=10000
mealprep.adaptation.feedback-timeout-ms=8000
mealprep.adaptation.import-timeout-ms=12000
mealprep.adaptation.max-rebase-attempts=3
mealprep.adaptation.pending-change-budget-per-week=3
mealprep.adaptation.pending-change-expiry-days=14
mealprep.adaptation.low-confidence-floor=0.50
mealprep.adaptation.auto-skip-top-ratio=2.00
mealprep.adaptation.recipe-advisory-lock-seconds=30
mealprep.adaptation.pending-expiry-sweep-cron=0 0 4 * * *
mealprep.adaptation.batch-orchestrator-cron=0 30 4 * * *
