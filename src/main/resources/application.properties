## ============================================================
## MealPrep AI — base configuration
##
## Profile-specific overrides live in application-<profile>.properties.
## Active profile is selected via SPRING_PROFILES_ACTIVE (defaults to dev locally).
## ============================================================

spring.application.name=mealprep
spring.profiles.default=dev

server.port=8080

# Globally-fixed JPA settings (profile properties override ddl-auto where appropriate)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Spring MVC error responses use the RFC 9457 ProblemDetail shape — required to make
# Spring's built-in ResponseStatusException handler emit application/problem+json.
spring.mvc.problemdetails.enabled=true

# Flyway is the source of truth for schema; never let Hibernate mutate it.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Springdoc / Swagger UI — disabled by default; enable per profile.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator: expose ONLY health + info. NEVER add env/configprops/beans/mappings/threaddump/
# heapdump/loggers/conditions/scheduledtasks/caches/sessions/auditevents/httptrace — those
# leak configuration, env vars, secrets, and internal structure. The exposure list is an
# explicit allow-list, never use `*`.
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
# Anonymous callers see {"status":"UP"} only. Authenticated callers (future admin role)
# see component-level breakdown — prevents the public health endpoint leaking DB / Redis /
# external-API names.
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Info-endpoint contributors. NOTE: management.info.env.enabled controls the
# EnvironmentInfoContributor, which reads `info.*` properties from the environment
# (e.g. info.app.name below). It does NOT expose arbitrary env vars — the /actuator/env
# endpoint is gated separately by management.endpoints.web.exposure.include (set to
# health,info only above). So enabling this is safe; what it does is let us define
# the content of /actuator/info via info.* properties below.
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=false
management.info.build.enabled=true
# Content for /actuator/info via the EnvironmentInfoContributor. Spring Boot 3.x's info
# endpoint returns 404 when zero contributors emit anything; this guarantees a non-empty
# body of {"app":{"name":"mealprep"}}. The ActuatorExposureIT.info_responseHasNoEnvBlock
# test confirms no env-var leakage in the response.
info.app.name=mealprep

# OpenAPI spec lookup path used by tests and by the auth-01 contract test base.
mealprep.openapi.spec-classpath=openapi/openapi.yaml

# Recipe-01g ArchiveEligibilityScanner cron (UTC). Default: daily at 03:30. Override per profile if
# needed; tests disable the scheduled trigger via a far-future cron in application-test.properties.
mealprep.recipe.archive.cron=0 30 3 * * *

# Recipe-01h embedding model id stored on recipe_versions.embedding_model_id when the async listener
# stores a successfully-embedded vector. Tracks the OpenAI model used so a future re-embed pass can
# detect model rollovers (text-embedding-3-small -> -large) and re-process stale rows.
mealprep.recipe.embedding.model-id=openai:text-embedding-3-small

# Recipe-02a image storage. Local FS in v1; the RecipeImageStore SPI lets a future S3 backend
# swap in without endpoint changes. base-dir must exist OR be creatable at bean init.
# max-file-size MUST be <= spring.servlet.multipart.max-file-size below; the multipart resolver
# is the first gate (413), application-layer cap is the cross-check.
mealprep.recipe.image-storage.base-dir=./data/recipe-images
mealprep.recipe.image-storage.max-file-size=5MB
mealprep.recipe.image-storage.allowed-mime-types=image/jpeg,image/png,image/webp
mealprep.recipe.image-storage.cache-max-age=PT24H

# Spring multipart resolver limits — must accommodate the 5MB image upload above. Anything
# stricter than 5MB here would surface as a generic 413 before the recipe-02a handler runs.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# AI dispatcher defaults — actual API key set per profile / env.
mealprep.ai.anthropic-base-url=https://api.anthropic.com
mealprep.ai.tier-cheap-model=claude-haiku-4-5-20251001
mealprep.ai.tier-mid-model=claude-sonnet-4-6
mealprep.ai.tier-high-model=claude-opus-4-7
mealprep.ai.timeout-seconds=60
mealprep.ai.max-retries=3

# Embedding pipeline (01c). openai-api-key is set per profile / env (see application-<profile>.properties).
mealprep.ai.embedding.model=text-embedding-3-small
mealprep.ai.embedding.cache-size=10000
mealprep.ai.embedding.cache-ttl-hours=24

# Per-user rolling-window cost cap (01b). enabled=false short-circuits the check.
mealprep.ai.budget.enabled=true
mealprep.ai.budget.daily-pence-per-user=50
mealprep.ai.budget.window-hours=24

# Ingredient mapping cache external clients (nutrition-01d).
mealprep.nutrition.usda.base-url=https://api.nal.usda.gov/fdc/v1
mealprep.nutrition.usda.api-key=${USDA_API_KEY:test-key-not-real}
mealprep.nutrition.open-food-facts.base-url=https://world.openfoodfacts.org

# Resilience4j: USDA retry on 5xx (2 attempts), 1000 req/h rate limit.
resilience4j.retry.instances.usda.max-attempts=2
resilience4j.retry.instances.usda.wait-duration=200ms
resilience4j.retry.instances.usda.retry-exceptions=org.springframework.web.client.HttpServerErrorException
resilience4j.ratelimiter.instances.usda.limit-for-period=1000
resilience4j.ratelimiter.instances.usda.limit-refresh-period=PT1H
resilience4j.ratelimiter.instances.usda.timeout-duration=0

# Provisions: cook-event dedupe sweep cron (daily at 04:00 UTC by default).
mealprep.provision.cook-dedupe.cron=0 0 4 * * *

# Feedback retry-stuck-classifications sweep (feedback-01i). Recovery half of the classifier's
# graceful-degrade model: re-classifies entries stuck RECEIVED/CLASSIFYING past stuck-after, and
# escalates entries older than escalate-after to FAILED. fixed-delay-ms is the @Scheduled cadence
# (LLD: every 2 minutes); initial-delay-ms defers the first auto-fire after boot.
mealprep.feedback.retry-sweep.fixed-delay-ms=120000
mealprep.feedback.retry-sweep.initial-delay-ms=120000
mealprep.feedback.retry-sweep.stuck-after=PT5M
mealprep.feedback.retry-sweep.escalate-after=PT24H

# Preference AI delta-generation pipeline (preference-01g). The BATCH trigger fires every
# batch-threshold-th PREFERENCE-routed feedback; the WEEKLY sweep (weekly-cron) sweeps users with
# pending feedback; the MANUAL trigger fires on POST /refresh-now. weekly-enabled gates the
# @Scheduled bean (test profile sets it false + a never-matching cron). corrective-retry-enabled
# toggles the single re-prompt on a validator/budget rejection.
mealprep.feedback.preference-delta.weekly-cron=0 0 3 * * SUN
mealprep.feedback.preference-delta.weekly-enabled=true
mealprep.feedback.preference-delta.batch-threshold=5
mealprep.feedback.preference-delta.corrective-retry-enabled=true

# Notification/01b scheduled scanners. Each scanner is individually enableable; cron expressions are
# overridable per profile. The test profile disables all scanners (application-test.properties) so
# the cron triggers never auto-fire during a test run — the scanner tests invoke scan() directly.
mealprep.notification.scanners.expiry-warning.enabled=true
mealprep.notification.scanners.expiry-warning.cron=0 0 6 * * ?
mealprep.notification.scanners.expiry-warning.fridge-days=2
mealprep.notification.scanners.expiry-warning.freezer-days=14
mealprep.notification.scanners.expiry-warning.pantry-days=7
mealprep.notification.scanners.defrost-reminder.enabled=true
mealprep.notification.scanners.defrost-reminder.cron=0 */15 * * * ?
mealprep.notification.scanners.prep-reminder.enabled=true
mealprep.notification.scanners.prep-reminder.cron=0 */5 * * * ?
mealprep.notification.scanners.prep-reminder.lead-minutes=15
mealprep.notification.scanners.nutrition-alert.enabled=true
mealprep.notification.scanners.nutrition-alert.cron=0 0 21 * * ?
mealprep.notification.scanners.nutrition-alert.threshold=0.30
mealprep.notification.scanners.staple-replenishment.enabled=true
mealprep.notification.scanners.staple-replenishment.cron=0 0 10 * * SUN
mealprep.notification.scanners.cleanup.cron=0 0 2 * * ?
mealprep.notification.scanners.dispatch-log-retention-days=30

# Nutrition divergence detector (01h). Threshold is the |variance| fraction at which a macro is
# considered diverged (0.15 = +/-15%); minimum-planned-floor-kcal silences detection on tiny plans.
mealprep.nutrition.divergence.macro-variance-threshold=0.15
mealprep.nutrition.divergence.minimum-planned-floor-kcal=200

# Single-field feedback target adjustment (nutrition-01i). *-pct map an adjustment magnitude step to
# a fraction of the current value (0.05 = 5%); calorie-floor is the sanity floor an adjusted daily
# calorie target is clamped to (never driven <= 0). Bound to FeedbackAdjustmentProperties.
mealprep.nutrition.feedback-adjustment.small-pct=0.05
mealprep.nutrition.feedback-adjustment.moderate-pct=0.10
mealprep.nutrition.feedback-adjustment.large-pct=0.20
mealprep.nutrition.feedback-adjustment.calorie-floor=1000

# Resilience4j: OFF retry on 5xx (2 attempts), 100 req/h rate limit.
resilience4j.retry.instances.off.max-attempts=2
resilience4j.retry.instances.off.wait-duration=200ms
resilience4j.retry.instances.off.retry-exceptions=org.springframework.web.client.HttpServerErrorException
resilience4j.ratelimiter.instances.off.limit-for-period=100
resilience4j.ratelimiter.instances.off.limit-refresh-period=PT1H
resilience4j.ratelimiter.instances.off.timeout-duration=0

# Planner Stage-A beam-search defaults (planner-01d). Per lld/planner.md §Configuration.
# Subsequent tickets (01e/01f/01g/01h) append further keys (weight scheme, rollup tunables, LLM tier targets).
mealprep.planner.week-start-day-of-week=MONDAY
mealprep.planner.beam-width=20
mealprep.planner.top-n=5
mealprep.planner.min-pool-per-slot=3
mealprep.planner.max-pool-per-slot=50
mealprep.planner.max-time-overshoot-ratio=1.5
mealprep.planner.stage-a-timeout=PT30S

# Planner-01h Phase-2 augmentation limits (LLM proposes at most these many).
mealprep.planner.max-augmentations=5
mealprep.planner.max-refine-directives=2

# Planner-01e composite scoring. weights.* are v1-uniform 1/7 ≈ 0.143 per HLD §Initial Weights v1
# (locked). Sum is intentionally ≈1.001 (rounding) and NOT enforced to be 1.0 — the composite is
# Σ weight × sub_score, valid for any non-negative vector. TODO(user): re-tune via these keys (no
# redeploy) if calibration shows uniform weights are wrong. scoring.* are tunable numeric constants
# for the variety / provisions / cost sub-scores; the 7 per-sub-score formulas themselves are LOCKED.
mealprep.planner.weights.preference=0.143
mealprep.planner.weights.nutrition=0.143
mealprep.planner.weights.cost=0.143
mealprep.planner.weights.variety=0.143
mealprep.planner.weights.time=0.143
mealprep.planner.weights.batch=0.143
mealprep.planner.weights.provisions=0.143
mealprep.planner.scoring.variety.cuisine=5
mealprep.planner.scoring.variety.protein=4
mealprep.planner.scoring.variety.cooking-method=3
mealprep.planner.scoring.variety.max-repeat=2
mealprep.planner.scoring.provisions.waste-value-tiers.above-seven-days=1.0
mealprep.planner.scoring.provisions.waste-value-tiers.three-days-or-less=2.0
mealprep.planner.scoring.provisions.waste-value-tiers.one-day-or-less=3.0
mealprep.planner.scoring.cost.confidence-threshold=0.1
# Mid-week re-opt (01i). lock-hours-before-slot: a still-PLANNED slot pins once now is within
# this many hours of its date. max-suggestions-per-plan: budget guard against trigger thrashing.
mealprep.planner.mid-week.lock-hours-before-slot=24
mealprep.planner.mid-week.max-suggestions-per-plan=3
# Event-listener materiality filters (01k). nutrition-variance-pct: min absolute macro divergence
# (fraction; 0.15 == 15%) for a NutritionIntakeDivergedEvent to be material.
# nutrition-min-redistributable-meals: divergence is only actionable with >= this many
# unplanned/unpinned meals left to redistribute over. preference-soft-delta-points: min soft-pref
# swing for a pure-soft preference change to be material (hard-constraint changes always material).
mealprep.planner.materiality.nutrition-variance-pct=0.15
mealprep.planner.materiality.nutrition-min-redistributable-meals=3
mealprep.planner.materiality.preference-soft-delta-points=10

# Cold-start gate (recipe-pool Tier-2). Before Stage A, if the candidate catalogue is below
# slot-kind-multiplier x distinct-slot-kinds the composer invokes DiscoveryService.runJobSync to
# fill the SYSTEM catalogue (meal-planner.md §Cold start: "≥3× slot count"). requested-count caps
# the import ("up to 50"); timeout bounds the synchronous wait (degrades gracefully on timeout).
# source-keys empty ⇒ all currently-enabled discovery sources (prod). The e2e profile overrides
# source-keys to the deterministic e2e_curated_seed source so the non-deterministic web/Google
# scrapers never run in the stack.
mealprep.planner.cold-start.enabled=true
mealprep.planner.cold-start.slot-kind-multiplier=3
mealprep.planner.cold-start.requested-count=50
mealprep.planner.cold-start.timeout=PT20S
mealprep.planner.cold-start.source-keys=

# Planner-01g Stage-C (LLM pick-of-N) + iteration budget. stage-c-timeout default PT20S per the
# LLD-locked default; iteration-budget default 3 (consumed by Stage D in 01h/01j, key at planner level).
mealprep.planner.stage-c-timeout=PT20S
mealprep.planner.iteration-budget=3

# Adaptation pipeline (01a). Defaults per lld/adaptation-pipeline.md §Configuration (lines 705-727).
# source-budgets defaults to empty per LLD line 715; tuning lands with first-month traffic data.
mealprep.adaptation.candidate-top-n=5
mealprep.adaptation.plan-time-timeout-ms=10000
mealprep.adaptation.feedback-timeout-ms=8000
mealprep.adaptation.import-timeout-ms=12000
mealprep.adaptation.max-rebase-attempts=3
mealprep.adaptation.pending-change-budget-per-week=3
mealprep.adaptation.pending-change-expiry-days=14
mealprep.adaptation.low-confidence-floor=0.50
mealprep.adaptation.auto-skip-top-ratio=2.00
mealprep.adaptation.recipe-advisory-lock-seconds=30
mealprep.adaptation.pending-expiry-sweep-cron=0 0 4 * * *
mealprep.adaptation.batch-orchestrator-cron=0 30 4 * * *

# Discovery — Google Custom Search JSON API adapter (01e). Secrets via env vars; the `placeholder`
# defaults keep dev/test bootable without credentials (first real CSE call then 401 -> graceful
# DiscoverySourceUnavailableException). Free tier is 100 q/day; 50 is the conservative v1 budget.
mealprep.discovery.search.google.api-key=${MEALPREP_GOOGLE_CSE_KEY:placeholder}
mealprep.discovery.search.google.search-engine-id=${MEALPREP_GOOGLE_CSE_ID:placeholder}
mealprep.discovery.search.google.results-per-query=10
mealprep.discovery.search.google.max-queries-per-day=50
mealprep.discovery.search.google.user-agent=MealPrepAI/1.0 (+https://mealprep.example.com/bot)

# Discovery — AI candidate filter (01g). The runner gates each candidate against the model's
# self-rated confidence; below the floor → candidate dropped before fetch. Conservative default
# 0.6 — raise for a quieter pipeline; lower for a more permissive one.
mealprep.discovery.candidate-filter-min-confidence=0.6

# Grocery module (01a). Defaults per lld/grocery.md §Configuration (lines 990-1001). The full
# config surface ships now so it doesn't churn, but the V1-SIMPLE aggregate (01c) reads ONLY
# confidence-weights.* + aggregator.stale-threshold-days; aggregator.half-life-days / prior-strength
# and inflation.monthly-factor are v2 (wired but unused in v1). scheduler.* drives the optional 01g
# jobs.
mealprep.grocery.aggregator.half-life-days=90
mealprep.grocery.aggregator.prior-strength=2.0
mealprep.grocery.aggregator.stale-threshold-days=90
mealprep.grocery.confidence-weights.paid=1.0
mealprep.grocery.confidence-weights.quote=0.85
mealprep.grocery.confidence-weights.manual=0.7
mealprep.grocery.confidence-weights.manual-estimated=0.4
mealprep.grocery.confidence-weights.inflation-indexed=0.15
mealprep.grocery.inflation.monthly-factor=0.005
mealprep.grocery.freshness.ramp-up-weeks=8
mealprep.grocery.freshness.default-refresh-top-n=50
mealprep.grocery.scheduler.refresh-cron=0 0 4 * * SUN
mealprep.grocery.scheduler.order-status-cron=0 0 * * * *
mealprep.grocery.scheduler.archive-cron=0 0 5 * * *
mealprep.grocery.order.single-flight-lock-ttl-seconds=300
mealprep.grocery.order.provider-unavailable-retry-hours=24

# Origin-tracking foundation (core-02b). Filter behaviour for inbound X-Origin* requests.
# - ai-confidence-floor: AI_FEEDBACK / AI_ADAPTATION calls whose body confidence is below this
#   are rejected with HTTP 422 (per design/origin-tracking-pattern.md §Authorization differential).
# - rate-limit-window: bucket size in time; the per-origin `limit` below applies over this window.
# - rate-limits.<ORIGIN>.{limit,scope}: per-origin token bucket. Absent entries mean unlimited.
#   PER_USER → one bucket per (origin, X-Acting-As userId); GLOBAL → one bucket per origin.
# - reject-origin-on-non-annotated-controller: defence-in-depth toggle for the @OriginAware check.
#   true (default) — non-USER origin to an unannotated controller is a 403; flip to false ONLY in
#   exceptional debugging scenarios.
mealprep.origin.ai-confidence-floor=0.5
mealprep.origin.rate-limit-window=PT1H
mealprep.origin.rate-limits.AI_FEEDBACK.limit=20
mealprep.origin.rate-limits.AI_FEEDBACK.scope=PER_USER
mealprep.origin.rate-limits.AI_ADAPTATION.limit=50
mealprep.origin.rate-limits.AI_ADAPTATION.scope=PER_USER
mealprep.origin.rate-limits.SYSTEM_SCHEDULED.limit=100
mealprep.origin.rate-limits.SYSTEM_SCHEDULED.scope=GLOBAL
mealprep.origin.reject-origin-on-non-annotated-controller=true
