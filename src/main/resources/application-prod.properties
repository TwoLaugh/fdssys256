## ============================================================
## prod profile — real Postgres; secrets from env vars only.
##
## Every secret is sourced from an env var WITHOUT a default. If any
## required env var is missing, Spring Boot fails fast at startup —
## that's deliberate; we do not want to silently boot with stub keys
## or empty credentials in production.
## ============================================================

spring.datasource.url=${MEALPREP_DB_URL}
spring.datasource.username=${MEALPREP_DB_USERNAME}
spring.datasource.password=${MEALPREP_DB_PASSWORD}

# Hibernate validates against Flyway-managed schema; never mutates.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Production logging: INFO root, DEBUG only for app code if explicitly set.
logging.level.root=INFO
logging.level.com.example.mealprep=INFO
logging.level.org.hibernate=WARN

# Swagger UI off in prod (gated behind admin auth in a later ticket if exposed at all).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# AI provider keys — required env vars; no defaults so missing keys fail boot loudly.
mealprep.ai.anthropic-api-key=${ANTHROPIC_API_KEY}
mealprep.ai.openai-api-key=${OPENAI_API_KEY}
