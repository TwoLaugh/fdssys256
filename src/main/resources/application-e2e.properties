## ============================================================
## e2e profile — the prod-parity docker-compose stack runs the REAL
## application under SPRING_PROFILES_ACTIVE=e2e (decision D3/D4).
##
## Parity with prod: real Postgres 16 + pgvector, Flyway-managed schema,
## Hibernate validate-only, all external deps (USDA / OpenFoodFacts / web
## fetch) REAL. The ONLY thing faked is the AI — TestAiService is @Primary
## under this profile, so AiServiceImpl is never exercised and no real
## Anthropic / OpenAI call is ever made (no live key required).
##
## Datasource comes from env (compose injects MEALPREP_DB_*), exactly as
## prod does — so the wiring path is identical to production.
## ============================================================

# Datasource — injected by docker-compose (see e2e/docker-compose.yml `app` service env).
spring.datasource.url=${MEALPREP_DB_URL}
spring.datasource.username=${MEALPREP_DB_USERNAME}
spring.datasource.password=${MEALPREP_DB_PASSWORD}

# Flyway owns the schema; Hibernate validates only (prod parity).
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging — INFO; quiet enough for CI logs but flow is traceable.
logging.level.root=INFO
logging.level.com.example.mealprep=INFO
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO

# Swagger UI off (prod parity).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# AI — stub keys ONLY. TestAiService (@Primary, @Profile e2e) intercepts every
# dispatch, so these are never used to make a real call; they exist solely so
# the (unconditional) AnthropicClient RestClient bean + the (key-gated) OpenAI
# client bean can be constructed without a real secret. NEVER put real keys here.
mealprep.ai.anthropic-api-key=e2e-stub-anthropic-not-real
mealprep.ai.openai-api-key=e2e-stub-openai-not-real

# Auth — the compose stack serves plain HTTP inside the docker network, so the
# session cookie cannot be Secure (matches dev). The E2E suite is cookie-session
# aware via REST-assured's cookie filter (see E2eConfig).
mealprep.auth.cookie-secure=false

# External data clients — REAL endpoints (prod parity, decision D4). A real but
# rate-limited/absent USDA key degrades gracefully; the AI is the only fake.
mealprep.nutrition.usda.api-key=${USDA_API_KEY:DEMO_KEY}

# Cold-start gate — pin discovery to the deterministic e2e_curated_seed source ONLY. The real
# web-scraping (bbc_good_food) + Google CSE (google_cse) sources are non-deterministic /
# credential-dependent and their discovery_sources rows are enabled by the shared R__ seed under
# every profile; requesting an explicit single key here means runJobSync's source resolution
# (resolveEnabledByKey) ignores them and runs ONLY E2eSeedDiscoverySource (@Profile e2e). This keeps
# the planner E2E suite fast + repeatable and never makes a live web/Google call. The seed row for
# e2e_curated_seed is upserted at boot by E2eDiscoverySourceSeeder (@Profile e2e).
mealprep.planner.cold-start.source-keys=e2e_curated_seed
