## ============================================================
## dev profile — local Postgres (`docker compose up`); chatty logs.
## ============================================================

# Local Postgres (matches docker-compose.yml at the project root).
spring.datasource.url=jdbc:postgresql://localhost:5432/mealprep_dev
spring.datasource.username=mealprep_dev
spring.datasource.password=mealprep_dev

# Hibernate validates the schema Flyway produced; never auto-mutates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging — verbose in dev so flow is easy to read.
logging.level.root=INFO
logging.level.com.example.mealprep=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.web=DEBUG

# Swagger UI on in dev so the OpenAPI contract is browsable.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# AI keys — local dev typically uses stub providers; real keys via env if set.
mealprep.ai.anthropic-api-key=${ANTHROPIC_API_KEY:dev-stub-anthropic-key}
mealprep.ai.openai-api-key=${OPENAI_API_KEY:dev-stub-openai-key}
