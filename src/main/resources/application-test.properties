## ============================================================
## test profile — datasource is provided programmatically by
## TestContainersConfig (@ServiceConnection on a pgvector/pgvector:pg16
## container). Tests that need the DB import that config; tests that
## don't (web slices, pure unit tests) skip it and avoid Docker.
##
## We deliberately do NOT set spring.datasource.url here: the upstream
## jdbc:tc:postgresql:16-alpine URL maps to plain Postgres, which is
## missing the `vector` extension that the first migration requires.
## ============================================================

# Flyway runs first; Hibernate trusts it and does no schema work in tests.
spring.jpa.hibernate.ddl-auto=none

# Quieter logs by default; per-test overrides live in test classes.
logging.level.root=WARN
logging.level.com.example.mealprep=INFO
logging.level.org.testcontainers=INFO
logging.level.org.flywaydb=INFO

# AI deliberately stubbed — real provider beans replaced by TestAiService in IT base classes.
mealprep.ai.anthropic-api-key=test-stub-anthropic
mealprep.ai.openai-api-key=test-stub-openai

# Auth — tests run over MockMvc / plain HTTP, so the cookie does not require Secure.
mealprep.auth.cookie-secure=false
# Auth session reaper (Flow 6): never auto-fire during tests — the cron is set to 'Feb 31' so the
# @Scheduled trigger never matches. SessionReaperIT invokes SessionReaper.sweep() directly with a
# fixed Clock (mirrors the recipe-01g / notification-scanner precedent).
mealprep.auth.session.reaper-cron=0 0 0 31 2 ?

# Ingredient-mapping clients: WireMock-friendly defaults; placeholder API key only.
mealprep.nutrition.usda.api-key=test-key-not-real
# base-url is overridden per-IT by tests that spin up WireMock.

# Recipe-01g: never fire the scheduled archive scan during tests — the cron expression is set to
# 'Feb 31' so it never matches. Tests that exercise the scan invoke runOnce() directly.
mealprep.recipe.archive.cron=0 0 0 31 2 ?

# Notification/01b scanners: never auto-fire during tests. The beans stay registered (so ITs can
# @Autowired them) but the cron is set to 'Feb 31' so the @Scheduled trigger never matches; the
# scanner tests invoke scan() directly with a fixed Clock. Per the ticket's "disable all scanners in
# the test profile" intent — a never-matching cron is the precedent set by recipe-01g's archive scan.
mealprep.notification.scanners.expiry-warning.cron=0 0 0 31 2 ?
mealprep.notification.scanners.defrost-reminder.cron=0 0 0 31 2 ?
mealprep.notification.scanners.prep-reminder.cron=0 0 0 31 2 ?
mealprep.notification.scanners.nutrition-alert.cron=0 0 0 31 2 ?
mealprep.notification.scanners.staple-replenishment.cron=0 0 0 31 2 ?
mealprep.notification.scanners.cleanup.cron=0 0 0 31 2 ?

# Preference AI delta pipeline (preference-01g): never auto-fire the WEEKLY scheduler during tests.
# weekly-enabled=false makes the @ConditionalOnProperty drop the scheduler bean entirely; the
# never-matching cron is a belt-and-braces guard for any context that still registers it (mirrors
# the notification scanners). The BATCH/MANUAL triggers are driven directly by tests. AI itself is
# stubbed by TestAiService. batch-threshold mirrors main so @ConfigurationProperties binds the same.
mealprep.feedback.preference-delta.weekly-enabled=false
mealprep.feedback.preference-delta.weekly-cron=0 0 0 31 2 ?
mealprep.feedback.preference-delta.batch-threshold=5
mealprep.feedback.preference-delta.corrective-retry-enabled=true

# Feedback retry-sweep (01i): never auto-fire during tests. fixed-delay can't use the never-matching
# cron trick (it's a fixed delay, not a cron), so we push initial-delay far past any test run; ITs
# invoke retryStuckClassifications() directly with a controllable Clock. fixed-delay stays sane in
# case a test runs long. stuck/escalate thresholds mirror main so @ConfigurationProperties binds the
# same values (test classpath shadows main).
mealprep.feedback.retry-sweep.initial-delay-ms=86400000
mealprep.feedback.retry-sweep.fixed-delay-ms=86400000
mealprep.feedback.retry-sweep.stuck-after=PT5M
mealprep.feedback.retry-sweep.escalate-after=PT24H

# Adaptation pipeline (01a): src/test/resources/application.properties overrides the main
# application.properties on the test classpath, so the production-default keys under
# `mealprep.adaptation.*` need to be repeated here for tests that load AdaptationConfig.
mealprep.adaptation.candidate-top-n=5
mealprep.adaptation.plan-time-timeout-ms=10000
mealprep.adaptation.feedback-timeout-ms=8000
mealprep.adaptation.import-timeout-ms=12000
mealprep.adaptation.max-rebase-attempts=3
mealprep.adaptation.pending-change-budget-per-week=3
mealprep.adaptation.pending-change-expiry-days=14
mealprep.adaptation.low-confidence-floor=0.50
mealprep.adaptation.auto-skip-top-ratio=2.00
mealprep.adaptation.recipe-advisory-lock-seconds=30
mealprep.adaptation.pending-expiry-sweep-cron=0 0 4 * * *
mealprep.adaptation.batch-orchestrator-cron=0 30 4 * * *
