## ============================================================
## test profile — Testcontainers Postgres via the JDBC URL convention.
##
## With this URL Spring's @SpringBootTest spins up a postgres:16-alpine
## container per JVM and discards it on teardown — no @Container field
## required in test classes. See https://java.testcontainers.org/modules/databases/jdbc/
## ============================================================

spring.datasource.url=jdbc:tc:postgresql:16-alpine:///mealprep
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test

# Flyway runs first; Hibernate trusts it and does no schema work in tests.
spring.jpa.hibernate.ddl-auto=none

# Quieter logs by default; per-test overrides live in test classes.
logging.level.root=WARN
logging.level.com.example.mealprep=INFO
logging.level.org.testcontainers=INFO
logging.level.org.flywaydb=INFO

# AI deliberately stubbed — real provider beans replaced by TestAiService in IT base classes.
mealprep.ai.anthropic-api-key=test-stub-anthropic
mealprep.ai.openai-api-key=test-stub-openai
